<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Folio — Prompt Library</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#21262d;
  --border:#30363d; --text:#e6edf3; --text2:#8b949e; --text3:#484f58;
  --accent:#5b8def; --green:#3fb950; --yellow:#d29922; --red:#f85149;
  --orange:#f0883e;
  --radius:10px; --font:'DM Sans',system-ui,sans-serif; --mono:'Courier New',monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

.page { max-width:760px; margin:0 auto; padding:40px 20px 80px; }
.page-header { margin-bottom:32px; }
.page-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; }
.page-sub { font-size:13px; color:var(--text2); }

/* Stats row */
.stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px; }
.stat {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:8px 14px; display:flex; align-items:center; gap:8px;
}
.stat-num { font-size:18px; font-weight:700; }
.stat-num.active { color:var(--accent); }
.stat-num.done   { color:var(--green); }
.stat-num.defer  { color:var(--text3); }
.stat-label { font-size:11px; color:var(--text2); line-height:1.3; }

/* Filter bar */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:28px; }
.filter-btn {
  padding:5px 14px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--text2); font-family:var(--font);
  font-size:12px; font-weight:500; cursor:pointer; transition:all .15s;
}
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.filter-btn.done-btn.active { background:var(--green); border-color:var(--green); color:#fff; }

/* Section heading */
.section-heading {
  font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--text3); margin:32px 0 12px; display:flex; align-items:center; gap:10px;
}
.section-heading::after { content:''; flex:1; height:1px; background:var(--border); }
.section-heading:first-child { margin-top:0; }
.section-count {
  font-size:10px; font-weight:700; background:var(--surface2);
  border:1px solid var(--border); color:var(--text3);
  padding:1px 7px; border-radius:20px; letter-spacing:0; flex-shrink:0;
}

/* Prompt card */
.prompt-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:12px; transition:border-color .15s;
}
.prompt-card:hover { border-color:var(--text3); }
.prompt-card.done-card { opacity:.55; }
.prompt-card.done-card:hover { opacity:1; border-color:rgba(63,185,80,.35); }
.prompt-card.backlog-card { opacity:.65; border-style: dashed; }
.prompt-card.backlog-card:hover { opacity:1; border-color:rgba(210,153,34,.4); border-style:solid; }

.card-header {
  display:flex; align-items:center; gap:10px; padding:14px 16px;
  cursor:pointer; user-select:none;
}
.prompt-card.open .card-header { border-bottom:1px solid var(--border); }
.card-header:hover .card-title { color:var(--accent); }
.done-card .card-header:hover .card-title { color:var(--green); }

.card-num {
  width:26px; height:26px; border-radius:6px; background:var(--surface2);
  border:1px solid var(--border); font-size:11px; font-weight:700;
  color:var(--text2); display:flex; align-items:center; justify-content:center;
  flex-shrink:0; letter-spacing:-.02em;
}
.done-card .card-num {
  background:rgba(63,185,80,.1); border-color:rgba(63,185,80,.3); color:var(--green);
}
.card-meta { flex:1; min-width:0; }
.card-title { font-size:14px; font-weight:600; color:var(--text); transition:color .15s; }
.card-tags { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }

.tag {
  font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  padding:2px 8px; border-radius:20px;
}
.tag-fix    { background:rgba(248,81,73,.12);  color:#f85149; border:1px solid rgba(248,81,73,.2); }
.tag-feat   { background:rgba(63,185,80,.12);  color:#3fb950; border:1px solid rgba(63,185,80,.2); }
.tag-sonnet { background:rgba(91,141,239,.12); color:var(--accent); border:1px solid rgba(91,141,239,.2); }
.tag-done   { background:rgba(63,185,80,.1);   color:var(--green); border:1px solid rgba(63,185,80,.25); }
.tag-defer  { background:rgba(72,79,88,.2); color:#8b949e; border:1px solid #30363d; }
.tag-backlog{ background:rgba(210,153,34,.1); color:var(--yellow); border:1px solid rgba(210,153,34,.25); }
.tag-perf   { background:rgba(165,120,255,.12); color:#a578ff; border:1px solid rgba(165,120,255,.2); }
.tag-effort-low  { background:rgba(57,210,192,.1);  color:#39d2c0; border:1px solid rgba(57,210,192,.2); }
.tag-effort-med  { background:rgba(240,136,62,.1);  color:var(--orange); border:1px solid rgba(240,136,62,.2); }
.tag-effort-high { background:rgba(232,90,173,.1);  color:#e85aad; border:1px solid rgba(232,90,173,.2); }

.card-chevron { font-size:12px; color:var(--text3); transition:transform .2s; flex-shrink:0; }
.prompt-card.open .card-chevron { transform:rotate(180deg); }

.card-body { display:none; }
.prompt-card.open .card-body { display:block; }

.card-desc { padding:14px 16px 0; font-size:13px; color:var(--text2); line-height:1.6; }

.prompt-wrap { position:relative; margin:12px 16px 16px; }
.prompt-text {
  background:#0d1117; border:1px solid var(--border); border-radius:8px;
  padding:16px 16px 48px; font-family:var(--mono); font-size:12px; line-height:1.7;
  color:#c9d1d9; white-space:pre-wrap; word-break:break-word;
  max-height:400px; overflow-y:auto;
}
.copy-bar {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, #0d1117 40%);
  padding:20px 12px 10px; display:flex; justify-content:flex-end;
  border-radius:0 0 8px 8px; pointer-events:none;
}
.copy-btn {
  pointer-events:all; display:flex; align-items:center; gap:6px;
  padding:7px 16px; border-radius:6px; background:var(--surface2);
  border:1px solid var(--border); color:var(--text); font-family:var(--font);
  font-size:12px; font-weight:600; cursor:pointer; transition:all .15s;
}
.copy-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
.copy-btn.copied { background:rgba(63,185,80,.15); border-color:rgba(63,185,80,.4); color:#3fb950; }
.copy-icon { font-size:13px; }

.empty { text-align:center; padding:60px 20px; color:var(--text3); font-size:14px; display:none; }

/* Add-prompt button */
.add-btn {
  display:flex; align-items:center; gap:8px;
  padding:8px 18px; border-radius:8px;
  background:var(--surface); border:1px solid var(--border);
  color:var(--text2); font-family:var(--font); font-size:13px;
  font-weight:600; cursor:pointer; transition:all .15s;
  margin-bottom:28px;
}
.add-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }

/* Modal overlay */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.65); z-index:100;
  align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); width:100%; max-width:600px;
  max-height:90vh; display:flex; flex-direction:column;
}
.modal-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; border-bottom:1px solid var(--border);
}
.modal-head h2 { font-size:15px; font-weight:700; }
.modal-close {
  background:none; border:none; color:var(--text2); font-size:18px;
  cursor:pointer; line-height:1; padding:4px;
}
.modal-close:hover { color:var(--text); }
.modal-body { padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }

.field label {
  display:block; font-size:11px; font-weight:700; letter-spacing:.06em;
  text-transform:uppercase; color:var(--text2); margin-bottom:6px;
}
.field input, .field select, .field textarea {
  width:100%; background:#0d1117; border:1px solid var(--border);
  border-radius:6px; padding:9px 12px; color:var(--text);
  font-family:var(--font); font-size:13px; outline:none;
  transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color:var(--accent);
}
.field textarea { font-family:var(--mono); font-size:12px; resize:vertical; min-height:120px; }
.field select option { background:var(--surface2); }

.row-fields { display:flex; gap:12px; }
.row-fields .field { flex:1; }

.modal-foot {
  display:flex; justify-content:flex-end; gap:10px;
  padding:14px 20px; border-top:1px solid var(--border);
}
.btn-cancel {
  padding:8px 18px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--text2); font-family:var(--font);
  font-size:13px; font-weight:600; cursor:pointer;
}
.btn-cancel:hover { color:var(--text); border-color:var(--text2); }
.btn-save {
  padding:8px 18px; border-radius:6px; border:1px solid var(--accent);
  background:var(--accent); color:#fff; font-family:var(--font);
  font-size:13px; font-weight:600; cursor:pointer; transition:background .15s;
}
.btn-save:hover { background:#4a7bde; }

/* Custom-card marker */
.tag-custom { background:rgba(232,90,173,.1); color:#e85aad; border:1px solid rgba(232,90,173,.2); }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="page">

  <div class="page-header">
    <div class="page-title">Folio — Prompt Library</div>
    <div class="page-sub">Click a card to expand · Copy button grabs the full prompt</div>
  </div>

  <div class="stats-row">
    <div class="stat"><span class="stat-num active" id="statActive">0</span><span class="stat-label">Active</span></div>
    <div class="stat"><span class="stat-num done"   id="statDone">0</span><span class="stat-label">Completed</span></div>
    <div class="stat"><span class="stat-num" style="color:var(--yellow)" id="statBacklog">0</span><span class="stat-label">Backlog</span></div>
    <div class="stat"><span class="stat-num defer"  id="statDefer">0</span><span class="stat-label">Deferred</span></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active"   onclick="filter('all',this)">All</button>
    <button class="filter-btn"          onclick="filter('active',this)">Active</button>
    <button class="filter-btn done-btn" onclick="filter('done',this)">Completed</button>
    <button class="filter-btn"          onclick="filter('backlog',this)">Backlog</button>
    <button class="filter-btn"          onclick="filter('fix',this)">Fixes</button>
    <button class="filter-btn"          onclick="filter('feat',this)">Features</button>
    <button class="filter-btn"          onclick="filter('perf',this)">Perf</button>
  </div>

  <button class="add-btn" onclick="openAddModal()">&#43; Add prompt</button>

  <div id="cards"></div>
  <div class="empty" id="empty">No prompts match this filter.</div>

</div><!-- /.page -->

<!-- Add-prompt modal -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h2>Add new prompt</h2>
      <button class="modal-close" onclick="closeAddModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="f-title" placeholder="Short description of the task">
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="f-desc" placeholder="One-line context for what this fixes or adds">
      </div>
      <div class="row-fields">
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option value="active">Active</option>
            <option value="backlog">Backlog</option>
            <option value="deferred">Deferred</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="field">
          <label>Type</label>
          <select id="f-type">
            <option value="feat">Feature</option>
            <option value="fix">Fix</option>
            <option value="perf">Perf</option>
          </select>
        </div>
        <div class="field">
          <label>Effort</label>
          <select id="f-effort">
            <option value="low">Low</option>
            <option value="med">Med</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Prompt text</label>
        <textarea id="f-prompt" placeholder="Paste or write the full prompt here…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save"   onclick="saveNewPrompt()">Save prompt</button>
    </div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  PROMPT DATA — only edit between these two markers       ║
// ║  status: 'active' | 'done' | 'deferred'                  ║
// ╚══════════════════════════════════════════════════════════╝
const PROMPTS = [

  // ── Active ────────────────────────────────────────
  {
  num:"1", status:"active", type:"fix", model:"sonnet", effort:"high",
  title:"PWA: transcript not followed during audio playback",
  desc:"In PWA mode the ebook text is not highlighted in sync with audio. sentenceTimings[] is built but the word-tick loop either finds no match or the timings are offset. The reader shows no active sentence during playback.",
  prompt:"# Fix: Transcript not followed during audio playback (PWA mode) in index.html\n\n## Context\nRead folio-context.md sections: AUDIO EVENTS, TRANSCRIPT, SYNC OFFSET, and FRAGILE AREAS before editing.\nPWA mode: IS_PWA && CAN_FS. Audio src is a blob URL created from a File System Access handle.\nsentenceTimings[] is built by buildSentenceTimings() / buildTimingsFromPlainText() (worker or sync fallback).\n_wordTick() (rAF loop) drives sentence highlighting via sentenceTimings and syncOffset.\nwireAudioEvents() timeupdate handler also updates curSent via binary search over sentenceTimings.\n\n## Problem\nTranscript highlighting does not follow audio in PWA mode. Likely causes in priority order:\n1. sentenceTimings[] is empty or still building when playback starts — timing worker hasn't\n   posted back yet, so _wordTick has nothing to match against.\n2. syncOffset is wrong for PWA (file read timing differs from browser blob timing).\n3. _audio.currentTime vs sentenceTimings start/end units mismatch (e.g. ms vs s).\n4. The timeupdate binary search uses bestSent=curSent as starting index — if curSent is 0\n   and timings start mid-array the search never converges in one frame.\n\n## Investigation steps (read before writing any fix)\n1. Read _wordTick() in full — check the guard conditions that early-return without updating curSent.\n2. Read wireAudioEvents() timeupdate handler — check how sentenceTimings is accessed and what\n   syncOffset value is used.\n3. Read buildSentenceTimings() and its worker onmessage — confirm sentenceTimings[] is assigned\n   before the onmessage resolves.\n4. Read configurePlayerForMode() — confirm it does not reset sentenceTimings after timing is built.\n5. Check loadTranscriptData() — confirm transcriptData is loaded from the PWA file handle before\n   buildSentenceTimings is called.\n\n## Fix requirements\n- Do not change the timing algorithm or similarity() — fix the plumbing only.\n- Do not assign _audio.src outside configurePlayerForMode.\n- Do not reset sentenceTimings[] at any point after it has been built for the current book.\n- If the fix requires waiting for timing to be ready before starting the rAF loop, add a guard\n  flag (e.g. _timingsReady) that _wordTick checks rather than polling sentenceTimings.length.\n- Keep syncOffset unchanged — do not zero it or remove it.\n- After the fix, highlight must track audio within ±1 sentence across the full book.\n\n## Verification\nAfter fix:\n- Open a PWA book with audio + transcript. Play from beginning. Active sentence must advance in sync.\n- Seek audio to 50% via seek bar. Highlighted sentence must jump to the matching position.\n- Pause and resume. Highlight must continue from where audio left off.\n- Run syntax check: node -e \"const fs=require('fs'),html=fs.readFileSync('index.html','utf8'),m=html.match(/<script>([sS]*?)<\/script>/);try{new Function(m[1]);console.log('OK');}catch(e){console.error(e.message);}\"\n"
  },

  {
  num:"2", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"Seeking audio progress bar does not navigate ebook position",
  desc:"When the user drags or clicks the seek bar (#seekBar) the audio jumps to the new time but the ebook scroll position and highlighted sentence do not update to match. onSeekChange() should call updateHL, updateProg, and scrollToSent after resolving the new sentence from sentenceTimings.",
  prompt:"# Fix: Seeking audio bar does not update ebook position in index.html\n\n## Context\nRead folio-context.md: MEDIA CONTROLS (onSeekInput, onSeekChange), HIGHLIGHTING & PROGRESS\n(updateHL, updateProg, scrollToSent), AUDIO EVENTS.\nonSeekChange() is the input \"change\" event on #seekBar (fired on drag end / click).\nIt already performs a binary search over sentenceTimings to find the matching sentence.\nscrollToSent(idx, instant) scrolls the ebook; instant=true bypasses the safe-zone guard.\n\n## Problem\nonSeekChange() updates _audio.currentTime but does not:\n- Call updateHL(newSent) to highlight the new sentence.\n- Call updateProg() to update chapter/progress display.\n- Call scrollToSent(newSent, true) to scroll ebook to matching position.\nOr: it calls them but with the wrong index, or before curSent is updated.\n\n## Investigation steps (read before writing any fix)\n1. Read onSeekChange() in full — find exactly where it updates curSent and what it calls after.\n2. Read onSeekInput() — confirm it only updates the time label, not curSent.\n3. Read scrollToSent() — note that instant=true is required here to prevent the safe-zone\n   guard from skipping the scroll.\n\n## Fix\nIn onSeekChange(), after the binary search resolves a new sentence index:\n1. Set curSent to the new index.\n2. Set curWord = 0.\n3. Call updateHL(curSent).\n4. Call updateProg().\n5. Call scrollToSent(curSent, true).\nThese calls must happen regardless of whether mediaState is playing or paused.\nDo not call ttsStop/ttsPlay from onSeekChange — TTS seek is handled separately via scrubToPosition.\n\n## Verification\n- Drag seek bar to 30%: ebook scrolls to matching sentence and highlights it.\n- Click seek bar at 80%: same result.\n- Seek while paused: ebook position updates, highlight shows correct sentence.\n- Seek while playing: highlight continues from new position without jumping back.\n- Run syntax check.\n"
  },

  {
  num:"3", status:"active", type:"fix", model:"sonnet", effort:"low",
  title:"Ignore files named \"metadata\" during PWA folder scan",
  desc:"When scanning a book folder in PWA mode, files named \"metadata\" (any extension or no extension) are incorrectly picked up as audio, ebook, or cover candidates. These system/sidecar files should be silently skipped during pwaScanBookFolder().",
  prompt:"# Fix: Ignore \"metadata\" files during PWA folder scan in index.html\n\n## Context\nRead folio-context.md: the pwaScanBookFolder() description in the PWA section.\npwaScanBookFolder() iterates files in a directory handle and assigns them to\naudioHandle, ebookHandle, transcriptHandle, or coverHandle based on extension matching.\n\n## Task\n1. Read pwaScanBookFolder() in full.\n2. Find the loop or conditional that inspects each file entry's name/extension.\n3. Add a guard at the top of that loop that skips any file whose base name\n   (filename without extension, lowercased) is exactly 'metadata':\n\n   const baseName = file.name.replace(/.[^.]+$/, '').toLowerCase();\n   if (baseName === 'metadata') continue;  // skip sidecar/system files\n\n4. The guard must be the first check in the loop — before any extension matching.\n5. Do not change any other logic in pwaScanBookFolder().\n6. Do not skip files named e.g. 'book-metadata.epub' — only exact base name match.\n\n## Verification\n- A folder containing 'metadata', 'metadata.json', 'metadata.opf' alongside a valid\n  audio file: only the audio file is assigned; metadata files are ignored.\n- A folder with no metadata files: behaviour unchanged.\n- Run syntax check.\n"
  },

  {
  num:"4", status:"active", type:"fix", model:"sonnet", effort:"low",
  title:"syncOffset not saved in PWA mode — lost on every session",
  desc:"adjustOffset() writes library[curBookIdx].syncOffset but skips saving when IS_PWA is true, and savePwaProgress() does not include syncOffset in its prog object. Any sync offset dialled in during a PWA session is silently lost on the next launch — data loss for transcript users.",
  prompt:"# Fix: syncOffset not saved in PWA mode in index.html\n\n## Context\nRead folio-context.md: SYNC OFFSET section and savePwaProgress().\nadjustOffset(delta) is the function users call when nudging sync offset via\nthe Options panel buttons. It updates syncOffset and library[curBookIdx].syncOffset.\nsavePwaProgress() builds a prog object and writes it to localStorage[PWA_PROG_KEY].\n\n## Root cause (confirmed in code)\nadjustOffset() at line ~1852 calls:\n  if(!IS_PWA) saveLibrary(); else savePwaProgress();\nBut savePwaProgress() builds prog as:\n  {curSent, curWord, audioTime, wpm, sentPauseMs, playbackRate, totalSents}\nsyncOffset is NOT in that object, so it is never persisted in PWA mode.\n\n## Fix — two changes:\n\n### 1. savePwaProgress(): add syncOffset to prog\nFind savePwaProgress() and add syncOffset to the prog object literal:\n  const prog = {\n    curSent, curWord,\n    audioTime: isFinite(_audio.currentTime) ? _audio.currentTime : 0,\n    wpm, sentPauseMs,\n    playbackRate: _audio.playbackRate || 1,\n    syncOffset,          // ← ADD THIS\n    totalSents: sentences.length || b.totalSents || 1\n  };\n\n### 2. flushPositionSync(): add syncOffset to PWA path\nFind the IS_PWA branch in flushPositionSync() and add syncOffset to\nthe prog object there as well (it mirrors savePwaProgress() structure).\n\n## Verification\n- Open a book in PWA mode. Adjust sync offset to +1.5s. Press back.\n  Reopen book. Options → Advanced → Sync offset must show +1.5s.\n- Adjust to -0.5s. Close app. Reopen. Must restore -0.5s.\n- Browser mode: unchanged behaviour (no regression).\n- Run syntax check."
  },

  {
  num:"5", status:"active", type:"fix", model:"sonnet", effort:"low",
  title:"Fix sizing and padding in PWA player screen",
  desc:"In PWA mode the player screen has incorrect padding, oversized elements, or clipped content — particularly around the top bar, seek strip, and reading area. Safe-area insets for Android gesture nav bar may be missing or wrong.",
  prompt:"# Fix: Sizing and padding issues in PWA player screen in index.html\n\n## Context\nRead folio-context.md CSS SECTIONS (Seek strip, Top bar, Reader body, Media queries).\nThe seek strip and TTS bar use env(safe-area-inset-bottom) in the mobile media query.\nThe reading area is #eScroll > #eContent inside .reader-body.\nIS_PWA mode may need additional top padding if the status bar overlaps .top-bar.\n\n## Task\nThis is a targeted CSS-only fix (no JS changes).\n\n1. Read the CSS for .top-bar, #seekStrip, .tts-bar, .reader-body, #eScroll in full.\n2. Read the @media(max-width:639px) block in full.\n3. Identify and fix:\n   a. Any missing env(safe-area-inset-bottom) on #seekStrip and .tts-bar in mobile query.\n   b. Any missing env(safe-area-inset-top) or status-bar padding on .top-bar.\n   c. Any hardcoded pixel values that should use env() for notched/gesture-nav devices.\n   d. Any overflow or clipping on .reader-body / #eScroll that cuts off content near the\n      bottom seek strip.\n\n4. Add a CSS block scoped to a .is-pwa class on <body> (or #player) if PWA-specific\n   overrides are needed — do not change base styles that affect browser mode.\n   The IS_PWA JS constant adds class 'is-pwa' to document.body if not already done;\n   if that class is not being set, add: if(IS_PWA) document.body.classList.add('is-pwa');\n   near the IS_PWA constant definition in JS.\n\n## Constraints\n- CSS changes only unless adding the is-pwa body class requires one JS line.\n- Do not change layout for desktop (min-width:640px) breakpoint.\n- Do not change any colour, font, or non-spacing property.\n\n## Verification\n- Player screen fills viewport correctly on a 390px-wide Android device.\n- No content clipped under status bar at top.\n- Seek strip not obscured by gesture nav bar at bottom.\n- Run syntax check (checks JS only — visually verify CSS in browser).\n"

  {

  title:"loadEbook has no cancellation — race on rapid book switching",
  desc:"Opening a book then immediately opening a different one can leave two concurrent chunked DOM builds writing to #eContent — the old book’s async chunks can land after the new book has started rendering, corrupting the reader.",
  prompt:"# Fix: loadEbook has no cancellation — race on rapid book switching in index.html\n\n## Context\nRead loadEbook(book, onDone) in full. It builds the ebook DOM in async chunks\nusing yieldToMain(). If the user opens book A and immediately opens book B,\ntwo concurrent loadEbook() calls write to the same #eContent element and\npush to the same sentences[] array.\n\n## Fix\nAdd a monotonic load generation counter:\n  let _ebookLoadGen = 0;\n\nAt the start of loadEbook():\n  const myGen = ++_ebookLoadGen;\n\nAt every point after an await yieldToMain() inside the chunked build loop,\nadd a stale-check before continuing:\n  if(myGen !== _ebookLoadGen) return; // newer load started — abandon this one\n\nThe stale-check must appear:\n1. After each await yieldToMain() inside the while(i < items.length) loop.\n2. Before the final content.appendChild(frag) call.\n3. Before setBannerState('hidden').\n4. Before the onDone() call — only call onDone if this is still the active load.\n\n## Where to place the check\nInside the loop:\n  await yieldToMain();\n  if(myGen !== _ebookLoadGen) return;  // ← add after every yield\n\nBefore final flush and onDone:\n  if(myGen !== _ebookLoadGen) return;\n  content.appendChild(frag);\n  setBannerState('hidden');\n  // ... attach click handler, buildToc, buildSentenceTimings, onDone() ...\n\n## Constraints\n- Do not add any new UI state or error toasts for the abandoned load.\n- Do not change the chunk size, yield frequency, or build logic.\n- _ebookLoadGen is module-level; reset is not needed (monotonic counter is fine).\n- Do not guard the initial content.innerHTML wipe or items parsing with myGen —\n  only guard after yields.\n\n## Verification\n- Open book A. Immediately open book B. Only book B's content appears.\n- Open book A normally (no race): loads correctly.\n- Run syntax check."
  },

  {

  prompt:"# Fix: TOC double-click required to navigate in index.html\n\n## Context\nRead buildToc() in full, specifically the TOC item click handler.\nIt currently: closes sidebar on mobile (≤700px), defers one\nrequestAnimationFrame, then inside the rAF scrolls to curSent.\nRead _cacheScrollMetrics() — it caches _scrollElH and _scrollElTop.\n\n## Root cause\nOn low-end Android the sidebar close CSS transition hasn't finished\nwithin one rAF (~16ms), so _scrollElH/_scrollElTop are stale when\nscrollIntoView fires, landing at the wrong position.\n\n## Fix\nInside the TOC item click handler, change the single-rAF delay to a\ntwo-rAF sequence that refreshes scroll metrics between frames:\n\nBefore (current):\n  requestAnimationFrame(() => {\n    scrollPaused = false;\n    scrollToSent(curSent, true);\n    // ... TTS logic ...\n  });\n\nAfter:\n  requestAnimationFrame(() => {\n    _cacheScrollMetrics();           // refresh after sidebar close\n    requestAnimationFrame(() => {\n      scrollPaused = false;\n      scrollToSent(curSent, true);\n      // ... TTS logic unchanged ...\n    });\n  });\n\nThe sidebar close block (if window.innerWidth <= 700) and the rAF\nwrapping it must remain — only add the inner rAF and the\n_cacheScrollMetrics() call.\n\n## Constraints\n- Do not change _cacheScrollMetrics() itself.\n- Do not change the TTS resume/stop logic inside the rAF.\n- Do not change scrollToSent() or the instant=true argument.\n- This is a 3-line change: add _cacheScrollMetrics() and wrap existing\n  rAF body in a second requestAnimationFrame.\n\n## Verification\n- Long book, TOC item 20 chapters in: one tap navigates correctly.\n- Same item tapped twice: no unexpected jump.\n- TTS playing, tap TOC item: speech restarts from correct sentence.\n- Run syntax check."

  num:"8", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"Text alignment resets on book reopen",
  desc:"Text alignment set in Display options is lost when closing and reopening a book — loadEbook() wipes #eContent innerHTML which discards the inline style, and setAlign() is not called again after the ebook finishes loading.",
  prompt:"# Fix: Text alignment resets on book reopen in index.html\n\n## Context\nRead loadEbook() in full. It wipes #eContent innerHTML on line ~2684:\n  content.innerHTML = '<p ...>Loading…</p>';\nThis destroys any inline style.textAlign previously set by setAlign().\nRead loadDisplayPrefs() — it calls setAlign() at startup only.\nRead setAlign() — it sets document.getElementById('eContent').style.textAlign directly.\n\n## Root cause\nloadEbook() is called on every book open. After it wipes innerHTML and\nrebuilds the DOM, the inline textAlign on #eContent is gone because the\nelement reference is the same but innerHTML assignment does not restore\ninline styles.\n\n## Fix\nAt the end of loadEbook(), after the final content.appendChild(frag) and\nsetBannerState('hidden'), reapply the saved text alignment:\n\n  // Restore text alignment from saved prefs\n  const savedAlign = document.querySelector('[id^=alignPill].active')?.id?.replace('alignPill-','');\n  if(savedAlign) content.style.textAlign = savedAlign;\n\nThis reads the currently-active alignment pill (which loadDisplayPrefs set at\nstartup) and reapplies it to the newly-built content.\n\nAlternatively, read it from the _fontBody pattern: save the alignment as a\nmodule-level variable _textAlign (similar to _fontBody, _fontSize etc.) and\nset it in setAlign(). Then in loadEbook()'s onDone path, apply content.style.textAlign = _textAlign.\n\nUse whichever approach is simpler and consistent with the existing pattern.\nThe _textAlign variable approach is preferred for consistency with _fontBody etc.\n\n## Constraints\n- Do not change saveDisplayPrefs() or loadDisplayPrefs() beyond adding\n  the new _textAlign variable if that approach is used.\n- The fix must be inside loadEbook(), not in openBook() or onDone callbacks.\n- Do not wipe the content element's textAlign at any point after setting it.\n\n## Verification\n- Set text alignment to Justify. Close book. Reopen. Text is still justified.\n- Change to Center. Open a different book. Alignment is Center.\n- Run syntax check."

  {
  num:"9", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"Sentence splitter breaks on common abbreviations and quoted dialogue",
  desc:"splitSentences() treats i.e., e.g., Fig., p. (page), and No. as sentence boundaries, corrupting highlighting and transcript sync for non-fiction. Quoted dialogue is also split incorrectly: \"He said \\\"Stop!\\\" and ran away\" becomes two fragments because the regex fires on the closing quote.",
  prompt:"# Fix: Sentence splitter breaks on abbreviations and quoted dialogue in index.html\n\n## Context\nRead splitSentences(text) in full (it appears twice: once in _timingWorkerFn\nas the serialised worker copy, and once in the main script below as the\nstandalone version called from loadEbook). Both copies must be updated\nidentically — they must stay in sync.\n\nCurrent regex lookbehind:\n  (?<!\\b(?:Dr|Mr|Mrs|Ms|Prof|Rev|Sr|Jr|St|vs|etc|vol|ch|no))\n\n## Problems\n1. Missing abbreviations: i.e, e.g, Fig, p (page), No, cf, approx, dept,\n   est, approx, ca — all fire false sentence boundaries.\n2. Quoted dialogue: \"Stop!\" becomes a sentence break because the regex\n   matches [.!?]+ before the closing quote then whitespace.\n\n## Fix\n\n### 1. Expand the abbreviation list in the lookbehind\nReplace the existing lookbehind list with an extended one:\n  (?<!\\b(?:Dr|Mr|Mrs|Ms|Prof|Rev|Sr|Jr|St|vs|etc|vol|ch|no|i\\.e|e\\.g|fig|p|cf|approx|dept|est|ca|ibid|op|cit))\n\nNote: lookbehind must use escaped dots for i.e and e.g since these are\ninside a regex already — use i\\\\.e and e\\\\.g (JS string: i\\\\\\.e).\nTest carefully to avoid breaking the regex entirely.\n\n### 2. Fix closing-quote absorption\nThe current pattern already includes [\"'\\u00bb...)] in the match group\nthat absorbs trailing punctuation after sentence-ending chars.\nThe issue is the pattern matches [.!?]+[closing-quote]?\\s+ — the quote\nIS absorbed, but only when followed by whitespace. After a closing \" in\ndialogue like: She said \"Stop!\" and ran — the exclamation + quote IS\nabsorbed, then the lowercase \"and\" continues. This should already work.\n\nReproduce the actual failing case and add a regression test comment\nabove splitSentences explaining the expected split point.\n\n### 3. Keep both copies in sync\nAfter fixing splitSentences in the main script (below the worker), find\nthe identical function inside _timingWorkerFn (it's a copy serialised\ninto the blob worker) and apply the exact same regex change there.\n\n## Constraints\n- Do not change the function signature or return type.\n- The fix is regex-only: do not add any post-processing or loops.\n- If the lookbehind becomes too complex and causes a syntax error, fall\n  back to a simpler pre-filter (replace \"i.e.\" with \"i_e_\" before splitting).\n\n## Verification\n- \"Dr. Smith went to Washington. He arrived at 9 a.m.\" → 2 sentences, not 4.\n- \"She said \\\"Stop!\\\" and ran away.\" → 1 sentence.\n- Normal paragraph with 3 sentences → 3 sentences.\n- Run syntax check."
  },

  {
  num:"10", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"Ebook formatting polish",
  desc:"General ebook formatting still needs work beyond the paragraph fragmentation fix. Specific issues to be identified during testing.",
  prompt:"# Fix: Ebook formatting polish in index.html\n\n## Context\nRead extractFromDom(), parseTxt(), parseMd(), parseHtml(), parseEpub() in full.\nCommon formatting issues found in real ebooks:\n1. EPUBs with <div> containing only raw text (no block children) silently drop\n   that text — documented in folio-context.md FRAGILE AREAS #9.\n2. Consecutive short paragraphs from parseTxt() get treated as separate items\n   even when they're part of the same block (e.g. poetry or dialogue).\n3. parseMd() processes line-by-line, so a paragraph split across two lines\n   with a single newline is split into two items.\n\n## Fixes\n\n### Fix 1: extractFromDom bare-div text\nIn extractFromDom(), the walk() function currently does: if(node.nodeType!==1) return;\nThis skips text nodes. Inside the div/section/article/aside descent path (Array.from\nchildNodes forEach walk), text nodes are children — but skipped.\n\nAdd handling for text node children of container elements:\n  if(node.nodeType === 3) {  // text node\n    const t = node.textContent.replace(/\\s+/g, ' ').trim();\n    if(t) items.push({type:'text', text:t});\n    return;\n  }\n\nAdd this check before the nodeType!==1 guard so text nodes are collected.\n\n### Fix 2: parseTxt soft-wrap\nIn parseTxt(), change the paragraph split to also collapse single-newline\nsequences into spaces (common in plain-text ebooks copied from web):\n  String(data).split(/\\n{2,}/).forEach(para => {\n    const t = para.replace(/\\n/g, ' ').replace(/\\s+/g, ' ').trim();\n    if(t) items.push({type:'text', text:t});\n  });\nThe extra .replace(/\\n/g, ' ') collapses single newlines within a paragraph.\n\n### Fix 3: parseMd paragraph joining\nIn parseMd(), consecutive non-heading lines that aren't separated by a blank\nline should be joined. Currently each line is its own item. Add state:\n  let pendingText = '';\n  lines.forEach((line, idx) => {\n    const hm = line.match(/^(#{1,3})\\s+(.+)/);\n    if(hm) {\n      if(pendingText) { items.push({type:'text',text:pendingText.trim()}); pendingText=''; }\n      items.push({type:'heading', level:hm[1].length, text:hm[2].trim()});\n      return;\n    }\n    const t = line.replace(/[*_`~]+/g,'').trim();\n    if(!t) {\n      if(pendingText) { items.push({type:'text',text:pendingText.trim()}); pendingText=''; }\n    } else {\n      pendingText += (pendingText ? ' ' : '') + t;\n    }\n  });\n  if(pendingText) items.push({type:'text',text:pendingText.trim()});\n\n## Constraints\n- Do not change parseTxt's double-newline paragraph split threshold.\n- extractFromDom change must not affect EPUB files that already render correctly.\n- Test with both a simple .txt file and an EPUB after changes.\n\n## Verification\n- A div with only text content (no block children) renders in the reader.\n- A .txt file with single-newline line breaks renders as complete paragraphs.\n- A .md file with paragraphs across multiple lines merges them correctly.\n- Run syntax check."
  },

  {
  num:"11", status:"active", type:"fix", model:"sonnet", effort:"low",
  title:"loadScript has no CDN fallback for JSZip — EPUB silently fails offline",
  desc:"loadScript() resolves on both onload and onerror so parseEpub continues with JSZip undefined when the CDN is unreachable, showing only a terse error message with no retry, no fallback URL, and no explanation that the device may be offline.",
  prompt:"# Fix: loadScript has no CDN fallback for JSZip in index.html\n\n## Context\nRead loadScript(src) in full. It resolves on both onload AND onerror,\nso parseEpub() proceeds with JSZip === undefined when the CDN is unreachable.\nparseEpub() already has a typeof JSZip === 'undefined' guard that returns an\nerror message, but it gives no user feedback about why it failed.\n\n## Fix — two parts:\n\n### 1. Add a secondary CDN URL\nIn parseEpub(), change the load call:\n  if(typeof JSZip === 'undefined') await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');\n\nTo a try-with-fallback:\n  if(typeof JSZip === 'undefined'){\n    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');\n  }\n  if(typeof JSZip === 'undefined'){\n    // Primary CDN failed, try unpkg fallback\n    await loadScript('https://unpkg.com/jszip@3.10.1/dist/jszip.min.js');\n  }\n  if(typeof JSZip === 'undefined'){\n    return [{type:'text',text:'Could not load EPUB parser. Check your internet connection and try again.'}];\n  }\n\n### 2. Better error message\nIf JSZip is still undefined after both attempts, return a user-friendly message\n(already done above in the second guard).\n\n## Constraints\n- Do not change loadScript() signature.\n- The two CDN attempts happen sequentially (await each).\n- Do not add any UI loading state for the CDN fetch — the ebook loading banner\n  is already visible during this time.\n- Do not change how JSZip is used after it loads.\n\n## Verification\n- Normal case (CDN reachable): EPUB loads as before.\n- Simulate CDN failure (wrong URL): second CDN is tried, then error message shown.\n- Run syntax check."
  },

  prompt:"# Fix: Audiobook + ebook with no transcript — undefined UX in index.html\n\n## Context\nRead loadTranscriptData(b) in full. Read setBannerState() in full.\nRead the tx-banner CSS section and the player screen HTML breakdown.\nWhen a book has audio + ebook but no transcript (b.transcriptType is null),\nloadTranscriptData() returns immediately after setBannerState('hidden').\nThe user sees no transcript banner, no explanation, and no action to fix it.\n\n## Fix\nIn loadTranscriptData(b), in the early-return path where !b.transcriptType:\n\n1. Instead of just calling setBannerState('hidden') and returning, check if\n   the book has an audio file but no transcript:\n     if(!b.transcriptType) {\n       if(b.audioUrl || b.audioHandle) {\n         setBannerState('notx'); // new state\n       } else {\n         setBannerState('hidden');\n       }\n       return;\n     }\n\n2. Add a 'notx' state to setBannerState():\n   - Give it a distinct icon (e.g. 📝 with a ? or ⚠️).\n   - Text: \"No transcript — highlights unavailable\"\n   - Detail: \"Add a transcript for word-level highlighting\"\n   - Add a small \"Add transcript\" action link/button inside the banner\n     that calls openTranscriptModal() when tapped.\n\n3. CSS: add a .tx-banner.notx rule styled similarly to .tx-banner.ready\n   but with a muted amber/yellow colour (use --yellow or var(--text3)).\n\n## HTML change\nIn the #txBanner HTML, ensure there is a container for the action link\n(the banner likely already has a slot for detail text — add the button\nafter #txBannerDetail):\n  <button id=\"txBannerAction\" class=\"tx-banner-action\" onclick=\"openTranscriptModal()\"\n    style=\"display:none\">Add transcript →</button>\n\nIn setBannerState(), show/hide #txBannerAction based on whether state==='notx'.\n\n## Constraints\n- Do not change the 'hidden', 'loading', 'syncing', 'ready', 'error' states.\n- openTranscriptModal() already exists — just call it.\n- PWA mode: the transcript modal works for PWA too (biReassign handles PWA save).\n\n## Verification\n- Open a book with audio + ebook, no transcript: banner shows \"No transcript\" message\n  with an \"Add transcript\" button.\n- Tap \"Add transcript\": transcript modal opens.\n- Add a transcript: banner transitions to loading → syncing → ready.\n- Open a TTS-only book (no audio): banner stays hidden.\n- Run syntax check."

  {

  prompt:"# Feature: Empty library onboarding in index.html\n\n## Context\nRead renderLib() in full. It renders the grid of book cards. In browser mode,\nwhen library is empty, it renders only the + Add Book card with no explanation.\nIn PWA mode with no books scanned, pwaScanAndRender() shows a \"No books found\"\nmessage but it's sparse. This is the first thing new users see.\n\n## Task\nWhen the library grid is empty (no books), show an onboarding card above the +\nAdd Book card that explains what Folio is and how to get started.\n\n### Browser mode\nIn renderLib(), before appending the add-card, if library.length === 0:\n  const onboard = document.createElement('div');\n  onboard.className = 'onboard-card';\n  onboard.innerHTML = `\n    <div class=\"onboard-title\">Welcome to Folio</div>\n    <div class=\"onboard-body\">\n      Read ebooks with synced audio highlighting.\n      Add a book to get started — you'll need an audio file (.mp3, .m4b, etc.)\n      and an ebook (.epub, .txt, .html, or .md).\n      Add a Whisper transcript (.json) for word-level sync.\n    </div>`;\n  grid.appendChild(onboard);\n\n### PWA mode\nIn the pwaScanAndRender() empty-state block (where it currently shows\n\"No books found in X\"), replace the existing minimal message with richer HTML:\n  - Folder name displayed\n  - Brief instructions: each book needs its own subfolder\n  - Accepted file types\n\n### CSS\nAdd to stylesheet:\n  .onboard-card {\n    grid-column: 1 / -1;\n    background: var(--surface); border: 1px dashed var(--border);\n    border-radius: var(--radius); padding: 28px 24px; margin-bottom: 8px;\n    text-align: center;\n  }\n  .onboard-title {\n    font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 10px;\n  }\n  .onboard-body {\n    font-size: 13px; color: var(--text2); line-height: 1.6; max-width: 420px;\n    margin: 0 auto;\n  }\n\n## Constraints\n- Only show when library.length === 0 (browser mode) or scan returns 0 books (PWA).\n- Once a book is added, the card must not appear (renderLib() rebuilds the grid).\n- No changes to openModal(), addBook(), or scan logic.\n- Keep it concise — this is not a tutorial, just context.\n\n## Verification\n- Fresh browser mode (no books): onboarding card visible above + Add Book.\n- Add a book: onboarding card disappears, book card shows.\n- PWA mode, empty folder: improved empty state message.\n- Run syntax check."

  prompt:"# Fix: Book rename uses window.prompt() in index.html\n\n## Context\nRead renameBook() in full before editing. It currently calls\nwindow.prompt('New title:', library[i].title) which is blocked in some\ninstalled PWA environments and is visually inconsistent with the rest of\nthe UI. Replace with an inline edit field on the book card itself.\n\n## Implementation\n\n### Remove prompt()\nIn renameBook(i, e), remove the window.prompt() call entirely.\n\n### Inline edit\nInstead, find the title element inside the clicked card and replace it\nwith an input temporarily:\n  1. Find the .book-title div inside e.target.closest('.book-card').\n  2. Store its current text, replace it with:\n       <input class=\"book-title-input\" value=\"[current title]\" />\n  3. Focus and select-all on the input immediately.\n  4. On 'blur' and on Enter keydown: read the value, trim it.\n     If non-empty and changed: update library[i].title, save, call\n     renderLib() (which rebuilds the card, removing the input).\n     If empty or unchanged: just call renderLib() to restore.\n  5. On Escape keydown: call renderLib() without saving.\n\n### CSS\nAdd to stylesheet:\n  .book-title-input {\n    font: inherit; font-size: 13px; font-weight: 600;\n    background: var(--surface2); color: var(--text);\n    border: 1px solid var(--accent); border-radius: 4px;\n    padding: 2px 6px; width: 100%; box-sizing: border-box;\n    outline: none;\n  }\n\n### Save logic (unchanged)\nAfter confirming a new title, the same save logic applies:\n  if(!IS_PWA) saveLibrary();\n  else { /* existing PWA_PROG_KEY update */ }\n\n## Constraints\n- Do not use prompt(), confirm(), or alert() anywhere.\n- The input must not break the card grid layout — use width:100% inside\n  the existing .book-info container.\n- renderLib() already rebuilds the entire grid, so the input will be\n  replaced naturally when it is called.\n\n## Verification\n- Click rename on a card: title becomes an editable input.\n- Type new name, press Enter: card shows new name, library saved.\n- Press Escape: card restores original name, nothing saved.\n- Click away (blur): same as Enter — saves if changed.\n- Run syntax check."

  desc:"Once folder selection begins on mobile there is no cancel step. Needs a confirmation or cancel affordance before committing the folder.",
  prompt:"# Fix: No way to cancel folder selection on mobile in index.html\n\n## Context\nRead pwaPickFolder() in full. It calls showDirectoryPicker() which\nlaunches the OS file picker. If the user picks a folder, pwaScanAndRender()\nruns immediately with no confirmation step. On mobile there is no way to\nabort once a folder is selected without quitting the app.\n\n## Fix\nAfter showDirectoryPicker() resolves and before pwaScanAndRender():\n\n1. Show a toast-style confirmation sheet (not an alert):\n   - Display the chosen folder name.\n   - Two buttons: \"Use this folder\" and \"Choose another\".\n   - No modal overlay needed — a fixed bottom sheet is fine.\n\n2. If \"Use this folder\":\n   - Proceed with the existing idbSet + pwaScanAndRender() logic.\n   - Dismiss the sheet.\n\n3. If \"Choose another\":\n   - Dismiss the sheet without saving the handle.\n   - Do NOT call idbSet or pwaScanAndRender().\n   - The first-run screen remains visible.\n\n## Implementation\nAdd a helper that returns a Promise resolving true/false:\n  async function _confirmFolder(name) {\n    return new Promise(resolve => {\n      // Build and append a .folder-confirm-sheet div to document.body\n      // Two buttons wired to resolve(true) / resolve(false) + sheet.remove()\n    });\n  }\n\nInside pwaPickFolder(), after const handle = await showDirectoryPicker():\n  const ok = await _confirmFolder(handle.name);\n  if(!ok) return;\n  pwaRootHandle = handle;\n  await idbSet('rootHandle', handle);\n  await idbSet('rootName', handle.name);\n  await pwaScanAndRender();\n\n## CSS\nAdd to stylesheet (append at end of <style>):\n  .folder-confirm-sheet {\n    position: fixed; bottom: env(safe-area-inset-bottom, 0);\n    left: 0; right: 0; background: var(--surface2);\n    border-top: 1px solid var(--border); padding: 20px 20px 24px;\n    display: flex; flex-direction: column; gap: 12px; z-index: 9999;\n  }\n  .folder-confirm-name {\n    font-size: 15px; font-weight: 600; color: var(--text);\n   prompt:"# Perf: arrayBufferToBase64 blocks main thread on large EPUBs in index.html\n\n## Context\nRead arrayBufferToBase64(buf) in full. It currently uses a character-by-character\nloop with string concatenation, which is O(n) and blocks the main thread for\nlarge files (>5MB EPUB can take 500ms+).\n\n## Fix\nReplace the implementation with btoa + Uint8Array slice approach which is\nsubstantially faster due to native btoa implementation:\n\n  function arrayBufferToBase64(buf) {\n    const bytes = new Uint8Array(buf);\n    let result = '';\n    const CHUNK = 8192;\n    for(let i = 0; i < bytes.length; i += CHUNK) {\n      result += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));\n    }\n    return btoa(result);\n  }\n\nThis uses apply() with a chunk size of 8192 to avoid call stack overflow\n(apply() with very large arrays throws RangeError on some JS engines),\nthen passes the full string to btoa() once.\n\n## Constraints\n- The function signature and return type must be unchanged.\n- The output must be identical base64 to the current implementation.\n- Chunk size 8192 is safe across all JS engines — do not increase it.\n- Do not move this off-thread (that would require significant refactoring of\n  pwaOpenBook's await chain) — the chunked approach is fast enough.\n\n## Verification\n- A 20MB EPUB opens without a noticeable main-thread freeze.\n- The parsed EPUB content is identical to before (same sentences rendered).\n- Run syntax check."

  prompt:"# Fix: parseMd leaves partial markdown symbols in index.html\n\n## Context\nRead parseMd(data) in full. The current inline stripping regex is:\n  line.replace(/[*_`~]+/g, '')\nThis removes runs of markdown chars but leaves isolated ones:\n- \"word*\" (trailing asterisk) → \"word*\" (asterisk not in a run of 2+)\n- \"_word\" (leading underscore) → \"_word\"\n\n## Fix\nReplace the stripping regex with one that handles both paired and unpaired markers:\n\n  // Remove markdown bold/italic/code/strikethrough markers\n  // Handles paired (**word**), single markers adjacent to word chars,\n  // and trailing punctuation attached to markdown syntax\n  const t = line\n    .replace(/[*_]{1,3}([^*_]+)[*_]{1,3}/g, '$1')  // paired markers: **word** → word\n    .replace(/[*_`~]+/g, '')                          // remaining isolated markers\n    .trim();\n\nApply this two-pass approach in parseMd(): first strip paired markers\n(which preserves the enclosed text), then strip any leftover isolated markers.\n\n## Constraints\n- Only change parseMd(). Do not change parseTxt(), parseHtml(), or extractFromDom().\n- The function must return the same items structure: [{type, level, text}].\n- Heading detection (hm = line.match(/^(#{1,3})\\s+(.+)/)) runs before stripping\n  and is unaffected — check that headings still work correctly.\n- Do not add a full Markdown parser — minimal stripping is sufficient for this use case.\n\n## Verification\n- \"This is **bold** and _italic_ text.\" → \"This is bold and italic text.\"\n- \"word*\" → \"word\" (no trailing asterisk).\n- \"# Heading with **bold**\" → heading with text \"Heading with bold\".\n- Run syntax check."

  prompt:"# Fix: Horizontal swipe conflicts with text selection on touch devices in index.html\n\n## Context\nRead the swipe gesture IIFE on #eScroll in full. It fires nudge() on\ntouchend when horizontal drag > 50px. On touch laptops and tablets,\nattempting to select text by horizontal drag accidentally triggers navigation.\n\n## Fix\nAdd a guard inside the touchmove handler: if the user appears to be\nselecting text (window.getSelection().toString() is non-empty, or more\nreliably: if a touchmove starts but returns to near the start position\nbefore being over the threshold, it may be a selection attempt).\n\nThe most reliable fix is to detect whether text was selected during the\ngesture and cancel the swipe:\n\nIn the touchend handler, before calling nudge(), add:\n  const sel = window.getSelection();\n  if(sel && sel.toString().length > 0) { moved = false; return; }\n\nThis means: if any text is selected at touchend, treat the gesture as a\ntext selection (not a swipe) and do nothing.\n\nAdditionally, increase the minimum horizontal distance from 50px to 80px\nto reduce accidental fires:\n  if(Math.abs(dx) > 80) { nudge(dx < 0 ? 1 : -1); moved = false; }\n\n## Constraints\n- Do not remove the swipe gesture entirely — it is a primary navigation\n  method on mobile phones.\n- The fix must be inside the existing touchend handler in the IIFE.\n- Do not change touchstart or touchmove handlers.\n\n## Verification\n- Touch phone: horizontal swipe still navigates sentences.\n- Touch laptop: dragging to select text does not trigger navigation.\n- Run syntax check."

  desc:"When a book is removed and re-added, the old progress record in folio_pwa_progress_v1 may still contain a stale totalSents value. If the new ebook has a different sentence count the progress percentage calculation uses the wrong denominator, showing incorrect or >100% progress.",
  prompt:"# Fix: Stale totalSents poisons progress % on re-added books in index.html\n\n## Context\nRead pwaScanAndRender() and pwaScanBookFolder(). When scanning, the saved\nprogress is merged: library = scanned.map(b => ({...b,...(saved[b.id]||{})})).\nsaved[b.id] may contain totalSents from a previous book version. If the\nebook has been updated (different sentence count), this stale value persists\nuntil the book is opened and a new totalSents is calculated.\n\n## Fix\nIn the progress merge in pwaScanAndRender(), explicitly drop totalSents from\nthe saved object to force recalculation on next open:\n\n  library = scanned.map(b => {\n    const prog = saved[b.id] || {};\n    const { totalSents: _drop, ...progWithoutSents } = prog; // drop stale count\n    return { ...b, ...progWithoutSents };\n  });\n\ntotalSents will be set correctly when the book is opened and loadEbook()\nfinishes (saveBookProgress() writes the new count).\n\n## Alternative approach\nIf the destructuring approach is complex in the existing code style, use:\n  library = scanned.map(b => {\n    const prog = {...(saved[b.id] || {})};\n    delete prog.totalSents;\n    return {...b, ...prog};\n  });\n\n## Constraints\n- Only drop totalSents from the merge — keep all other saved fields (curSent,\n  syncOffset, wpm, etc.) intact.\n- Do not change how totalSents is written by saveBookProgress().\n- This change is in pwaScanAndRender() only.\n\n## Verification\n- Remove a book, change its ebook to a shorter version, re-add it.\n  Progress % shows correctly (not >100%).\n- Existing books with valid totalSents: progress % unchanged on rescan\n  (totalSents is recalculated on next open, not lost permanently).\n- Run syntax check."

  prompt:"# Fix: configurePlayerForMode called before all handles resolved in index.html\n\n## Context\nRead pwaOpenBook(i) in full. The current flow:\n  1. Resolve audio handle → create blob URL (or show error toast)\n  2. Resolve transcript handle → load text\n  3. Resolve cover handle → create blob URL\n  4. Call configurePlayerForMode(b, resolvedAudioUrl, rate)   ← called after audio attempt\n  5. loadTranscriptData(b)\n  6. Resolve ebook handle → load data\n  7. loadEbook(b, onDone)\n\nIf BOTH audio handle resolution fails AND ebook handle resolution fails later,\nconfigurePlayerForMode has already been called with resolvedAudioUrl=null and\nttsMode was set to true. But then loadEbook also fails — the player is left\nin TTS mode with no content, no error recovery.\n\n## Fix\nMove configurePlayerForMode() to after the ebook handle is resolved,\nso the mode decision has full information:\n\n  1. Resolve audio handle → store resolvedAudioUrl (or null on failure)\n  2. Resolve transcript handle\n  3. Resolve cover handle\n  4. Resolve ebook handle → store ebookData (or null on failure)\n  5. Call configurePlayerForMode(b, resolvedAudioUrl, rate)   ← moved here\n  6. loadTranscriptData(b)\n  7. loadEbook(b, onDone)  ← or show error if ebookData still null\n\nIf both audio and ebook fail, show a clear error toast and return without\ncalling configurePlayerForMode or loadEbook.\n\n## Constraints\n- configurePlayerForMode must still be called before loadTranscriptData.\n- The existing try/catch blocks around each handle resolution must remain.\n- The existing error toasts for audio/ebook failure must remain.\n- Do not change configurePlayerForMode() itself.\n\n## Verification\n- Audio handle resolves, ebook fails: show error toast, don't open player.\n- Both handles fail: single error toast, stay on library screen.\n- Both succeed: normal book open flow.\n- Run syntax check."

  desc:"Once the install banner is dismissed the folio_install_dismissed flag is set with no version key or expiry. Users who dismiss it accidentally can never get the install prompt back without manually clearing localStorage, and the flag persists across major app updates.",
  prompt:"# Fix: folio_install_dismissed flag never expires in index.html\n\n## Context\nRead dismissInstall() in full. It sets localStorage.setItem('folio_install_dismissed','1').\nRead the beforeinstallprompt handler — it checks this flag with getItem().\n\n## Fix\nInstead of a bare '1' flag, store a versioned dismissal with a timestamp:\n\n  function dismissInstall(){\n    document.getElementById('installBanner').classList.remove('show');\n    const rec = { v: 1, ts: Date.now() };\n    localStorage.setItem('folio_install_dismissed', JSON.stringify(rec));\n  }\n\nUpdate the beforeinstallprompt check to:\n  const raw = localStorage.getItem('folio_install_dismissed');\n  if(raw) {\n    try {\n      const rec = JSON.parse(raw);\n      // Expire after 30 days\n      const EXPIRE_MS = 30 * 24 * 60 * 60 * 1000;\n      if(rec.v === 1 && Date.now() - rec.ts < EXPIRE_MS) return;\n      // Expired or wrong version — show banner again\n    } catch(e) {\n      // Legacy bare '1' flag — treat as permanent (don't show)\n      return;\n    }\n  }\n\nThe 30-day expiry means users who accidentally dismiss it will see the\nprompt again after a month. Keep the legacy bare-'1' handling so old\ndismissals are still respected.\n\n## Constraints\n- Do not change installPWA() logic.\n- The banner must not show on every page load if dismissed recently.\n- The 3-second delay before showing the banner must remain.\n\n## Verification\n- Dismiss banner: does not reappear immediately.\n- Simulate expired record (set ts to 0): banner reappears on next load.\n- Legacy bare-'1' flag: still suppresses banner.\n- Run syntax check."

  prompt:"# Perf: Cover + audio blob URLs leaked on PWA rescan in index.html\n\n## Context\nRead pwaOpenBook() in full. When a book is opened in PWA mode, it calls\nURL.createObjectURL(audioFile) for audio and URL.createObjectURL(imgFile)\nfor cover. These are stored in b.audioUrl and b.coverUrl respectively.\nIf the book is closed and reopened (or the library is rescanned), new blob\nURLs are created without revoking the old ones.\n\n## Fix\n\n### Audio URL\nIn pwaOpenBook(), before creating a new audio blob URL:\n  if(b.audioUrl) URL.revokeObjectURL(b.audioUrl);\n  b.audioUrl = resolvedAudioUrl = URL.createObjectURL(audioFile);\n\nThis line is already present in the code — verify it is there. If missing, add it.\n\n### Cover URL\nIn pwaOpenBook(), before creating a new cover blob URL:\n  if(b.coverUrl) URL.revokeObjectURL(b.coverUrl);\n  b.coverUrl = URL.createObjectURL(imgFile);\n\nThis guard is missing — add it.\n\n### goLib() cleanup\nIn goLib(), when leaving the player screen, revoke the current book's blob URLs\nto free memory immediately rather than waiting for the next open:\n  if(curBookIdx >= 0) {\n    const b = library[curBookIdx];\n    if(b && b.audioUrl) { URL.revokeObjectURL(b.audioUrl); b.audioUrl = null; }\n    // Do NOT revoke coverUrl here — it is displayed on library cards\n  }\nAdd this block at the start of goLib(), before curBookIdx = -1.\n\n## Constraints\n- Do NOT revoke coverUrl in goLib() — library cards display cover images.\n- Only revoke URLs that were created via URL.createObjectURL in PWA mode.\n  Browser-mode audioUrl is also a blob URL — the existing revoke-before-assign\n  in pwaOpenBook already handles that path (audioUrl revoke is inside b.audioHandle block).\n- Do not change configurePlayerForMode — it already revokes _audio.src blob if needed.\n\n## Verification\n- Open a book, go back, reopen: no errors in console about revoked object URLs.\n- Run syntax check."

  title:"Timing worker blob URL never revoked",
  desc:"The timing worker is created via URL.createObjectURL() on a Blob but the blob URL is never revoked after the worker is started. Each book open leaks a blob URL that persists for the lifetime of the page.",
  prompt:"# Perf: Timing worker blob URL never revoked in index.html\n\n## Context\nRead getTimingWorker() in full. It creates a Blob Worker via:\n  URL.createObjectURL(blob) → stored in _timingWorkerBlobUrl\n  new Worker(_timingWorkerBlobUrl) → stored in _timingWorker\nThe blob URL is created once and never revoked. Each time the worker is\nrecreated (new book open) a new blob URL leaks.\n\n## Fix\nIn getTimingWorker(), immediately after new Worker(_timingWorkerBlobUrl):\n  URL.revokeObjectURL(_timingWorkerBlobUrl);\n  // The Worker already has a reference to the blob internally; revoking the URL\n  // is safe at this point and frees the string reference from the JS heap.\n\nRevoke immediately after construction — the Worker doesn't need the URL to stay\nalive once it has been instantiated.\n\n## Constraints\n- Do not change _timingWorkerBlobUrl = null — it is used as a guard to check\n  whether the worker Blob has already been created.\n  After revoking, set _timingWorkerBlobUrl = 'revoked' (truthy sentinel) OR\n  keep it set to the URL string (harmless after revoke) — either is fine.\n  The important thing is the revoke call is placed right after new Worker().\n- Do not change worker message handling, watchdog, or error paths.\n- One revoke call only — do not revoke on every buildSentenceTimings call.\n\n## Verification\n- Open several books sequentially. No growing blob: URLs in DevTools → Memory.\n- Run syntax check."

  prompt:"# Perf: pwaScanBookFolder has no early exit in index.html\n\n## Context\nRead pwaScanBookFolder(folderName, entry) in full. It iterates all files\nin a directory entry. After the loop, it checks if audioFile && ebookFile\nare filled. But the loop continues even after all four slots are filled.\n\n## Fix\nAdd an early-exit check at the bottom of the for-await loop body. After\neach file is assigned to a slot, check if all slots are filled:\n\n  // After the if/else chain that assigns to audioFile, ebookFile, etc.:\n  if(audioFile && ebookFile && transcriptFile && coverFile) break;\n\nThis exits the loop as soon as all four slots are populated, skipping\nany remaining files in the folder.\n\n## Where to place it\nAt the very end of the for-await loop body, after all the if/else\nassignment conditions. The break exits the for-await loop.\n\n## Constraints\n- The break must come after ALL assignment conditions in the loop body,\n  not inside any of them.\n- The logic that chooses preferred JSON/image files (prefer \"transcript\"\n  in name, prefer \"cover\" in name) happens in a second pass AFTER the loop\n  — this is NOT changed. The break only applies to the main loop.\n- Verify: if audioFile is filled on file 1 but ebookFile is not yet filled\n  on file 2, the loop must continue until ebookFile is also found or exhausted.\n\n## Verification\n- A folder with 50 files where the book files are first: scan time reduced.\n- A folder where book files are last: scan result unchanged (all files checked).\n- Run syntax check."

  desc:"In PWA mode the raw ebook text string read from the file handle is kept in the library entry after loadEbook() has finished building the DOM. The string can be several MB for large books and is never needed again after rendering — it should be nulled out to reduce memory pressure.",
  prompt:"# Perf: Ebook data string held in memory after DOM is built (PWA only) in index.html\n\n## Context\nRead pwaOpenBook(i) — it sets b.ebookData from the file handle.\nRead loadEbook(book, onDone) — it reads book.ebookData to build the DOM.\nAfter loadEbook() completes (onDone fires), ebookData is no longer needed\nbecause the DOM is already built and sentences[] is populated.\nIn PWA mode, ebookData can be several MB for large books.\n\n## Fix\nAt the end of the onDone callback in pwaOpenBook() — after curSent, updateHL,\nupdateProg, seekAudioToSentence, pulseResumeSent — add:\n  b.ebookData = null; // free memory — DOM is already built\n\nSimilarly, null it in the browser-mode openBook() onDone callback as well,\nsince in browser mode the data is in IndexedDB and can be reloaded from there\nif needed (though reloading the page is the only scenario where it would be\nneeded again):\n  b.ebookData = null; // DOM built, data no longer needed in memory\n\n## Constraints\n- Only null it INSIDE the onDone callback (after DOM is fully built).\n- Do not null it before onDone — loadEbook() reads ebookData throughout\n  the async build process.\n- biReassign() (ebook reassign) reloads the ebook from the new file and\n  calls loadEbook() again — this is fine because it reassigns b.ebookData\n  from the new FileReader result before calling loadEbook().\n- In PWA mode, the handle (b.ebookHandle) is still valid for future reloads.\n\n## Verification\n- Open a large EPUB. After onDone fires, b.ebookData is null in console.\n- Go back to library and reopen: pwaOpenBook re-reads from handle, works normally.\n- Run syntax check."

  title:"content-visibility intrinsic size hint may cause layout shifts",

  prompt:"# Perf: content-visibility intrinsic size hint layout shifts in index.html\n\n## Context\nRead the CSS for .ebook-para. It uses:\n  content-visibility: auto;\n  contain-intrinsic-size: auto 80px;\nThe 80px estimate is wrong for most paragraphs and causes layout jumps\nas the browser corrects its size estimate when paragraphs scroll into view.\n\n## Fix\nChange the contain-intrinsic-size to use the 'auto' keyword which caches\nthe last measured size instead of using a fixed estimate:\n\n  .ebook-para {\n    content-visibility: auto;\n    contain-intrinsic-size: auto 120px;  /* 120px is a better starting estimate */\n  }\n\nThe 'auto' prefix before the size value (already present) means the browser\nremembers the actual rendered size after first paint — subsequent scrolling\nback to a paragraph uses the cached size instead of the estimate. The 80px\nhint is only used on first render before measurement; 120px is closer to\nan average paragraph height at default font size.\n\nAdditionally, check if contain-intrinsic-block-size would be more\nappropriate (only constrains block/vertical axis) — use it if supported:\n  contain-intrinsic-block-size: auto 120px;\n\n## Constraints\n- CSS-only change. Do not remove content-visibility: auto — it is a\n  significant performance win for long books.\n- Do not change any other .ebook-para properties (margins, font, etc).\n- If contain-intrinsic-block-size is used, keep the auto prefix.\n\n## Verification\n- Open a long book. Scroll quickly through it. No visible layout jumps.\n- Run syntax check (JS unchanged)."

  title:"Chapter skip buttons — jump to next/previous chapter",
  desc:"Navigation jumps either one sentence (nudge) or opens the full TOC sidebar — there is no quick way to skip to the next or previous chapter without tapping through the TOC.",
  prompt:"# Feature: Chapter skip buttons in index.html\n\n## Context\nRead folio-context.md TOC section. tocEntries[] holds {text, level, sentIdx}\nfor each heading. nudge(n) advances one sentence. The top bar has icon buttons\n(#optBtn, #tocBtn, #txBtn). Read the .top-bar HTML in full.\n\n## Implementation\n\n### JS\nAdd a function that finds the next/previous chapter boundary:\n  function skipChapter(dir) {\n    // dir: 1 = next chapter, -1 = previous chapter\n    if(!tocEntries.length) { nudge(dir); return; }\n    let target = -1;\n    if(dir > 0) {\n      // Next: first tocEntry with sentIdx > curSent\n      for(let i = 0; i < tocEntries.length; i++) {\n        if(tocEntries[i].sentIdx > curSent) { target = tocEntries[i].sentIdx; break; }\n      }\n      if(target < 0) target = sentences.length - 1; // at last chapter, go to end\n    } else {\n      // Previous: last tocEntry with sentIdx < curSent - 1\n      // (subtract 1 so pressing prev at sentence 1 of chapter 3 goes to chapter 2)\n      for(let i = tocEntries.length - 1; i >= 0; i--) {\n        if(tocEntries[i].sentIdx < curSent - 1) { target = tocEntries[i].sentIdx; break; }\n      }\n      if(target < 0) target = 0; // already at/before first chapter\n    }\n    curSent = target; curWord = 0;\n    updateHL(); updateProg(); saveBookProgressDebounced();\n    if(autoScroll) scrollToSent(curSent, true);\n    if(ttsMode && mediaState === 'playing') { ttsStop(); ttsPlay(); }\n    else if(ttsMode && mediaState === 'paused') { ttsStop(); }\n    else if(!ttsMode) seekAudioToSentence();\n  }\n\n### HTML\nIn the .top-bar (or the seek-strip area), add two small chapter-skip buttons.\nA good location is near the nudge/skip controls. Add to the seek strip row:\n  <button class=\"ic-btn\" title=\"Previous chapter\" onclick=\"skipChapter(-1)\">⏮</button>\n  <button class=\"ic-btn\" title=\"Next chapter\" onclick=\"skipChapter(1)\">⏭</button>\n\nPlace them flanking the seek bar or inside the speed-strip area where space allows.\n\n## Constraints\n- skipChapter() must work in both audio mode and TTS mode.\n- If tocEntries is empty, fall back to nudge() for graceful degradation.\n- Do not modify nudge() or advanceSent().\n- seekAudioToSentence() is called in audio mode to seek the audio to the new sentence.\n\n## Verification\n- Audio mode: tap next chapter → audio seeks and highlight jumps to chapter start.\n- TTS mode playing: tap next chapter → TTS restarts from chapter start.\n- No TOC (book without headings): buttons still work via nudge() fallback.\n- Run syntax check."

  prompt:"# Fix: Shift+Arrow skip is silent no-op in TTS mode in index.html\n\n## Context\nRead the keydown handler in full (the keyboard shortcuts section).\nskip(n) is called by Shift+ArrowRight/Left. Read skip() in full to see\nwhat it does in TTS mode.\n\n## Root cause\nskip(n) calls _audio.currentTime += n, which does nothing in TTS mode\n(no audio element). It returns silently with no feedback.\n\n## Fix\nIn the keyboard shortcut handler, change the Shift+Arrow case:\n\n  case 'ArrowRight':\n    e.preventDefault();\n    if(e.shiftKey) {\n      if(ttsMode) skipChapter(1);  // or nudge(5) as a sentence skip fallback\n      else skip(15);\n    } else {\n      nudge(1);\n    }\n    break;\n\n  case 'ArrowLeft':\n    e.preventDefault();\n    if(e.shiftKey) {\n      if(ttsMode) skipChapter(-1); // or nudge(-5)\n      else skip(-15);\n    } else {\n      nudge(-1);\n    }\n    break;\n\nIf skipChapter() is not yet implemented (pending prompt #28), use nudge(10)\nand nudge(-10) as the TTS fallback instead, and add a toast:\n  showToast('Skipped 10 sentences');\n\n## Constraints\n- Do not change skip() itself — it is correct for audio mode.\n- In TTS mode, Shift+Arrow must do something visible — either skipChapter\n  or a multi-sentence nudge with a toast.\n- Do not change the non-shift Arrow behaviour (nudge ±1).\n\n## Verification\n- Audio mode, Shift+→: skips 15 seconds as before.\n- TTS mode, Shift+→: skips to next chapter (or 10 sentences) with feedback.\n- TTS mode, Shift+←: goes to previous chapter (or back 10 sentences).\n- Run syntax check."

  desc:"Returning to the library while audio is playing shows no visual connection between the active book card and the ongoing playback — users have no way to identify which book is playing at a glance.",
  prompt:"# Feature: Currently-playing indicator on library cards in index.html\n\n## Context\nRead renderLib() in full. Read goLib() — it sets curBookIdx = -1 when\nleaving. When the user returns to the library while audio is playing,\ncurBookIdx is still set (the user may go back without stopping).\nRead the .book-card CSS.\n\n## Implementation\n\n### JS change in renderLib()\nIn the card-building loop, after card.className = 'book-card', add:\n  if(i === curBookIdx && mediaState === 'playing') {\n    card.classList.add('playing-card');\n  }\n\nAlso add a small \"Now Playing\" badge to the card HTML inside card.innerHTML,\nrendered only if i === curBookIdx && mediaState === 'playing':\n  ${i === curBookIdx && mediaState === 'playing'\n    ? '<div class=\"now-playing-badge\">▶ Now Playing</div>' : ''}\n\nPlace the badge inside .book-info, below .book-meta.\n\n### CSS\n  .now-playing-badge {\n    font-size: 10px; font-weight: 700; color: var(--accent);\n    letter-spacing: .04em; margin-top: 4px;\n    text-transform: uppercase;\n  }\n  .playing-card {\n    border-color: var(--accent);\n  }\n  .playing-card .book-cover {\n    box-shadow: 0 0 0 2px var(--accent);\n  }\n\n## Constraints\n- renderLib() is called every time the library is rendered. The check\n  curBookIdx >= 0 && mediaState === 'playing' is safe (both are globals).\n- Do not change goLib() — curBookIdx is reset there when navigating away\n  from the player, which is correct (user has stopped the session).\n- No timer or polling needed — renderLib() is called when navigating\n  to the library via goLib(), which reads current state at that moment.\n\n## Verification\n- Play a book. Press back. Library shows the playing card highlighted\n  with \"▶ Now Playing\" badge and accent border.\n- Pause, press back: no indicator (mediaState !== 'playing').\n- Stop playback from library: re-render removes the indicator.\n- Run syntax check."

uire CSS z-index adjustments.\n- If moving is complex: create a minimal second display-only panel for\n  the library screen with only font/theme/size controls. Keep the full\n  panel in the player.\n- Do not break the existing player settings flow.\n\n## Verification\n- Library screen: settings button visible, opens Display options.\n- Player screen: all three tabs available as before.\n- Theme/font/size changes from library are reflected immediately.\n- Run syntax check."

  prompt:"# Feature: Faster audiobook relinking (remember filepath) in index.html\n\n## Context\nRead showRelink() and rlLoad() in full. When a browser-mode blob URL expires\n(page reload), the user must re-select the audio file from scratch. The filename\n(b.audioName) is already saved. In PWA mode, file handles are persistent and\nthis issue doesn't apply.\n\n## Fix for browser mode\nStore the audio file itself in a module-level variable when first loaded,\nso relinking only requires confirmation rather than re-picking the file.\n\nSince browser storage can't hold File objects across sessions, the best\napproach is: remember the last-used File objects in a module-level Map\nduring the current session:\n  const _sessionFiles = new Map(); // bookId → { audio: File | null }\n\nIn addBook() (after reading the audio File from upData.audio), store it:\n  _sessionFiles.set(book.id, { audio: upData.audio });\n\nIn rlLoad(), after successfully linking the audio:\n  _sessionFiles.set(b.id, { audio: f });\n\nIn showRelink(), check if a session File is cached for this book:\n  const cached = _sessionFiles.get(library[i]?.id);\n  if(cached?.audio) {\n    // Show a \"Reuse [filename]\" button in addition to the file picker\n    // so the user can re-link with one tap\n  }\n\nAdd a \"Reuse [filename]\" button to the relink overlay HTML (conditionally\nshown from showRelink() when a cached file exists):\n  <button id=\"relinkReuseBtn\" style=\"display:none\"\n    onclick=\"rlReuseSession()\">Reuse [filename]</button>\n\n  function rlReuseSession() {\n    const cached = _sessionFiles.get(library[curBookIdx]?.id);\n    if(cached?.audio) rlLoad(cached.audio);\n  }\n\n## Constraints\n- Session cache is memory-only — not persisted to localStorage/IDB.\n- Works within a single page session only.\n- In PWA mode, showRelink() is never called (handles are persistent) — no change needed.\n- Do not change the file picker path — it must still work when no cached file exists.\n\n## Verification\n- Add a book with audio. Reload page (blob URL expires). Tap book → relink overlay.\n  If session is still alive: \"Reuse\" button shown, one tap re-links.\n- Fresh session: no \"Reuse\" button, file picker works normally.\n- Run syntax check."
