<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Folio — Prompt Library</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#21262d;
  --border:#30363d; --text:#e6edf3; --text2:#8b949e; --text3:#484f58;
  --accent:#5b8def; --green:#3fb950; --yellow:#d29922; --red:#f85149;
  --orange:#f0883e;
  --radius:10px; --font:'DM Sans',system-ui,sans-serif; --mono:'Courier New',monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

.page { max-width:760px; margin:0 auto; padding:40px 20px 80px; }
.page-header { margin-bottom:32px; }
.page-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; }
.page-sub { font-size:13px; color:var(--text2); }

/* Stats row */
.stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px; }
.stat {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:8px 14px; display:flex; align-items:center; gap:8px;
}
.stat-num { font-size:18px; font-weight:700; }
.stat-num.active { color:var(--accent); }
.stat-num.done   { color:var(--green); }
.stat-num.defer  { color:var(--text3); }
.stat-label { font-size:11px; color:var(--text2); line-height:1.3; }

/* Filter bar */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:28px; }
.filter-btn {
  padding:5px 14px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--text2); font-family:var(--font);
  font-size:12px; font-weight:500; cursor:pointer; transition:all .15s;
}
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.filter-btn.done-btn.active { background:var(--green); border-color:var(--green); color:#fff; }

/* Section heading */
.section-heading {
  font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--text3); margin:32px 0 12px; display:flex; align-items:center; gap:10px;
}
.section-heading::after { content:''; flex:1; height:1px; background:var(--border); }
.section-heading:first-child { margin-top:0; }
.section-count {
  font-size:10px; font-weight:700; background:var(--surface2);
  border:1px solid var(--border); color:var(--text3);
  padding:1px 7px; border-radius:20px; letter-spacing:0; flex-shrink:0;
}

/* Prompt card */
.prompt-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:12px; transition:border-color .15s;
}
.prompt-card:hover { border-color:var(--text3); }
.prompt-card.done-card { opacity:.55; }
.prompt-card.done-card:hover { opacity:1; border-color:rgba(63,185,80,.35); }
.prompt-card.backlog-card { opacity:.65; border-style: dashed; }
.prompt-card.backlog-card:hover { opacity:1; border-color:rgba(210,153,34,.4); border-style:solid; }

.card-header {
  display:flex; align-items:center; gap:10px; padding:14px 16px;
  cursor:pointer; user-select:none;
}
.prompt-card.open .card-header { border-bottom:1px solid var(--border); }
.card-header:hover .card-title { color:var(--accent); }
.done-card .card-header:hover .card-title { color:var(--green); }

.card-num {
  width:26px; height:26px; border-radius:6px; background:var(--surface2);
  border:1px solid var(--border); font-size:11px; font-weight:700;
  color:var(--text2); display:flex; align-items:center; justify-content:center;
  flex-shrink:0; letter-spacing:-.02em;
}
.done-card .card-num {
  background:rgba(63,185,80,.1); border-color:rgba(63,185,80,.3); color:var(--green);
}
.card-meta { flex:1; min-width:0; }
.card-title { font-size:14px; font-weight:600; color:var(--text); transition:color .15s; }
.card-tags { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }

.tag {
  font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  padding:2px 8px; border-radius:20px;
}
.tag-fix    { background:rgba(248,81,73,.12);  color:#f85149; border:1px solid rgba(248,81,73,.2); }
.tag-feat   { background:rgba(63,185,80,.12);  color:#3fb950; border:1px solid rgba(63,185,80,.2); }
.tag-sonnet { background:rgba(91,141,239,.12); color:var(--accent); border:1px solid rgba(91,141,239,.2); }
.tag-done   { background:rgba(63,185,80,.1);   color:var(--green); border:1px solid rgba(63,185,80,.25); }
.tag-defer  { background:rgba(72,79,88,.2); color:#8b949e; border:1px solid #30363d; }
.tag-backlog{ background:rgba(210,153,34,.1); color:var(--yellow); border:1px solid rgba(210,153,34,.25); }
.tag-perf   { background:rgba(165,120,255,.12); color:#a578ff; border:1px solid rgba(165,120,255,.2); }
.tag-effort-low  { background:rgba(57,210,192,.1);  color:#39d2c0; border:1px solid rgba(57,210,192,.2); }
.tag-effort-med  { background:rgba(240,136,62,.1);  color:var(--orange); border:1px solid rgba(240,136,62,.2); }
.tag-effort-high { background:rgba(232,90,173,.1);  color:#e85aad; border:1px solid rgba(232,90,173,.2); }

.card-chevron { font-size:12px; color:var(--text3); transition:transform .2s; flex-shrink:0; }
.prompt-card.open .card-chevron { transform:rotate(180deg); }

.card-body { display:none; }
.prompt-card.open .card-body { display:block; }

.card-desc { padding:14px 16px 0; font-size:13px; color:var(--text2); line-height:1.6; }

.prompt-wrap { position:relative; margin:12px 16px 16px; }
.prompt-text {
  background:#0d1117; border:1px solid var(--border); border-radius:8px;
  padding:16px 16px 48px; font-family:var(--mono); font-size:12px; line-height:1.7;
  color:#c9d1d9; white-space:pre-wrap; word-break:break-word;
  max-height:400px; overflow-y:auto;
}
.copy-bar {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, #0d1117 40%);
  padding:20px 12px 10px; display:flex; justify-content:flex-end;
  border-radius:0 0 8px 8px; pointer-events:none;
}
.copy-btn {
  pointer-events:all; display:flex; align-items:center; gap:6px;
  padding:7px 16px; border-radius:6px; background:var(--surface2);
  border:1px solid var(--border); color:var(--text); font-family:var(--font);
  font-size:12px; font-weight:600; cursor:pointer; transition:all .15s;
}
.copy-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
.copy-btn.copied { background:rgba(63,185,80,.15); border-color:rgba(63,185,80,.4); color:#3fb950; }
.copy-icon { font-size:13px; }

.empty { text-align:center; padding:60px 20px; color:var(--text3); font-size:14px; display:none; }

/* Add-prompt button */
.add-btn {
  display:flex; align-items:center; gap:8px;
  padding:8px 18px; border-radius:8px;
  background:var(--surface); border:1px solid var(--border);
  color:var(--text2); font-family:var(--font); font-size:13px;
  font-weight:600; cursor:pointer; transition:all .15s;
  margin-bottom:28px;
}
.add-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }

/* Modal overlay */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.65); z-index:100;
  align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); width:100%; max-width:600px;
  max-height:90vh; display:flex; flex-direction:column;
}
.modal-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; border-bottom:1px solid var(--border);
}
.modal-head h2 { font-size:15px; font-weight:700; }
.modal-close {
  background:none; border:none; color:var(--text2); font-size:18px;
  cursor:pointer; line-height:1; padding:4px;
}
.modal-close:hover { color:var(--text); }
.modal-body { padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }

.field label {
  display:block; font-size:11px; font-weight:700; letter-spacing:.06em;
  text-transform:uppercase; color:var(--text2); margin-bottom:6px;
}
.field input, .field select, .field textarea {
  width:100%; background:#0d1117; border:1px solid var(--border);
  border-radius:6px; padding:9px 12px; color:var(--text);
  font-family:var(--font); font-size:13px; outline:none;
  transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color:var(--accent);
}
.field textarea { font-family:var(--mono); font-size:12px; resize:vertical; min-height:120px; }
.field select option { background:var(--surface2); }

.row-fields { display:flex; gap:12px; }
.row-fields .field { flex:1; }

.modal-foot {
  display:flex; justify-content:flex-end; gap:10px;
  padding:14px 20px; border-top:1px solid var(--border);
}
.btn-cancel {
  padding:8px 18px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--text2); font-family:var(--font);
  font-size:13px; font-weight:600; cursor:pointer;
}
.btn-cancel:hover { color:var(--text); border-color:var(--text2); }
.btn-save {
  padding:8px 18px; border-radius:6px; border:1px solid var(--accent);
  background:var(--accent); color:#fff; font-family:var(--font);
  font-size:13px; font-weight:600; cursor:pointer; transition:background .15s;
}
.btn-save:hover { background:#4a7bde; }

/* Custom-card marker */
.tag-custom { background:rgba(232,90,173,.1); color:#e85aad; border:1px solid rgba(232,90,173,.2); }
.tag-date   { background:rgba(139,148,158,.1); color:var(--text2); border:1px solid rgba(139,148,158,.2); }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="page">

  <div class="page-header">
    <div class="page-title">Folio — Prompt Library</div>
    <div class="page-sub">Click a card to expand · Copy button grabs the full prompt</div>
  </div>

  <div class="stats-row">
    <div class="stat"><span class="stat-num active" id="statActive">0</span><span class="stat-label">Active</span></div>
    <div class="stat"><span class="stat-num done"   id="statDone">0</span><span class="stat-label">Completed</span></div>
    <div class="stat"><span class="stat-num" style="color:var(--yellow)" id="statBacklog">0</span><span class="stat-label">Backlog</span></div>
    <div class="stat"><span class="stat-num defer"  id="statDefer">0</span><span class="stat-label">Deferred</span></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active"   onclick="filter('all',this)">All</button>
    <button class="filter-btn"          onclick="filter('active',this)">Active</button>
    <button class="filter-btn done-btn" onclick="filter('done',this)">Completed</button>
    <button class="filter-btn"          onclick="filter('backlog',this)">Backlog</button>
    <button class="filter-btn"          onclick="filter('fix',this)">Fixes</button>
    <button class="filter-btn"          onclick="filter('feat',this)">Features</button>
    <button class="filter-btn"          onclick="filter('perf',this)">Perf</button>
  </div>

  <button class="add-btn" onclick="openAddModal()">&#43; Add prompt</button>

  <div id="cards"></div>
  <div class="empty" id="empty">No prompts match this filter.</div>

</div><!-- /.page -->

<!-- Add-prompt modal -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h2>Add new prompt</h2>
      <button class="modal-close" onclick="closeAddModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="f-title" placeholder="Short description of the task">
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="f-desc" placeholder="One-line context for what this fixes or adds">
      </div>
      <div class="row-fields">
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option value="active">Active</option>
            <option value="backlog">Backlog</option>
            <option value="deferred">Deferred</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="field">
          <label>Type</label>
          <select id="f-type">
            <option value="feat">Feature</option>
            <option value="fix">Fix</option>
            <option value="perf">Perf</option>
          </select>
        </div>
        <div class="field">
          <label>Effort</label>
          <select id="f-effort">
            <option value="low">Low</option>
            <option value="med">Med</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <div class="field" id="f-done-wrap" style="display:none">
        <label>Completed date</label>
        <input type="date" id="f-done">
      </div>
      <div class="field">
        <label>Prompt text</label>
        <textarea id="f-prompt" placeholder="Paste or write the full prompt here…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save"   onclick="saveNewPrompt()">Save prompt</button>
    </div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  PROMPT DATA — only edit between these two markers       ║
// ║  status: 'active' | 'done' | 'deferred'                  ║
// ╚══════════════════════════════════════════════════════════╝
const PROMPTS = [

  // ── Active ────────────────────────────────────────
  {
  num:"1", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"Audiobook + ebook with no transcript — undefined UX",
  desc:"No defined behaviour for when an audiobook and ebook are loaded but no transcript is present. Should show a banner explaining the state and surface the transcript upload action. High risk of confusing new users.",
  prompt:"# Fix: Audiobook + ebook with no transcript — undefined UX in index.html\n\n## Context\nRead loadTranscriptData(b) in full. Read setBannerState() in full.\nRead the tx-banner CSS section and the player screen HTML breakdown.\nWhen a book has audio + ebook but no transcript (b.transcriptType is null),\nloadTranscriptData() returns immediately after setBannerState('hidden').\nThe user sees no transcript banner, no explanation, and no action to fix it.\n\n## Fix\nIn loadTranscriptData(b), in the early-return path where !b.transcriptType:\n\n1. Instead of just calling setBannerState('hidden') and returning, check if\n   the book has an audio file but no transcript:\n     if(!b.transcriptType) {\n       if(b.audioUrl || b.audioHandle) {\n         setBannerState('notx'); // new state\n       } else {\n         setBannerState('hidden');\n       }\n       return;\n     }\n\n2. Add a 'notx' state to setBannerState():\n   - Give it a distinct icon (e.g. 📝 with a ? or ⚠️).\n   - Text: \"No transcript — highlights unavailable\"\n   - Detail: \"Add a transcript for word-level highlighting\"\n   - Add a small \"Add transcript\" action link/button inside the banner\n     that calls openTranscriptModal() when tapped.\n\n3. CSS: add a .tx-banner.notx rule styled similarly to .tx-banner.ready\n   but with a muted amber/yellow colour (use --yellow or var(--text3)).\n\n## HTML change\nIn the #txBanner HTML, ensure there is a container for the action link\n(the banner likely already has a slot for detail text — add the button\nafter #txBannerDetail):\n  <button id=\"txBannerAction\" class=\"tx-banner-action\" onclick=\"openTranscriptModal()\"\n    style=\"display:none\">Add transcript →</button>\n\nIn setBannerState(), show/hide #txBannerAction based on whether state==='notx'.\n\n## Constraints\n- Do not change the 'hidden', 'loading', 'syncing', 'ready', 'error' states.\n- openTranscriptModal() already exists — just call it.\n- PWA mode: the transcript modal works for PWA too (biReassign handles PWA save).\n\n## Verification\n- Open a book with audio + ebook, no transcript: banner shows \"No transcript\" message\n  with an \"Add transcript\" button.\n- Tap \"Add transcript\": transcript modal opens.\n- Add a transcript: banner transitions to loading → syncing → ready.\n- Open a TTS-only book (no audio): banner stays hidden.\n- Run syntax check."
  },

  {
  num:"2", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"No auto-link audiobook on mobile",
  desc:"Should auto-link an audiobook if one is present in the selected folder on mobile. No matching logic exists yet.",
  prompt:"# Fix: No auto-link audiobook on mobile (PWA folder scan) in index.html\n\n## Context\nRead pwaScanBookFolder() in full. It already detects audioFile by extension.\nIn browser mode, addBook() creates a blob URL immediately. In PWA mode, the\naudioHandle is stored but the URL is only created when the book is opened\n(pwaOpenBook creates the URL from the handle).\n\nThe issue: in browser mode, when a folder is selected via the Add Book modal,\nthe audio file is detected but the user still has to manually click \"Audio\"\nto assign it. The auto-assignment happens in folderChosen() for audio and ebook,\nbut may not work on some mobile browsers.\n\n## Investigation first\nRead folderChosen() in full. Check:\n1. Does it call assignFileToPill(audioFile, 'audio') automatically?\n2. If yes, why does it not work on some mobile browsers?\n3. Check if AUDIO_EXTS includes all common mobile audio formats (.m4b, .aac).\n\n## Fix based on investigation\nIf folderChosen() already auto-assigns but the file isn't detected:\n- Check if AUDIO_EXTS = new Set([...]) includes 'm4b' and 'aac'.\n  If missing, add them.\n- Check if the file extension detection is case-sensitive. Add .toLowerCase()\n  if not already present.\n\nIf folderChosen() does not auto-assign audio (unlikely given the code):\n- Add: const audioFile = files.find(f => AUDIO_EXTS.has(f.name.split('.').pop().toLowerCase()));\n  if(audioFile) assignFileToPill(audioFile, 'audio');\n\nFor PWA mode specifically — if m4b files in a PWA folder are not being\ndetected as audio:\n- In pwaScanBookFolder(), check that 'm4b' is in AUDIO_EXTS (it should be,\n  as it's in the constant declaration). If it's not, add it.\n\n## Constraints\n- Only fix the detection / auto-assignment plumbing.\n- Do not change pwaOpenBook() audio URL creation.\n- If AUDIO_EXTS already has 'm4b' and folderChosen() already auto-assigns,\n  write a comment explaining the investigation found no bug and the item\n  can be closed.\n\n## Verification\n- Select a folder containing book.mp3 + book.epub: both auto-assigned.\n- Select a folder containing book.m4b: audio auto-assigned.\n- Run syntax check."
  },

  {
  num:"3", status:"active", type:"feat", model:"sonnet", effort:"med",
  title:"Empty library onboarding — no guidance for new users",
  desc:"A first-time user sees a blank grid and a + card with no explanation of what Folio does, what files it accepts, or how to get started — critical to fix before Play Store submission.",
  prompt:"# Feature: Empty library onboarding in index.html\n\n## Context\nRead renderLib() in full. It renders the grid of book cards. In browser mode,\nwhen library is empty, it renders only the + Add Book card with no explanation.\nIn PWA mode with no books scanned, pwaScanAndRender() shows a \"No books found\"\nmessage but it's sparse. This is the first thing new users see.\n\n## Task\nWhen the library grid is empty (no books), show an onboarding card above the +\nAdd Book card that explains what Folio is and how to get started.\n\n### Browser mode\nIn renderLib(), before appending the add-card, if library.length === 0:\n  const onboard = document.createElement('div');\n  onboard.className = 'onboard-card';\n  onboard.innerHTML = `\n    <div class=\"onboard-title\">Welcome to Folio</div>\n    <div class=\"onboard-body\">\n      Read ebooks with synced audio highlighting.\n      Add a book to get started — you'll need an audio file (.mp3, .m4b, etc.)\n      and an ebook (.epub, .txt, .html, or .md).\n      Add a Whisper transcript (.json) for word-level sync.\n    </div>`;\n  grid.appendChild(onboard);\n\n### PWA mode\nIn the pwaScanAndRender() empty-state block (where it currently shows\n\"No books found in X\"), replace the existing minimal message with richer HTML:\n  - Folder name displayed\n  - Brief instructions: each book needs its own subfolder\n  - Accepted file types\n\n### CSS\nAdd to stylesheet:\n  .onboard-card {\n    grid-column: 1 / -1;\n    background: var(--surface); border: 1px dashed var(--border);\n    border-radius: var(--radius); padding: 28px 24px; margin-bottom: 8px;\n    text-align: center;\n  }\n  .onboard-title {\n    font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 10px;\n  }\n  .onboard-body {\n    font-size: 13px; color: var(--text2); line-height: 1.6; max-width: 420px;\n    margin: 0 auto;\n  }\n\n## Constraints\n- Only show when library.length === 0 (browser mode) or scan returns 0 books (PWA).\n- Once a book is added, the card must not appear (renderLib() rebuilds the grid).\n- No changes to openModal(), addBook(), or scan logic.\n- Keep it concise — this is not a tutorial, just context.\n\n## Verification\n- Fresh browser mode (no books): onboarding card visible above + Add Book.\n- Add a book: onboarding card disappears, book card shows.\n- PWA mode, empty folder: improved empty state message.\n- Run syntax check."
  },

  {
  num:"4", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"loadEbook has no cancellation — race on rapid book switching",
  desc:"Opening a book then immediately opening a different one can leave two concurrent chunked DOM builds writing to #eContent — the old book’s async chunks can land after the new book has started rendering, corrupting the reader.",
  prompt:"# Fix: loadEbook has no cancellation — race on rapid book switching in index.html\n\n## Context\nRead loadEbook(book, onDone) in full. It builds the ebook DOM in async chunks\nusing yieldToMain(). If the user opens book A and immediately opens book B,\ntwo concurrent loadEbook() calls write to the same #eContent element and\npush to the same sentences[] array.\n\n## Fix\nAdd a monotonic load generation counter:\n  let _ebookLoadGen = 0;\n\nAt the start of loadEbook():\n  const myGen = ++_ebookLoadGen;\n\nAt every point after an await yieldToMain() inside the chunked build loop,\nadd a stale-check before continuing:\n  if(myGen !== _ebookLoadGen) return; // newer load started — abandon this one\n\nThe stale-check must appear:\n1. After each await yieldToMain() inside the while(i < items.length) loop.\n2. Before the final content.appendChild(frag) call.\n3. Before setBannerState('hidden').\n4. Before the onDone() call — only call onDone if this is still the active load.\n\n## Where to place the check\nInside the loop:\n  await yieldToMain();\n  if(myGen !== _ebookLoadGen) return;  // ← add after every yield\n\nBefore final flush and onDone:\n  if(myGen !== _ebookLoadGen) return;\n  content.appendChild(frag);\n  setBannerState('hidden');\n  // ... attach click handler, buildToc, buildSentenceTimings, onDone() ...\n\n## Constraints\n- Do not add any new UI state or error toasts for the abandoned load.\n- Do not change the chunk size, yield frequency, or build logic.\n- _ebookLoadGen is module-level; reset is not needed (monotonic counter is fine).\n- Do not guard the initial content.innerHTML wipe or items parsing with myGen —\n  only guard after yields.\n\n## Verification\n- Open book A. Immediately open book B. Only book B's content appears.\n- Open book A normally (no race): loads correctly.\n- Run syntax check."
  },

  {
  num:"5", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"Text alignment resets on book reopen",
  desc:"Text alignment set in Display options is lost when closing and reopening a book — loadEbook() wipes #eContent innerHTML which discards the inline style, and setAlign() is not called again after the ebook finishes loading.",
  prompt:"# Fix: Text alignment resets on book reopen in index.html\n\n## Context\nRead loadEbook() in full. It wipes #eContent innerHTML on line ~2684:\n  content.innerHTML = '<p ...>Loading…</p>';\nThis destroys any inline style.textAlign previously set by setAlign().\nRead loadDisplayPrefs() — it calls setAlign() at startup only.\nRead setAlign() — it sets document.getElementById('eContent').style.textAlign directly.\n\n## Root cause\nloadEbook() is called on every book open. After it wipes innerHTML and\nrebuilds the DOM, the inline textAlign on #eContent is gone because the\nelement reference is the same but innerHTML assignment does not restore\ninline styles.\n\n## Fix\nAt the end of loadEbook(), after the final content.appendChild(frag) and\nsetBannerState('hidden'), reapply the saved text alignment:\n\n  // Restore text alignment from saved prefs\n  const savedAlign = document.querySelector('[id^=alignPill].active')?.id?.replace('alignPill-','');\n  if(savedAlign) content.style.textAlign = savedAlign;\n\nThis reads the currently-active alignment pill (which loadDisplayPrefs set at\nstartup) and reapplies it to the newly-built content.\n\nAlternatively, read it from the _fontBody pattern: save the alignment as a\nmodule-level variable _textAlign (similar to _fontBody, _fontSize etc.) and\nset it in setAlign(). Then in loadEbook()'s onDone path, apply content.style.textAlign = _textAlign.\n\nUse whichever approach is simpler and consistent with the existing pattern.\nThe _textAlign variable approach is preferred for consistency with _fontBody etc.\n\n## Constraints\n- Do not change saveDisplayPrefs() or loadDisplayPrefs() beyond adding\n  the new _textAlign variable if that approach is used.\n- The fix must be inside loadEbook(), not in openBook() or onDone callbacks.\n- Do not wipe the content element's textAlign at any point after setting it.\n\n## Verification\n- Set text alignment to Justify. Close book. Reopen. Text is still justified.\n- Change to Center. Open a different book. Alignment is Center.\n- Run syntax check."

  {
  num:"6", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"Sentence splitter breaks on common abbreviations and quoted dialogue",
  desc:"splitSentences() treats i.e., e.g., Fig., p. (page), and No. as sentence boundaries, corrupting highlighting and transcript sync for non-fiction. Quoted dialogue is also split incorrectly: \"He said \\\"Stop!\\\" and ran away\" becomes two fragments because the regex fires on the closing quote.",
  prompt:"# Fix: Sentence splitter breaks on abbreviations and quoted dialogue in index.html\n\n## Context\nRead splitSentences(text) in full (it appears twice: once in _timingWorkerFn\nas the serialised worker copy, and once in the main script below as the\nstandalone version called from loadEbook). Both copies must be updated\nidentically — they must stay in sync.\n\nCurrent regex lookbehind:\n  (?<!\\b(?:Dr|Mr|Mrs|Ms|Prof|Rev|Sr|Jr|St|vs|etc|vol|ch|no))\n\n## Problems\n1. Missing abbreviations: i.e, e.g, Fig, p (page), No, cf, approx, dept,\n   est, approx, ca — all fire false sentence boundaries.\n2. Quoted dialogue: \"Stop!\" becomes a sentence break because the regex\n   matches [.!?]+ before the closing quote then whitespace.\n\n## Fix\n\n### 1. Expand the abbreviation list in the lookbehind\nReplace the existing lookbehind list with an extended one:\n  (?<!\\b(?:Dr|Mr|Mrs|Ms|Prof|Rev|Sr|Jr|St|vs|etc|vol|ch|no|i\\.e|e\\.g|fig|p|cf|approx|dept|est|ca|ibid|op|cit))\n\nNote: lookbehind must use escaped dots for i.e and e.g since these are\ninside a regex already — use i\\\\.e and e\\\\.g (JS string: i\\\\\\.e).\nTest carefully to avoid breaking the regex entirely.\n\n### 2. Fix closing-quote absorption\nThe current pattern already includes [\"'\\u00bb...)] in the match group\nthat absorbs trailing punctuation after sentence-ending chars.\nThe issue is the pattern matches [.!?]+[closing-quote]?\\s+ — the quote\nIS absorbed, but only when followed by whitespace. After a closing \" in\ndialogue like: She said \"Stop!\" and ran — the exclamation + quote IS\nabsorbed, then the lowercase \"and\" continues. This should already work.\n\nReproduce the actual failing case and add a regression test comment\nabove splitSentences explaining the expected split point.\n\n### 3. Keep both copies in sync\nAfter fixing splitSentences in the main script (below the worker), find\nthe identical function inside _timingWorkerFn (it's a copy serialised\ninto the blob worker) and apply the exact same regex change there.\n\n## Constraints\n- Do not change the function signature or return type.\n- The fix is regex-only: do not add any post-processing or loops.\n- If the lookbehind becomes too complex and causes a syntax error, fall\n  back to a simpler pre-filter (replace \"i.e.\" with \"i_e_\" before splitting).\n\n## Verification\n- \"Dr. Smith went to Washington. He arrived at 9 a.m.\" → 2 sentences, not 4.\n- \"She said \\\"Stop!\\\" and ran away.\" → 1 sentence.\n- Normal paragraph with 3 sentences → 3 sentences.\n- Run syntax check."
  },

  {
  num:"7", status:"active", type:"fix", model:"sonnet", effort:"med",
  title:"Ebook formatting polish",
  desc:"General ebook formatting still needs work beyond the paragraph fragmentation fix. Specific issues to be identified during testing.",
  prompt:"# Fix: Ebook formatting polish in index.html\n\n## Context\nRead extractFromDom(), parseTxt(), parseMd(), parseHtml(), parseEpub() in full.\nCommon formatting issues found in real ebooks:\n1. EPUBs with <div> containing only raw text (no block children) silently drop\n   that text — documented in folio-context.md FRAGILE AREAS #9.\n2. Consecutive short paragraphs from parseTxt() get treated as separate items\n   even when they're part of the same block (e.g. poetry or dialogue).\n3. parseMd() processes line-by-line, so a paragraph split across two lines\n   with a single newline is split into two items.\n\n## Fixes\n\n### Fix 1: extractFromDom bare-div text\nIn extractFromDom(), the walk() function currently does: if(node.nodeType!==1) return;\nThis skips text nodes. Inside the div/section/article/aside descent path (Array.from\nchildNodes forEach walk), text nodes are children — but skipped.\n\nAdd handling for text node children of container elements:\n  if(node.nodeType === 3) {  // text node\n    const t = node.textContent.replace(/\\s+/g, ' ').trim();\n    if(t) items.push({type:'text', text:t});\n    return;\n  }\n\nAdd this check before the nodeType!==1 guard so text nodes are collected.\n\n### Fix 2: parseTxt soft-wrap\nIn parseTxt(), change the paragraph split to also collapse single-newline\nsequences into spaces (common in plain-text ebooks copied from web):\n  String(data).split(/\\n{2,}/).forEach(para => {\n    const t = para.replace(/\\n/g, ' ').replace(/\\s+/g, ' ').trim();\n    if(t) items.push({type:'text', text:t});\n  });\nThe extra .replace(/\\n/g, ' ') collapses single newlines within a paragraph.\n\n### Fix 3: parseMd paragraph joining\nIn parseMd(), consecutive non-heading lines that aren't separated by a blank\nline should be joined. Currently each line is its own item. Add state:\n  let pendingText = '';\n  lines.forEach((line, idx) => {\n    const hm = line.match(/^(#{1,3})\\s+(.+)/);\n    if(hm) {\n      if(pendingText) { items.push({type:'text',text:pendingText.trim()}); pendingText=''; }\n      items.push({type:'heading', level:hm[1].length, text:hm[2].trim()});\n      return;\n    }\n    const t = line.replace(/[*_`~]+/g,'').trim();\n    if(!t) {\n      if(pendingText) { items.push({type:'text',text:pendingText.trim()}); pendingText=''; }\n    } else {\n      pendingText += (pendingText ? ' ' : '') + t;\n    }\n  });\n  if(pendingText) items.push({type:'text',text:pendingText.trim()});\n\n## Constraints\n- Do not change parseTxt's double-newline paragraph split threshold.\n- extractFromDom change must not affect EPUB files that already render correctly.\n- Test with both a simple .txt file and an EPUB after changes.\n\n## Verification\n- A div with only text content (no block children) renders in the reader.\n- A .txt file with single-newline line breaks renders as complete paragraphs.\n- A .md file with paragraphs across multiple lines merges them correctly.\n- Run syntax check."
  },

  desc:"There is no way to manually trigger a rescan of book folders in PWA mode. If files are added or changed outside the app the user must remove and re-add the book to pick up changes — should have a visible rescan/refresh action on the library screen.",
  prompt:"# Feature: Manual library rescan button in PWA mode in index.html\n\n## Context\nRead folio-context.md: PWA FILE SYSTEM section. pwaScanAndRender() does\nthe full scan. The library screen HTML has a .lib-header div. IS_PWA and\nCAN_FS are constants. pwaRootHandle is the currently active folder handle.\n\n## Task\nAdd a visible \"Rescan\" button to the library header in PWA mode.\n\n### HTML\nFind the .lib-header div in the library screen. Inside it, add a rescan\nbutton that is only visible in PWA mode. Since we can\\'t use server-side\nrendering, hide it by default and show it with JS after init:\n  <button id=\"pwaRescanBtn\" class=\"ic-btn\" style=\"display:none\"\n    title=\"Rescan library\" onclick=\"pwaRescan()\">🔄</button>\n\nPlace it alongside the existing lib-header icon buttons.\n\n### JS\nAdd:\n  function pwaRescan() {\n    if(!IS_PWA || !pwaRootHandle) return;\n    showToast(\\'Scanning library…\\', \\'\\', 1500);\n    pwaScanAndRender();\n  }\n\nIn init(), after routing is resolved and if IS_PWA && CAN_FS:\n  const rescanBtn = document.getElementById(\\'pwaRescanBtn\\');\n  if(rescanBtn && IS_PWA && CAN_FS) rescanBtn.style.display = \\'\\';\n\n### Behaviour rules\n- Button is only ever visible in PWA mode (IS_PWA && CAN_FS).\n- Browser mode: button remains display:none permanently.\n- If pwaRootHandle is null (first-run, no folder yet): pwaRescan() is a\n  no-op (the guard handles this).\n- pwaScanAndRender() already shows the scanning indicator — no extra UI needed.\n- Do not change pwaScanAndRender() itself.\n\n## Verification\n- PWA mode, library screen: rescan button visible in header.\n- Tap rescan: library re-scans and re-renders from disk.\n- Browser mode: button not visible.\n- Run syntax check."

  {
  num:"9", status:"active", type:"feat", model:"sonnet", effort:"high",
  title:"Configurable gesture controls with options panel tab",
  desc:"Gesture handlers are currently hardcoded (horizontal swipe → nudge). Add a Gestures tab to the options panel with per-gesture enable/disable and action binding. Covers horizontal swipe, double-tap, left-edge swipe, long-press sentence, and tap-rate-display. Each gesture maps to a configurable action via a dispatcher. Persisted to folio_gestures_v1 in localStorage.",
  prompt:"# Feature: Configurable gesture controls in index.html\n\n## Context\nRead the swipe gesture IIFE on #eScroll in full. Read toggleOpts(), switchOptTab(),\nand the options panel HTML structure. Read prompt #28 (swipe conflict with text\nselection) and prompt #56 (tap rate display to cycle speed) — this feature builds\non top of those fixes.\n\n## Architecture\n\n### Gesture config object\nStored in localStorage as folio_gestures_v1:\n\n  const DEFAULT_GESTURES = {\n    swipeHorizontal: 'nudge',     // 'nudge' | 'chapter' | 'off'\n    doubleTap: 'off',             // 'chapter' | 'playpause' | 'off'\n    edgeSwipe: 'off',             // 'toc' | 'off'\n    longPressSentence: 'off',     // 'bookmark' | 'copy' | 'off'\n  };\n  let _gestureConfig = {...DEFAULT_GESTURES};\n\nLoad/save helpers:\n  function loadGestureConfig(){\n    try {\n      const raw = localStorage.getItem('folio_gestures_v1');\n      if(raw) Object.assign(_gestureConfig, JSON.parse(raw));\n    } catch(e){}\n  }\n  function saveGestureConfig(){\n    localStorage.setItem('folio_gestures_v1', JSON.stringify(_gestureConfig));\n  }\n\nCall loadGestureConfig() in init() after cacheDOM().\n\n### Gesture dispatcher\nReplace hardcoded gesture actions with a dispatcher:\n\n  function _gestureAction(gesture){\n    const action = _gestureConfig[gesture];\n    if(!action || action === 'off') return false;\n    switch(gesture + ':' + action){\n      case 'swipeHorizontal:nudge':    /* handled inline — swipe direction determines ±1 */ break;\n      case 'swipeHorizontal:chapter':  /* handled inline — swipe direction determines ±1 chapter */ break;\n      case 'doubleTap:chapter':        _skipChapter(1); break;\n      case 'doubleTap:playpause':      togglePlay(); break;\n      case 'edgeSwipe:toc':            toggleToc(); break;\n      case 'longPressSentence:copy':   _copySentenceText(); break;\n      default: return false;\n    }\n    return true;\n  }\n\nHelper for chapter skip (reuse tocEntries):\n  function _skipChapter(dir){\n    if(!tocEntries.length) return;\n    let cur = -1;\n    for(let i = tocEntries.length - 1; i >= 0; i--){\n      if(tocEntries[i].sentIdx <= curSent){ cur = i; break; }\n    }\n    const next = Math.max(0, Math.min(tocEntries.length - 1, cur + dir));\n    if(next !== cur || dir > 0){\n      curSent = tocEntries[next].sentIdx; curWord = 0;\n      updateHL(); updateProg();\n      scrollToSent(curSent, true);\n      if(ttsMode && mediaState === 'playing'){ ttsStop(); ttsPlay(); }\n      else if(!ttsMode && sentenceTimings.length) seekAudioToSentence();\n      saveBookProgressDebounced();\n    }\n  }\n\nHelper for copy:\n  function _copySentenceText(){\n    if(curSent >= 0 && curSent < sentences.length){\n      navigator.clipboard.writeText(sentences[curSent].text).then(() => {\n        showToast('Sentence copied', '', 1500);\n      });\n    }\n  }\n\n### Refactor existing swipe IIFE\nThe existing horizontal swipe IIFE on #eScroll currently calls nudge() directly.\nRefactor it to check _gestureConfig:\n\n  // In the touchend handler, replace:\n  //   if(Math.abs(dx) > 50){ nudge(dx < 0 ? 1 : -1); }\n  // With:\n  if(Math.abs(dx) > 80){\n    const sel = window.getSelection();\n    if(sel && sel.toString().length > 0) return; // text selection guard (#28)\n    const action = _gestureConfig.swipeHorizontal;\n    if(action === 'nudge') nudge(dx < 0 ? 1 : -1);\n    else if(action === 'chapter') _skipChapter(dx < 0 ? 1 : -1);\n    // 'off' → do nothing\n  }\n\nThis incorporates the #28 text selection fix and makes the action configurable.\n\n### Add double-tap detection\nAdd a double-tap detector on #eScroll (separate from the swipe handler):\n\n  (function(){\n    let lastTap = 0;\n    const el = document.getElementById('eScroll');\n    if(!el) return;\n    el.addEventListener('touchend', function(e){\n      const now = Date.now();\n      if(now - lastTap < 300){\n        e.preventDefault();\n        _gestureAction('doubleTap');\n        lastTap = 0;\n      } else {\n        lastTap = now;\n      }\n    }, {passive: false});\n  })();\n\n### Add left-edge swipe detection\nIn the existing swipe IIFE, detect edge swipes:\n\n  // In touchstart, record startX\n  // In touchend, if startX < 30 (left edge) and dx > 80:\n  if(startX < 30 && dx > 80){\n    _gestureAction('edgeSwipe');\n    return; // don't also fire horizontal swipe\n  }\n\n### Add long-press on sentence\n  (function(){\n    let timer = null, target = null;\n    const el = document.getElementById('eScroll');\n    if(!el) return;\n    el.addEventListener('touchstart', function(e){\n      const sent = e.target.closest('.sent');\n      if(!sent) return;\n      target = sent;\n      timer = setTimeout(() => {\n        const idx = parseInt(sent.dataset.si);\n        if(isFinite(idx)){ curSent = idx; curWord = 0; }\n        _gestureAction('longPressSentence');\n        timer = null;\n      }, 600);\n    }, {passive: true});\n    el.addEventListener('touchmove', () => { if(timer){ clearTimeout(timer); timer=null; } });\n    el.addEventListener('touchend', () => { if(timer){ clearTimeout(timer); timer=null; } });\n  })();\n\n## Options panel UI\n\n### HTML — add Gestures tab\nIn the #optPanel tab bar, add after the existing tabs:\n  <button class=\"op-tab\" onclick=\"switchOptTab('gestures',this)\">Gestures</button>\n\nAdd a new tab content section:\n  <div class=\"op-sec\" data-tab=\"gestures\" style=\"display:none\">\n    <div class=\"op-row\">\n      <span class=\"op-ttl\">Horizontal swipe</span>\n      <select id=\"gestSwipe\" onchange=\"setGesture('swipeHorizontal',this.value)\">\n        <option value=\"nudge\">Nudge sentence</option>\n        <option value=\"chapter\">Skip chapter</option>\n        <option value=\"off\">Disabled</option>\n      </select>\n    </div>\n    <div class=\"op-row\">\n      <span class=\"op-ttl\">Double-tap</span>\n      <select id=\"gestDoubleTap\" onchange=\"setGesture('doubleTap',this.value)\">\n        <option value=\"off\">Disabled</option>\n        <option value=\"chapter\">Skip chapter</option>\n        <option value=\"playpause\">Play / Pause</option>\n      </select>\n    </div>\n    <div class=\"op-row\">\n      <span class=\"op-ttl\">Left-edge swipe</span>\n      <select id=\"gestEdge\" onchange=\"setGesture('edgeSwipe',this.value)\">\n        <option value=\"off\">Disabled</option>\n        <option value=\"toc\">Open TOC</option>\n      </select>\n    </div>\n    <div class=\"op-row\">\n      <span class=\"op-ttl\">Long-press sentence</span>\n      <select id=\"gestLongPress\" onchange=\"setGesture('longPressSentence',this.value)\">\n        <option value=\"off\">Disabled</option>\n        <option value=\"copy\">Copy text</option>\n      </select>\n    </div>\n  </div>\n\n### JS — gesture config UI\n  function setGesture(key, val){\n    _gestureConfig[key] = val;\n    saveGestureConfig();\n  }\n\nIn loadGestureConfig(), after loading, sync the select elements:\n  const map = {\n    swipeHorizontal: 'gestSwipe',\n    doubleTap: 'gestDoubleTap',\n    edgeSwipe: 'gestEdge',\n    longPressSentence: 'gestLongPress'\n  };\n  Object.entries(map).forEach(([key, id]) => {\n    const el = document.getElementById(id);\n    if(el) el.value = _gestureConfig[key];\n  });\n\n## Implementation order\n1. Add the gesture config object, load/save, and dispatcher first.\n2. Refactor the existing swipe IIFE to use the dispatcher (incorporates #28 fix).\n3. Add double-tap, edge-swipe, and long-press handlers.\n4. Add the Gestures tab UI.\n5. Wire loadGestureConfig() in init().\n\n## Constraints\n- Default config must preserve existing behaviour: swipeHorizontal='nudge',\n  all others 'off'.\n- The existing swipe IIFE refactor must not break the scroll-pause\n  separation (_scrollPauseTimer vs scrollTimer — fragile area #7).\n- Double-tap must not fire on single taps (300ms window).\n- Long-press must cancel on touchmove (prevents accidental fires during scroll).\n- Edge-swipe must take priority over horizontal swipe when startX < 30px.\n- Do not add bookmark functionality in this prompt — only wire the gesture\n  slot. The 'bookmark' option can be added later when bookmark storage exists.\n- switchOptTab() already handles data-tab routing — verify it works with\n  the new 'gestures' tab name.\n\n## Verification\n- Default config: horizontal swipe nudges sentences (existing behaviour).\n- Change swipe to 'chapter': swipe skips to next/previous chapter.\n- Change swipe to 'disabled': swipe does nothing.\n- Double-tap 'playpause': double-tap toggles playback.\n- Left-edge swipe 'toc': swipe from left edge opens TOC.\n- Long-press 'copy': long-press a sentence copies its text.\n- Config persists across reload.\n- All gestures respect 'off' setting.\n- Run syntax check."
  },

  {
  num:"10", status:"active", type:"feat", model:"sonnet", effort:"high",
  title:"Move media controls to bottom of screen with auto-hide and double-tap reveal",
  desc:"Relocate the seek strip and playback controls to a fixed bottom bar for thumb-friendly access on mobile. All controls (top bar + bottom bar) auto-hide after 4 seconds of inactivity and reappear on double-tap in the center of the reading area. Supersedes backlog #55 (auto-hide controls) with a more complete design.",
  prompt:"# Feature: Bottom controls bar with auto-hide in index.html\n\n## Context\nRead the .top-bar, #seekStrip, and #ttsBar CSS. Read the player screen HTML\nbreakdown in folio-context.md. Read backlog prompt #55 (auto-hide controls)\n— this prompt supersedes it with a fuller design that also relocates controls.\n\nCurrently:\n- .top-bar sits at the top (back, title, progress, play, options, TOC, transcript)\n- #seekStrip sits below the top bar (time, seek bar, time, speed, volume)\n- #ttsBar sits below the top bar when in TTS mode (voice picker, rate)\n- Both bars are always visible, reducing reading area on mobile.\n\n## Design\n\n### Layout change\nSplit the player controls into two fixed bars:\n- **Top bar** (fixed top): back button, title (#pTitle), progress (#pProg) only.\n  Minimal — just enough to identify the book and navigate back.\n- **Bottom bar** (fixed bottom): play button, seek bar (audio mode) or\n  progress scrubber (TTS mode), speed controls, options/TOC/transcript buttons.\n  This puts the most-used controls in thumb reach on mobile.\n\n### New bottom bar HTML\nCreate a new container below #seekStrip:\n  <div id=\"controlBar\" class=\"control-bar\">\n    <div class=\"cb-row\">\n      <button id=\"playBtn2\" class=\"play-btn\" onclick=\"togglePlay()\"></button>\n      <!-- Audio mode: seek bar + time -->\n      <div class=\"cb-seek\" id=\"cbSeek\">\n        <span id=\"tCur2\" class=\"seek-time\"></span>\n        <input type=\"range\" id=\"seekBar2\" class=\"seek-strip-bar\" min=\"0\" max=\"100\"\n          step=\"0.1\" value=\"0\" oninput=\"onSeekInput(this.value)\"\n          onchange=\"onSeekChange(this.value)\">\n        <span id=\"tRem2\" class=\"seek-time\"></span>\n      </div>\n      <!-- TTS mode: voice + rate -->\n      <div class=\"cb-tts\" id=\"cbTts\" style=\"display:none\">\n        <!-- voice picker and rate from #ttsBar -->\n      </div>\n      <div class=\"cb-actions\">\n        <button class=\"ic-btn speed-badge\" id=\"speedBadge2\"\n          onclick=\"changeSpeed(1)\">1×</button>\n        <button class=\"ic-btn\" onclick=\"toggleOpts()\">⚙</button>\n        <button class=\"ic-btn\" onclick=\"toggleToc()\">☰</button>\n      </div>\n    </div>\n  </div>\n\nNote: This is a structural sketch — the actual implementation should MOVE\nthe existing elements (#playBtn, #seekBar, etc.) into the new container\nrather than duplicating them. Update cacheDOM() references accordingly.\nAlternatively, keep the existing elements and just restyle their container.\n\n### Preferred approach: restyle, don't restructure\nRather than moving DOM elements (which would break cacheDOM refs), the\nsimplest approach is:\n1. Keep the existing HTML structure.\n2. Use CSS to reposition #seekStrip (and #ttsBar) to the bottom of the screen.\n3. Restyle .top-bar to be slimmer (hide non-essential buttons).\n4. Move the play button, options, TOC, and transcript buttons into #seekStrip\n   via CSS flexbox reordering (order property) or JS DOM moves in init().\n\nThis preserves all cacheDOM() refs and event wiring.\n\n### CSS for bottom-positioned controls\n  #seekStrip, #ttsBar {\n    position: fixed;\n    bottom: 0;\n    left: 0; right: 0;\n    z-index: 100;\n    padding-bottom: env(safe-area-inset-bottom, 0);\n    background: var(--surface);\n    border-top: 1px solid var(--border);\n  }\n\n  .top-bar {\n    position: fixed;\n    top: 0;\n    left: 0; right: 0;\n    z-index: 100;\n  }\n\n  /* Reading area needs padding to avoid being covered */\n  .reader-body {\n    padding-top: var(--top-bar-height, 48px);\n    padding-bottom: var(--bottom-bar-height, 52px);\n  }\n\n### Auto-hide behaviour\nAdd a CSS class .controls-hidden on #player:\n\n  #player.controls-hidden .top-bar,\n  #player.controls-hidden #seekStrip,\n  #player.controls-hidden #ttsBar {\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity 0.3s ease;\n  }\n  .top-bar, #seekStrip, #ttsBar {\n    transition: opacity 0.3s ease;\n  }\n\nJS auto-hide logic:\n  let _controlsTimer = null;\n  let _controlsVisible = true;\n\n  function _showControls(){\n    const p = document.getElementById('player');\n    p.classList.remove('controls-hidden');\n    _controlsVisible = true;\n    clearTimeout(_controlsTimer);\n    _controlsTimer = setTimeout(_hideControls, 4000);\n  }\n\n  function _hideControls(){\n    // Don't hide if modal, options panel, or TOC is open\n    if(document.getElementById('optPanel').classList.contains('open')) return;\n    if(tocOpen) return;\n    const p = document.getElementById('player');\n    p.classList.add('controls-hidden');\n    _controlsVisible = false;\n  }\n\n  function _toggleControls(){\n    if(_controlsVisible) _hideControls();\n    else _showControls();\n  }\n\n### Double-tap to show/hide\nUse a double-tap detector on the reading area (center zone) to toggle controls:\n\n  (function(){\n    let lastTap = 0;\n    const el = document.getElementById('eScroll');\n    if(!el) return;\n    el.addEventListener('touchend', function(e){\n      const now = Date.now();\n      const rect = el.getBoundingClientRect();\n      const y = e.changedTouches[0].clientY - rect.top;\n      const h = rect.height;\n      // Only detect double-tap in the middle 60% of the reading area\n      if(y < h * 0.2 || y > h * 0.8) return;\n      if(now - lastTap < 300){\n        e.preventDefault();\n        _toggleControls();\n        lastTap = 0;\n      } else {\n        lastTap = now;\n      }\n    }, {passive: false});\n  })();\n\nAlso show controls on any touch to the control bars themselves:\n  ['touchstart','pointerdown'].forEach(ev => {\n    document.querySelector('.top-bar')?.addEventListener(ev, _showControls, {passive:true});\n    document.getElementById('seekStrip')?.addEventListener(ev, _showControls, {passive:true});\n    document.getElementById('ttsBar')?.addEventListener(ev, _showControls, {passive:true});\n  });\n\n### Pause auto-hide when interacting\n- While dragging the seek bar (isSeeking === true): don't hide.\n- While options panel is open: don't hide (guard in _hideControls).\n- While TOC is open: don't hide.\n- On modal open (_openModalEl): call _showControls() and clear timer.\n- On modal close: restart timer.\n\nIn _hideControls(), add guards:\n  if(isSeeking) { _controlsTimer = setTimeout(_hideControls, 4000); return; }\n\n### Desktop behaviour\nOn desktop (min-width: 640px), auto-hide is disabled — controls are always\nvisible. Add the guard:\n  function _hideControls(){\n    if(window.innerWidth >= 640) return; // desktop: always visible\n    // ... rest of hide logic\n  }\n\nOr use a CSS media query to override .controls-hidden on desktop:\n  @media(min-width: 640px){\n    #player.controls-hidden .top-bar,\n    #player.controls-hidden #seekStrip,\n    #player.controls-hidden #ttsBar {\n      opacity: 1 !important;\n      pointer-events: auto !important;\n    }\n  }\n\n## Interaction with gesture config (#60)\nIf prompt #60 (gesture controls) adds a double-tap gesture with configurable\nactions, coordinate so that:\n- Double-tap in the CENTER zone (middle 60%) → toggle controls (this prompt)\n- Double-tap in the TOP/BOTTOM zones → configurable gesture action (#60)\nOr: if _gestureConfig.doubleTap !== 'off', double-tap fires the gesture\naction instead of toggling controls. The gesture system takes priority.\n\n## Constraints\n- Do NOT duplicate DOM elements — reposition existing ones via CSS or\n  move them once in init() with appendChild.\n- All cacheDOM() references (_playBtn, _seekBar, _tCur, etc.) must remain\n  valid after the DOM restructure.\n- env(safe-area-inset-bottom) must be applied to the bottom bar for\n  notched/gesture-nav Android devices.\n- The reading progress bar (.read-progress-wrap) should stay above the\n  bottom bar — it's part of the reading area, not the controls.\n- Options panel, TOC sidebar, and modals must still work correctly with\n  the repositioned controls.\n- This prompt supersedes backlog #55 — mark #55 as done or remove it\n  after implementing this.\n\n## Verification\n- Mobile: controls at bottom, title at top. Both auto-hide after 4s.\n- Double-tap center of reading area: controls reappear.\n- Double-tap again: controls hide.\n- Drag seek bar: controls stay visible until drag ends + 4s.\n- Open options panel: controls stay visible.\n- Desktop (>640px): controls always visible, no auto-hide.\n- PWA and browser mode: both work.\n- Run syntax check."

  {

  title:"Chapter skip buttons — jump to next/previous chapter",
  desc:"Navigation jumps either one sentence (nudge) or opens the full TOC sidebar — there is no quick way to skip to the next or previous chapter without tapping through the TOC.",
  prompt:"# Feature: Chapter skip buttons in index.html\n\n## Context\nRead folio-context.md TOC section. tocEntries[] holds {text, level, sentIdx}\nfor each heading. nudge(n) advances one sentence. The top bar has icon buttons\n(#optBtn, #tocBtn, #txBtn). Read the .top-bar HTML in full.\n\n## Implementation\n\n### JS\nAdd a function that finds the next/previous chapter boundary:\n  function skipChapter(dir) {\n    // dir: 1 = next chapter, -1 = previous chapter\n    if(!tocEntries.length) { nudge(dir); return; }\n    let target = -1;\n    if(dir > 0) {\n      // Next: first tocEntry with sentIdx > curSent\n      for(let i = 0; i < tocEntries.length; i++) {\n        if(tocEntries[i].sentIdx > curSent) { target = tocEntries[i].sentIdx; break; }\n      }\n      if(target < 0) target = sentences.length - 1; // at last chapter, go to end\n    } else {\n      // Previous: last tocEntry with sentIdx < curSent - 1\n      // (subtract 1 so pressing prev at sentence 1 of chapter 3 goes to chapter 2)\n      for(let i = tocEntries.length - 1; i >= 0; i--) {\n        if(tocEntries[i].sentIdx < curSent - 1) { target = tocEntries[i].sentIdx; break; }\n      }\n      if(target < 0) target = 0; // already at/before first chapter\n    }\n    curSent = target; curWord = 0;\n    updateHL(); updateProg(); saveBookProgressDebounced();\n    if(autoScroll) scrollToSent(curSent, true);\n    if(ttsMode && mediaState === 'playing') { ttsStop(); ttsPlay(); }\n    else if(ttsMode && mediaState === 'paused') { ttsStop(); }\n    else if(!ttsMode) seekAudioToSentence();\n  }\n\n### HTML\nIn the .top-bar (or the seek-strip area), add two small chapter-skip buttons.\nA good location is near the nudge/skip controls. Add to the seek strip row:\n  <button class=\"ic-btn\" title=\"Previous chapter\" onclick=\"skipChapter(-1)\">⏮</button>\n  <button class=\"ic-btn\" title=\"Next chapter\" onclick=\"skipChapter(1)\">⏭</button>\n\nPlace them flanking the seek bar or inside the speed-strip area where space   {
  num:"33", status:"backlog", type:"feat", model:"sonnet", effort:"low",
  title:"Resume position CTA banner on cold start",
  desc:"Every session starts with the user manually tapping play after the app relaunches. A 4-second banner with a tap-to-resume action removes that friction. Shows the book title and last position, auto-dismisses if ignored.",
  prompt:"# Feature: Resume position CTA on cold start in index.html\n\n## Context\nRead openBook(i) and pwaOpenBook(i) — both restore curSent from saved progress\nin their onDone callbacks. Read pulseResumeSent() — it scrolls to the saved\nposition. The user currently has to manually press play after each app launch.\n\n## Implementation\n\n### Banner HTML\nAdd a resume banner inside #player, above .reader-body:\n  <div id=\"resumeBanner\" class=\"resume-banner\" style=\"display:none\">\n    <div class=\"resume-text\">\n      <span id=\"resumeLabel\">Resume from Chapter 3 · 42%</span>\n    </div>\n    <button class=\"resume-btn\" onclick=\"resumeFromBanner()\">▶ Resume</button>\n    <button class=\"resume-dismiss\" onclick=\"dismissResumeBanner()\">✕</button>\n  </div>\n\n### CSS\n  .resume-banner {\n    position: sticky; top: 0; z-index: 50;\n    background: var(--accent); color: #fff;\n    display: flex; align-items: center; gap: 12px;\n    padding: 10px 16px; font-size: 13px; font-weight: 600;\n    animation: resumeSlideIn 0.3s ease;\n  }\n  @keyframes resumeSlideIn { from { transform: translateY(-100%); } }\n  .resume-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }\n  .resume-btn {\n    background: rgba(255,255,255,0.2); border: none; color: #fff;\n    padding: 6px 16px; border-radius: 6px; font: inherit; font-size: 13px;\n    cursor: pointer;\n  }\n  .resume-dismiss {\n    background: none; border: none; color: rgba(255,255,255,0.7);\n    font-size: 16px; cursor: pointer; padding: 4px;\n  }\n\n### JS\n  let _resumeTimer = null;\n\n  function showResumeBanner(){\n    if(curBookIdx < 0) return;\n    const b = library[curBookIdx];\n    if(!b || (b.curSent || 0) < 2) return; // no meaningful position to resume\n    const pct = b.totalSents > 1 ? Math.round((b.curSent / (b.totalSents - 1)) * 100) : 0;\n    let label = b.title;\n    if(pct > 0) label += ' · ' + pct + '%';\n    document.getElementById('resumeLabel').textContent = label;\n    document.getElementById('resumeBanner').style.display = '';\n    _resumeTimer = setTimeout(dismissResumeBanner, 4000);\n  }\n\n  function dismissResumeBanner(){\n    clearTimeout(_resumeTimer);\n    const el = document.getElementById('resumeBanner');\n    if(el) el.style.display = 'none';\n  }\n\n  function resumeFromBanner(){\n    dismissResumeBanner();\n    togglePlay(); // starts playback from restored curSent\n  }\n\n### Where to call showResumeBanner()\nIn the onDone callback of openBook() and pwaOpenBook(), after curSent is\nrestored and pulseResumeSent is called:\n  showResumeBanner();\n\n### Auto-dismiss rules\n- Dismissed after 4 seconds (setTimeout).\n- Dismissed immediately if user presses play manually (togglePlay should\n  call dismissResumeBanner()).\n- Not shown if curSent < 2 (book is at the beginning).\n- Not shown if book has no saved progress.\n\n## Constraints\n- Do not auto-play — the banner is an invitation, not an action.\n- Do not change togglePlay() except to add dismissResumeBanner() at the top.\n- The banner must not block the reading area permanently.\n- Works in both PWA and browser mode.\n\n## Verification\n- Open a book with saved progress at 42%: banner shows with position, auto-dismisses after 4s.\n- Tap Resume: playback starts from saved position, banner hides.\n- Open a new book (curSent=0): no banner.\n- Tap play manually before banner auto-hides: banner dismissed.\n- Run syntax check."

  num:"34", status:"backlog", type:"feat", model:"sonnet", effort:"low",
  title:"Per-chapter position counter in top bar (Ch 3 / 18)",
  desc:"Replace or augment the raw percentage in #pProg with a chapter counter like 'Ch 3 / 18' when a TOC exists. Uses _prevTocActive and tocEntries.length which are already live — pure display change with no new state.",
  prompt:"# Feature: Per-chapter position counter in top bar in index.html\n\n## Context\nRead updateProg() in full. It currently shows 'Chapter Name · pct%' using\ntocEntries[]. _prevTocActive tracks the index of the current TOC entry.\ntocEntries.length gives the total chapter count.\n\n## Fix\nIn updateProg(), change the chapter label format from the chapter name to\na chapter counter when tocEntries exist:\n\n  if(tocEntries && tocEntries.length){\n    let activeIdx = -1;\n    for(let i = tocEntries.length - 1; i >= 0; i--){\n      if(tocEntries[i].sentIdx <= curSent){ activeIdx = i; break; }\n    }\n    if(activeIdx >= 0){\n      chapterLabel = 'Ch ' + (activeIdx + 1) + '/' + tocEntries.length + ' · ';\n    }\n  }\n\nThis produces: 'Ch 3/18 · 42%' instead of 'Chapter Name · 42%'.\n\nThe chapter name is already visible in the TOC sidebar — repeating it in\nthe cramped top bar wastes space. The counter is more information-dense.\n\n## Alternative: show both on desktop, counter only on mobile\n  if(window.innerWidth >= 640 && active){\n    chapterLabel = active.text.slice(0, 20) + ' (Ch ' + (activeIdx+1) + '/' + tocEntries.length + ') · ';\n  } else if(activeIdx >= 0){\n    chapterLabel = 'Ch ' + (activeIdx+1) + '/' + tocEntries.length + ' · ';\n  }\n\n## Constraints\n- Only change the label format in updateProg().\n- When no tocEntries exist, fall back to percentage only (existing behaviour).\n- Do not add new state variables — activeIdx is computed inline.\n- Do not change _prevTocActive or updateTocActive().\n\n## Verification\n- Book with TOC (18 chapters), at chapter 3: top bar shows 'Ch 3/18 · 15%'.\n- Book without TOC: top bar shows '15%' only.\n- Chapter changes during playback: counter updates.\n- Run syntax check."

  {

  desc:"The existing focus trap (_openModalEl / _closeModalRestore) handles Escape and Tab cycling but may miss edge cases: no initial focus target, Tab on empty modals, screen reader virtual cursor escaping the trap. Audit and harden.",
  prompt:"# Fix: Focus trap audit for modals in index.html\n\n## Context\nRead _openModalEl(id) and _closeModalRestore() in full. Read the keydown\nlistener that handles Escape/Tab inside open modals. The existing\nimplementation traps Tab focus within the modal and restores focus on close.\n\n## Audit checklist\n1. Does _openModalEl set initial focus to the first focusable element?\n   If not, screen readers may not announce the modal.\n2. Does the Tab trap handle the case where there are zero focusable\n   elements inside the modal? (e.g. a modal with only text)\n3. Does Shift+Tab wrap correctly from first to last element?\n4. Is aria-modal=\"true\" set on the modal element?\n5. Is role=\"dialog\" set on the modal element?\n6. Is the background content marked aria-hidden=\"true\" while modal is open?\n7. Does the Escape handler work when focus is on a textarea or select?\n\n## Fixes\n\n### 1. Set aria attributes on modal open\nIn _openModalEl(id):\n  el.setAttribute('role', 'dialog');\n  el.setAttribute('aria-modal', 'true');\n  document.getElementById('player')?.setAttribute('aria-hidden', 'true');\n  document.getElementById('library')?.setAttribute('aria-hidden', 'true');\n\nIn _closeModalRestore():\n  document.getElementById('player')?.removeAttribute('aria-hidden');\n  document.getElementById('library')?.removeAttribute('aria-hidden');\n\n### 2. Auto-focus first focusable element\nIn _openModalEl(id), after showing the modal:\n  const focusable = el.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex=\"-1\"])');\n  if(focusable.length) focusable[0].focus();\n\n### 3. Guard empty modal Tab trap\nIn the Tab handler, if no focusable elements found, prevent Tab entirely:\n  if(!focusable.length) { e.preventDefault(); return; }\n\n## Constraints\n- Do not change modal visual appearance.\n- Do not change Escape close behaviour.\n- Preserve _prevFocus restoration.\n- All 5 modals (#modal, #txModal, #linkAudioModal, #bookInfoModal,\n  #relinkOverlay) must be covered.\n\n## Verification\n- Open each modal with keyboard: first element is focused.\n- Tab cycles within modal, does not escape to background.\n- Shift+Tab wraps from first to last.\n- Escape closes from any focused element.\n- Screen reader (TalkBack): modal is announced, background is hidden.\n- Run syntax check."
  },

  {

  title:"ARIA live region for sentence advancement",
  desc:"Makes the reader usable with TalkBack without switching to TTS mode. An aria-live polite region announces the current sentence text as curSent advances. Invisible to sighted users.",
  prompt:"# Feature: ARIA live region for sentence advancement in index.html\n\n## Context\nRead updateHL() — it runs every time curSent changes. The sentence text\nis in sentences[curSent].text. Screen readers cannot follow the visual\nhighlight unless announced via ARIA.\n\n## Implementation\n\n### HTML\nAdd a visually hidden live region inside #player:\n  <div id=\"ariaLive\" class=\"sr-only\" aria-live=\"polite\" aria-atomic=\"true\"></div>\n\n### CSS\n  .sr-only {\n    position: absolute; width: 1px; height: 1px;\n    padding: 0; margin: -1px; overflow: hidden;\n    clip: rect(0,0,0,0); white-space: nowrap; border: 0;\n  }\n\n### JS\nIn updateHL(), after updating the sentence highlight, announce the text:\n  const liveEl = document.getElementById('ariaLive');\n  if(liveEl && sentences[curSent]){\n    liveEl.textContent = sentences[curSent].text;\n  }\n\nThrottle to avoid overwhelming the screen reader during rapid playback:\n  // Only announce if at least 500ms since last announcement\n  if(liveEl && sentences[curSent]){\n    const now = Date.now();\n    if(!_lastAriaAnnounce || now - _lastAriaAnnounce > 500){\n      liveEl.textContent = sentences[curSent].text;\n      _lastAriaAnnounce = now;\n    }\n  }\n\nAdd module-level: let _lastAriaAnnounce = 0;\n\n## Constraints\n- aria-live=\"polite\" — does not interrupt current speech.\n- aria-atomic=\"true\" — announces full text, not just changes.\n- Throttle to 500ms minimum between announcements.\n- Do not announce during TTS mode (speechSynthesis already reads aloud).\n  Guard: if(ttsMode) return; before the announcement.\n- The sr-only class must be standard screen-reader-only hiding.\n\n## Verification\n- Enable TalkBack, play audiobook: sentences announced as they advance.\n- TTS mode: no double-speaking (announcements suppressed).\n- Rapid sentence changes: not every sentence announced (throttled).\n- Run syntax check."

  desc:"Wire scrubToPosition() to keyboard events and add Home/End key handlers for TTS mode. Small gap that matters to keyboard-first users who cannot use the progress bar scrubber with keyboard alone.",
  prompt:"# Feature: Keyboard-accessible seek in TTS mode in index.html\n\n## Context\nRead scrubToPosition() — it maps a click/touch position to a sentence index.\nRead the keyboard shortcut handler (keydown listener) — it handles Space,\narrows, [/], f, m. In TTS mode, left/right arrows call nudge(±1) but there\nis no way to jump to a specific position via keyboard.\n\n## Implementation\n\n### 1. Add Home/End key handlers\nIn the keydown listener:\n  case 'Home':\n    e.preventDefault();\n    curSent = 0; curWord = 0;\n    updateHL(); updateProg(); scrollToSent(curSent, true);\n    if(ttsMode && mediaState === 'playing'){ ttsStop(); ttsPlay(); }\n    break;\n  case 'End':\n    e.preventDefault();\n    curSent = Math.max(0, sentences.length - 1); curWord = 0;\n    updateHL(); updateProg(); scrollToSent(curSent, true);\n    if(ttsMode && mediaState === 'playing'){ ttsStop(); ttsPlay(); }\n    break;\n\n### 2. Add Page Up/Down for chapter skip\n  case 'PageUp':\n    e.preventDefault();\n    _skipChapter ? _skipChapter(-1) : nudge(-10);\n    break;\n  case 'PageDown':\n    e.preventDefault();\n    _skipChapter ? _skipChapter(1) : nudge(10);\n    break;\n\n(_skipChapter is added by prompt #60 gesture controls; fallback to nudge(10)\nif not yet implemented.)\n\n### 3. Make progress bar focusable in TTS mode\nAdd tabindex to .read-progress-wrap when in TTS mode:\nIn configurePlayerForMode(), when ttsMode:\n  document.querySelector('.read-progress-wrap')?.setAttribute('tabindex', '0');\n  document.querySelector('.read-progress-wrap')?.setAttribute('role', 'slider');\n  document.querySelector('.read-progress-wrap')?.setAttribute('aria-label', 'Reading position');\n\nWhen !ttsMode, remove tabindex.\n\n## Constraints\n- Home/End work in both audio and TTS modes.\n- Page Up/Down use chapter skip if available, otherwise jump 10 sentences.\n- Do not conflict with browser default Home/End scroll — only intercept\n  when player screen is active (guard: curBookIdx >= 0).\n- Do not   {
  num:"49", status:"backlog", type:"fix", model:"sonnet", effort:"low",
  title:"Minimum touch target audit — fix sub-44px buttons",
  desc:"The sync offset +/− buttons and possibly other controls are smaller than the 44×44px minimum touch target recommended by WCAG. Measurably improves tap accuracy on the sync controls which are already fiddly during playback.",
  prompt:"# Fix: Minimum touch target audit in index.html\n\n## Context\nRead the CSS for .ic-btn, the offset +/− buttons, .spd-btn, .rate-btn-inline,\nand any other interactive elements in the seek strip and options panel.\nWCAG 2.5.8 recommends 44×44px minimum touch targets.\n\n## Audit\nSearch the CSS for all interactive element sizes. Flag any that are below\n44×44px. Common culprits:\n- Sync offset +/− buttons in #offsetRow\n- Speed −/+ buttons (.spd-btn) on seek strip\n- TTS bar controls\n- Close buttons on modals (.modal-close)\n- Options panel toggles (.toggle)\n\n## Fix\nFor each sub-44px target, increase the clickable area without necessarily\nincreasing the visual size. Use padding or min-width/min-height:\n\n  .spd-btn {\n    min-width: 44px; min-height: 44px;\n    display: flex; align-items: center; justify-content: center;\n  }\n\nFor elements where visual enlargement is unwanted, use transparent\npadding or a pseudo-element hit area:\n  .offset-btn {\n    position: relative;\n    /* Visual size stays small */\n  }\n  .offset-btn::before {\n    content: ''; position: absolute;\n    top: -8px; bottom: -8px; left: -8px; right: -8px;\n    /* Expands touch target without changing visual size */\n  }\n\n## Constraints\n- Do not change the visual appearance of buttons significantly.\n- Only expand touch targets, do not rearrange layout.\n- CSS-only changes where possible.\n- The seek bar itself is exempt (it's a range input with browser-native sizing).\n\n## Verification\n- All interactive elements in seek strip are at least 44×44px touch target.\n- Offset +/− buttons are easier to tap during playback.\n- No layout shifts from the changes.\n- Run syntax check."

  {
  num:"50", status:"backlog", type:"fix", model:"sonnet", effort:"low",
  title:"Horizontal swipe gesture in reader conflicts with text selection on touch laptops",
  desc:"The swipe handler fires nudge() for any horizontal touchend drag over 50px on the ebook scroll area. On a touch laptop or tablet, attempting to select text by dragging horizontally accidentally triggers sentence navigation instead.",
  prompt:"# Fix: Horizontal swipe conflicts with text selection on touch devices in index.html\n\n## Context\nRead the swipe gesture IIFE on #eScroll in full. It fires nudge() on\ntouchend when horizontal drag > 50px. On touch laptops and tablets,\nattempting to select text by horizontal drag accidentally triggers navigation.\n\n## Fix\nAdd a guard inside the touchmove handler: if the user appears to be\nselecting text (window.getSelection().toString() is non-empty, or more\nreliably: if a touchmove starts but returns to near the start position\nbefore being over the threshold, it may be a selection attempt).\n\nThe most reliable fix is to detect whether text was selected during the\ngesture and cancel the swipe:\n\nIn the touchend handler, before calling nudge(), add:\n  const sel = window.getSelection();\n  if(sel && sel.toString().length > 0) { moved = false; return; }\n\nThis means: if any text is selected at touchend, treat the gesture as a\ntext selection (not a swipe) and do nothing.\n\nAdditionally, increase the minimum horizontal distance from 50px to 80px\nto reduce accidental fires:\n  if(Math.abs(dx) > 80) { nudge(dx < 0 ? 1 : -1); moved = false; }\n\n## Constraints\n- Do not remove the swipe gesture entirely — it is a primary navigation\n  method on mobile phones.\n- The fix must be inside the existing touchend handler in the IIFE.\n- Do not change touchstart or touchmove handlers.\n\n## Verification\n- Touch phone: horizontal swipe still navigates sentences.\n- Touch laptop: dragging to select text does not trigger navigation.\n- Run syntax check."

  title:"Stale totalSents from old progress poisons progress % on re-added books",
  desc:"When a book is removed and re-added, the old progress record in folio_pwa_progress_v1 may still contain a stale totalSents value. If the new ebook has a different sentence count the progress percentage calculation uses the wrong denominator, showing incorrect or >100% progress.",
  prompt:"# Fix: Stale totalSents poisons progress % on re-added books in index.html\n\n## Context\nRead pwaScanAndRender() and pwaScanBookFolder(). When scanning, the saved\nprogress is merged: library = scanned.map(b => ({...b,...(saved[b.id]||{})})).\nsaved[b.id] may contain totalSents from a previous book version. If the\nebook has been updated (different sentence count), this stale value persists\nuntil the book is opened and a new totalSents is calculated.\n\n## Fix\nIn the progress merge in pwaScanAndRender(), explicitly drop totalSents from\nthe saved object to force recalculation on next open:\n\n  library = scanned.map(b => {\n    const prog = saved[b.id] || {};\n    const { totalSents: _drop, ...progWithoutSents } = prog; // drop stale count\n    return { ...b, ...progWithoutSents };\n  });\n\ntotalSents will be set correctly when the book is opened and loadEbook()\nfinishes (saveBookProgress() writes the new count).\n\n## Alternative approach\nIf the destructuring approach is complex in the existing code style, use:\n  library = scanned.map(b => {\n    const prog = {...(saved[b.id] || {})};\n    delete prog.totalSents;\n    return {...b, ...prog};\n  });\n\n## Constraints\n- Only drop totalSents from the merge — keep all other saved fields (curSent,\n  syncOffset, wpm, etc.) intact.\n- Do not change how totalSents is written by saveBookProgress().\n- This change is in pwaScanAndRender() only.\n\n## Verification\n- Remove a book, change its ebook to a shorter version, re-add it.\n  Progress % shows correctly (not >100%).\n- Existing books with valid totalSents: progress % unchanged on rescan\n  (totalSents is recalculated on next open, not lost permanently).\n- Run syntax check."
  },

  title:"Shift+Arrow skip silent no-op in TTS mode",
  desc:"Keyboard shortcuts Shift+← and Shift+→ call skip(±15) which immediately returns in TTS mode with no feedback — user gets no response and no indication of why, making the shortcut feel broken.",
  prompt:"# Fix: Shift+Arrow skip is silent no-op in TTS mode in index.html\n\n## Context\nRead the keydown handler in full (the keyboard shortcuts section).\nskip(n) is called by Shift+ArrowRight/Left. Read skip() in full to see\nwhat it does in TTS mode.\n\n## Root cause\nskip(n) calls _audio.currentTime += n, which does nothing in TTS mode\n(no audio element). It returns silently with no feedback.\n\n## Fix\nIn the keyboard shortcut handler, change the Shift+Arrow case:\n\n  case 'ArrowRight':\n    e.preventDefault();\n    if(e.shiftKey) {\n      if(ttsMode) skipChapter(1);  // or nudge(5) as a sentence skip fallback\n      else skip(15);\n    } else {\n      nudge(1);\n    }\n    break;\n\n  case 'ArrowLeft':\n    e.preventDefault();\n    if(e.shiftKey) {\n      if(ttsMode) skipChapter(-1); // or nudge(-5)\n      else skip(-15);\n    } else {\n      nudge(-1);\n    }\n    break;\n\nIf skipChapter() is not yet implemented (pending prompt #28), use nudge(10)\nand nudge(-10) as the TTS fallback instead, and add a toast:\n  showToast('Skipped 10 sentences');\n\n## Constraints\n- Do not change skip() itself — it is correct for audio mode.\n- In TTS mode, Shift+Arrow must do something visible — either skipChapter\n  or a multi-sentence nudge with a toast.\n- Do not change the non-shift Arrow behaviour (nudge ±1).\n\n## Verification\n- Audio mode, Shift+→: skips 15 seconds as before.\n- TTS mode, Shift+→: skips to next chapter (or 10 sentences) with feedback.\n- TTS mode, Shift+←: goes to previous chapter (or back 10 sentences).\n- Run syntax check."

  desc:"Returning to the library while audio is playing shows no visual connection between the active book card and the ongoing playback — users have no way to identify which book is playing at a glance.",
  prompt:"# Feature: Currently-playing indicator on library cards in index.html\n\n## Context\nRead renderLib() in full. Read goLib() — it sets curBookIdx = -1 when\nleaving. When the user returns to the library while audio is playing,\ncurBookIdx is still set (the user may go back without stopping).\nRead the .book-card CSS.\n\n## Implementation\n\n### JS change in renderLib()\nIn the card-building loop, after card.className = 'book-card', add:\n  if(i === curBookIdx && mediaState === 'playing') {\n    card.classList.add('playing-card');\n  }\n\nAlso add a small \"Now Playing\" badge to the card HTML inside card.innerHTML,\nrendered only if i === curBookIdx && mediaState === 'playing':\n  ${i === curBookIdx && mediaState === 'playing'\n    ? '<div class=\"now-playing-badge\">▶ Now Playing</div>' : ''}\n\nPlace the badge inside .book-info, below .book-meta.\n\n### CSS\n  .now-playing-badge {\n    font-size: 10px; font-weight: 700; color: var(--accent);\n    letter-spacing: .04em; margin-top: 4px;\n    text-transform: uppercase;\n  }\n  .playing-card {\n    border-color: var(--accent);\n  }\n  .playing-card .book-cover {\n    box-shadow: 0 0 0 2px var(--accent);\n  }\n\n## Constraints\n- renderLib() is called every time the library is rendered. The check\n  curBookIdx >= 0 && mediaState === 'playing' is safe (both are globals).\n- Do not change goLib() — curBookIdx is reset there when navigating away\n  from the player, which is correct (user has stopped the session).\n- No timer or polling needed — renderLib() is called when navigating\n  to the library via goLib(), which reads current state at that moment.\n\n## Verification\n- Play a book. Press back. Library shows the playing card highlighted\n  with \"▶ Now Playing\" badge and accent border.\n- Pause, press back: no indicator (mediaState !== 'playing').\n- Stop playback from library: re-render removes the indicator.\n- Run syntax check."
