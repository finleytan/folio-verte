  prompt:"# Fix: No way to cancel folder selection on mobile in index.html\n\n## Context\nRead pwaPickFolder() in full. It calls showDirectoryPicker() which\nlaunches the OS file picker. If the user picks a folder, pwaScanAndRender()\nruns immediately with no confirmation step. On mobile there is no way to\nabort once a folder is selected without quitting the app.\n\n## Fix\nAfter showDirectoryPicker() resolves and before pwaScanAndRender():\n\n1. Show a toast-style confirmation sheet (not an alert):\n   - Display the chosen folder name.\n   - Two buttons: \"Use this folder\" and \"Choose another\".\n   - No modal overlay needed — a fixed bottom sheet is fine.\n\n2. If \"Use this folder\":\n   - Proceed with the existing idbSet + pwaScanAndRender() logic.\n   - Dismiss the sheet.\n\n3. If \"Choose another\":\n   - Dismiss the sheet without saving the handle.\n   - Do NOT call idbSet or pwaScanAndRender().\n   - The first-run screen remains visible.\n\n## Implementation\nAdd a helper that returns a Promise resolving true/false:\n  async function _confirmFolder(name) {\n    return new Promise(resolve => {\n      // Build and append a .folder-confirm-sheet div to document.body\n      // Two buttons wired to resolve(true) / resolve(false) + sheet.remove()\n    });\n  }\n\nInside pwaPickFolder(), after const handle = await showDirectoryPicker():\n  const ok = await _confirmFolder(handle.name);\n  if(!ok) return;\n  pwaRootHandle = handle;\n  await idbSet('rootHandle', handle);\n  await idbSet('rootName', handle.name);\n  await pwaScanAndRender();\n\n## CSS\nAdd to stylesheet (append at end of <style>):\n  .folder-confirm-sheet {\n    position: fixed; bottom: env(safe-area-inset-bottom, 0);\n    left: 0; right: 0; background: var(--surface2);\n    border-top: 1px solid var(--border); padding: 20px 20px 24px;\n    display: flex; flex-direction: column; gap: 12px; z-index: 9999;\n  }\n  .folder-confirm-name {\n    font-size: 15px; font-weight: 600; color: var(--text);\n    text-align: center;\n  }\n  .folder-confirm-row { display: flex; gap: 10px; }\n  .folder-confirm-row .btn { flex: 1; }\n\n## Constraints\n- Do not use confirm() or alert().\n- AbortError from showDirectoryPicker is already caught — leave it unchanged.\n- This is PWA-only code; do not add any UI for browser mode.\n\n## Verification\n- PWA first run: pick a folder, confirmation sheet appears with folder name.\n- \"Use this folder\": library loads from chosen folder.\n- \"Choose another\": first-run screen is still visible, no folder committed.\n- Run syntax check."

  prompt:"# Fix: Toast container obscured by Android gesture navigation bar in index.html\n\n## Context\nRead the CSS for #toastContainer. It is currently positioned at the bottom\nof the viewport with a fixed bottom value. On Android phones using gesture\nnavigation (no hardware nav bar), the system UI overlaps this area.\nenv(safe-area-inset-bottom) is the correct CSS mechanism for this.\nThe seek strip already uses env(safe-area-inset-bottom) in the mobile media\nquery — follow the same pattern.\n\n## Fix — CSS only\nFind the #toastContainer rule (or .toast rule if toasts are absolutely positioned\ninside the container). Add or increase the bottom offset using env():\n\n  #toastContainer {\n    bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));\n  }\n\nIf the existing rule already has a bottom value, replace it with the max() form.\n\nIf toasts are positioned inside the container and the container itself sits\nat bottom:0, change the container to:\n  #toastContainer {\n    bottom: env(safe-area-inset-bottom, 0);\n    padding-bottom: 16px;\n  }\n\nUse whichever approach matches the existing CSS — do NOT restructure the toast\npositioning system, only fix the bottom clearance.\n\n## Constraints\n- CSS change only. No JS changes.\n- Do not affect toast appearance, animation, or stacking.\n- The fix must apply on all screens; env() degrades to 0 on non-notched devices.\n\n## Verification\n- On a device with gesture navigation: toast appears above the navigation bar.\n- On a device with hardware buttons: toast position unchanged (env() returns 0).\n- Run syntax check (JS unchanged — CSS-only fix)."

  title:"PWA auto-assigns any JSON as transcript — breaks sync on wrong file",
  desc:"pwaScanBookFolder() falls back to the first JSON file in a book folder when no file contains 'transcript' in the name. Config, metadata, or other JSON files get silently assigned as transcript, producing garbage sentenceTimings that break highlighting. Changing transcript on PWA requires a rescan which re-assigns the wrong file again.",
  prompt:"# Fix: PWA auto-assigns any JSON as transcript in index.html\n\n## Context\nRead pwaScanBookFolder() in full. The current transcript detection logic:\n  1. Collects all .json files into jsonCandidates[]\n  2. Prefers a JSON file with 'transcript' in the filename (case-insensitive)\n  3. Falls back to jsonCandidates[0] — the FIRST JSON file found\n\nThis fallback is too aggressive. A book folder may contain metadata.json,\nconfig.json, or other non-transcript JSON files. Assigning them as transcript\nproduces garbage sentenceTimings and breaks audio-text sync.\n\nAdditionally, in PWA mode, changing the transcript requires a library rescan\n(pwaScanAndRender), which re-runs pwaScanBookFolder and re-assigns the\nwrong JSON file again — there is no way to override the auto-assignment.\n\n## Fix\n\n### 1. Only auto-assign JSON files that look like transcripts\nReplace the fallback logic in pwaScanBookFolder():\n\n  // OLD:\n  if(jsonCandidates.length){\n    transcriptFile = jsonCandidates.find(f => /transcript/i.test(f.name.replace(/\\.[^.]+$/, '')))\n      || jsonCandidates[0];  // ← dangerous fallback\n  }\n\n  // NEW:\n  if(jsonCandidates.length){\n    transcriptFile = jsonCandidates.find(f => /transcript|whisper/i.test(f.name.replace(/\\.[^.]+$/, '')))\n      || null;  // only assign if filename clearly indicates transcript\n  }\n\nThis means JSON files are ONLY auto-assigned if the filename contains\n'transcript' or 'whisper' (case-insensitive). All other JSON files are ignored.\n\n### 2. Validate JSON structure before accepting\nAs an additional safety net, validate the JSON content when loading.\nIn loadTranscriptData(b), after parsing the JSON, check for expected\nWhisper structure before proceeding:\n\n  const json = JSON.parse(raw);\n  // Whisper JSON must have either .segments or .words at top level\n  const isWhisper = Array.isArray(json.segments) || Array.isArray(json.words);\n  if(!isWhisper){\n    setBannerState('error', 'Not a transcript', 'JSON file does not contain Whisper data');\n    b.transcriptType = null;\n    b.transcriptData = null;\n    return;\n  }\n\nAdd this check right after the JSON.parse in loadTranscriptData().\n\n## Constraints\n- Do not change how .txt transcript files are detected or loaded.\n- Do not change the 'transcript' filename preference — keep it as the\n  primary detection method.\n- The validation in loadTranscriptData must run BEFORE sentenceTimings\n  are built — an invalid JSON must not trigger buildSentenceTimings().\n- PWA progress (saved syncOffset, curSent) must not be affected.\n\n## Verification\n- Folder with 'whisper-transcript.json': auto-assigned correctly.\n- Folder with only 'metadata.json': no transcript assigned (TTS mode or no-transcript banner).\n- Folder with 'config.json' + 'book-transcript.json': transcript.json chosen.\n- Invalid JSON structure (e.g. package.json): error banner shown, no crash.\n- Run syntax check."

  prompt:"# Fix: Progress percentage not visible in book view in PWA mode in index.html\n\n## Context\nRead updateProg() in full (lines ~2025–2036). It sets _pProg.textContent to\neither 'Chapter · pct%' or '—'. The function runs identically in PWA and\nbrowser modes — no IS_PWA branch.\n\nRead pwaOpenBook(i) in full. Check:\n1. When is updateProg() first called after opening a PWA book?\n2. Is sentences[] populated before the first updateProg() call?\n3. Does loadEbook()'s onDone callback call updateProg()?\n4. Is _pProg cached correctly in cacheDOM()?\n\n## Investigation steps\n1. Trace the pwaOpenBook call chain:\n   configurePlayerForMode → loadTranscriptData → loadEbook → onDone\n   In onDone: curSent restored → updateHL() → updateProg() → ...\n   Check if updateProg() is actually in the onDone callback.\n\n2. Check if sentences.length is 0 when updateProg() runs — this would\n   produce '—' instead of a percentage. loadEbook populates sentences[]\n   before calling onDone, so this should be fine.\n\n3. Check if _pProg is null or stale. cacheDOM() runs once in init().\n   If #pProg element exists in the HTML, _pProg should be valid.\n\n4. Check CSS: is #pProg or .bk-info hidden or clipped in PWA mode?\n   The .top-bar layout may differ when IS_PWA changes element visibility.\n\n5. Check if the #pProg element has display:none or visibility:hidden\n   applied by any PWA-specific CSS or JS.\n\n## Fix\nApply the fix based on investigation. The most likely causes:\n- updateProg() not called in pwaOpenBook's onDone path\n- CSS hiding #pProg in standalone display mode\n- sentences[] empty at call time due to async race\n\n## Constraints\n- Do not change updateProg() unless the bug is in that function.\n- The fix must work for both audio+ebook and TTS-only books in PWA.\n- _pProg must show percentage on initial book open AND during playback.\n\n## Verification\n- PWA mode: open a book → percentage visible in top bar (e.g. 'Chapter 1 · 0%').\n- Navigate to middle of book → percentage updates (e.g. '52%').\n- Browser mode: percentage still works as before.\n- Run syntax check."

  desc:"In PWA audiobook mode, the sentence highlight visibly jumps or flickers at sentence boundaries. When timeupdate advances curSent, curWord resets to 0 and _wordTick immediately searches the new sentence's wordTimings — causing a flash where the old sentence loses highlighting before the new one is painted, or the highlight briefly snaps to word 0 before correcting.",
  prompt:"# Fix: Audio-text sync highlighting jumps at sentence boundaries in index.html\n\n## Context\nRead wireAudioEvents() timeupdate handler and _wordTick() in full.\nRead updateHL() in full.\n\nThe sentence transition flow:\n1. timeupdate fires (~4Hz), reverse linear scans sentenceTimings[]\n2. When bestSent !== curSent: sets curSent = bestSent, curWord = 0\n3. Calls updateHL() which removes old sent-active, applies new sent-active\n4. Meanwhile _wordTick() runs at 60fps, reading curSent and wordTimings\n\n## Root cause analysis\nThe jump happens because:\n- timeupdate sets curSent and curWord=0 on the main thread\n- updateHL() removes the old sentence highlight and applies the new one\n- Between the updateHL() call and the next _wordTick() frame, curWord=0\n  means word 0 briefly gets highlighted even if audio is mid-word\n- _wordTick() then corrects to the right word on the next rAF — but\n  the visual flash of word-0 highlight is perceptible\n\nAdditionally, there may be a race between timeupdate and _wordTick:\n- _wordTick reads curSent which was just changed by timeupdate\n- _wordTick's binary search on the NEW sentence's wordTimings may find\n  a word position that doesn't match the visual transition\n\n## Fix\n\n### 1. Let _wordTick handle word positioning after sentence change\nIn the timeupdate handler, when bestSent !== curSent:\n  curSent = bestSent;\n  curWord = -1;  // signal to _wordTick that word needs recalculation\n  updateHL();    // updates sentence highlight only\n  updateProg();\n\nIn updateHL(), when curWord < 0, skip the word-active class application:\n  if(wordHlOn && curWord >= 0 && s.words[curWord]){\n    s.words[curWord].el.classList.add('word-active');\n    _activeWordEl = s.words[curWord].el;\n  }\n\nIn _wordTick(), after binary search sets w:\n  curWord = w;  // will be >= 0, overriding the -1 sentinel\n\nThis ensures the word highlight is only applied after _wordTick has\ncalculated the correct word position for the current audio time.\n\n### 2. Smooth the sentence transition visually\nAlternatively or additionally, defer the sentence highlight update to\ncoincide with the next _wordTick frame:\n  if(bestSent !== curSent){\n    curSent = bestSent; curWord = 0;\n    // Don't call updateHL here — let _wordTick handle it on next rAF\n    updateProg();\n  }\n\nThen in _wordTick, after updating curWord, also call updateHL() if\nthe sentence element doesn't match:\n  if(_activeSentEl !== sentences[curSent]?.el) updateHL();\n\n## Constraints\n- Do not remove the reverse linear scan in timeupdate — it must stay.\n- Do not change the rAF rate of _wordTick.\n- The fix must not cause missed sentence transitions (every timeupdate\n  sentence change must eventually be reflected in the highlight).\n- updateProg() must still be called on sentence change for progress bar.\n- saveBookProgressDebounced() must still be called on sentence change.\n\n## Verification\n- Play an audiobook with word-level Whisper transcript.\n- Watch sentence boundaries: highlight should smoothly transition from\n  last word of sentence N to first word of sentence N+1 without flash.\n- Disable word highlighting (wordHlOn=false): sentence transitions\n  still work cleanly.\n- Run syntax check."
  },

  {

  prompt:"# Feature: Auto-hide transcript banner after sync ready in index.html\n\n## Context\nRead setBannerState() in full. When called with state='ready', the banner\nshows '📝 Transcript synced' (or similar) and stays visible permanently.\nThe banner occupies vertical space in the reading view and is not\nactionable once sync is complete — it's purely informational.\n\n## Fix\nAdd auto-hide logic: when setBannerState('ready') is called, start a\n5-second timer that fades out and hides the banner.\n\n### 1. Add a module-level timer variable\n  let _bannerHideTimer = null;\n\n### 2. In setBannerState(), clear any pending timer at the top\n  if(_bannerHideTimer){ clearTimeout(_bannerHideTimer); _bannerHideTimer = null; }\n\n### 3. After setting the 'ready' state, start the auto-hide timer\n  if(state === 'ready'){\n    _bannerHideTimer = setTimeout(() => {\n      b.classList.add('tx-fade');\n      setTimeout(() => { setBannerState('hidden'); b.classList.remove('tx-fade'); }, 300);\n    }, 5000);\n  }\n\n### 4. Add CSS for the fade-out transition\n  .tx-banner.tx-fade {\n    opacity: 0;\n    transition: opacity 0.3s ease;\n  }\n\n## Behaviour rules\n- 'loading' and 'syncing' states: banner stays visible (no auto-hide).\n  The clearTimeout at the top ensures a loading→ready→loading sequence\n  cancels any pending hide.\n- 'ready' state: visible for 5 seconds, then fades out over 300ms.\n- 'error' state: banner stays visible (no auto-hide) — errors need\n  user attention.\n- 'hidden' state: immediate hide (existing behaviour).\n- If the user navigates away (goLib()) before the timer fires, the\n  banner is already hidden by goLib's cleanup — the stale timer\n  firing setBannerState('hidden') again is harmless.\n\n## Constraints\n- Do not change existing setBannerState states or their visual appearance.\n- The fade-out must use CSS transition (not JS animation).\n- Only one timer at a time (_bannerHideTimer is cleared before setting).\n- Do not auto-hide the 'notx' state (if prompt #12 is implemented).\n\n## Verification\n- Open a book with transcript: banner shows 'loading' → 'syncing' → 'ready'.\n  After 5 seconds in 'ready', banner fades out.\n- Open another book quickly (before 5s): timer resets, no premature hide.\n- Error state: banner stays visible indefinitely.\n- Run syntax check."

  {
  num:"7", status:"done", type:"fix", model:"sonnet", effort:"low",
  title:"Word highlighting drifts when changing playback speed mid-sentence",
  desc:"Changing playback rate while audio is playing causes word-level highlighting to briefly desync. _wordTick() reads _audio.currentTime correctly but the rate change causes a perceptible lag where highlights are a few words behind or ahead until the next sentence boundary. Likely related to wordTimings being based on original-speed timestamps while the audio engine's internal position update has sub-frame latency after a rate change.",
  prompt:"# Fix: Word highlighting drifts when changing playback speed in index.html\n\n## Context\nRead _wordTick() in full. Read setRate() and changeSpeed() in full.\nRead wordTimings data structure: wordTimings[i] = { starts: Float64Array, count: number }.\n\n_wordTick() uses _audio.currentTime + syncOffset to binary search\nwordTimings[curSent].starts[] for the current word. This should be\nrate-independent because currentTime reflects actual playback position.\n\n## Investigation\nThe drift may come from:\n1. **Audio engine latency**: After _audio.playbackRate changes, some browsers\n   (especially Android WebView) take a few frames before currentTime reflects\n   the new rate. During this window, _wordTick's binary search finds the wrong word.\n\n2. **timeupdate throttling**: The sentence-level scan in timeupdate runs at ~4Hz.\n   After a rate change, the sentence may advance faster than timeupdate can track,\n   causing curSent to lag behind. _wordTick then searches the wrong sentence's\n   wordTimings.\n\n3. **Stale curWord**: After rate change, curWord may point to a word that no\n   longer matches currentTime. _wordTick will correct it on the next frame,\n   but the visual jump is perceptible.\n\n## Fix\n\n### 1. Force an immediate timeupdate-style sentence check on rate change\nIn setRate(), after setting _audio.playbackRate, force a sentence position\nrecalculation if currently playing:\n\n  if(mediaState === 'playing' && sentenceTimings.length){\n    const t = _audio.currentTime + syncOffset;\n    let bestSent = curSent;\n    for(let i = sentenceTimings.length - 1; i >= 0; i--){\n      if(sentenceTimings[i] && t >= sentenceTimings[i].start){ bestSent = i; break; }\n    }\n    if(bestSent !== curSent){\n      curSent = bestSent; curWord = 0;\n      updateHL(); updateProg();\n      if(autoScroll) scrollToSent(curSent);\n    }\n  }\n\nThis ensures the sentence position is correct immediately after the rate\nchange, rather than waiting for the next timeupdate event.\n\n### 2. Reset curWord to force _wordTick recalculation\nAfter the sentence check above (or if sentence didn't change), reset\ncurWord to force _wordTick to recalculate from scratch:\n\n  curWord = -1;  // or 0 — forces _wordTick to find correct word\n\n## Constraints\n- Do not change _wordTick() binary search logic.\n- Do not change timeupdate handler.\n- The sentence check in setRate() uses the same reverse linear scan\n  as timeupdate (not binary search) for sparse array safety.\n- Only run the check if mediaState === 'playing' and sentenceTimings exist.\n- Do not debounce — rate changes are discrete button presses, not continuous.\n\n## Verification\n- Play audiobook at 1x. Change to 2x mid-sentence: word highlight stays in sync.\n- Change from 2x to 0.5x: no visible jump or lag in highlighting.\n- Rapid speed changes (tap +/- quickly): highlights remain stable.\n- TTS mode: no effect (TTS rate is per-utterance, not continuous).\n- Run syntax check."
  },

  desc:"Manual companion to auto-generated TOC (#65). Lets users create their own chapter marks for books where neither headings nor transcript markers exist. Writes to b.customToc[] so both features share infrastructure with buildToc().",
  prompt:"# Feature: Custom chapter marks in index.html\n\n## Context\nRead buildToc() and tocEntries[]. Read the book object structure.\ntocEntries is currently populated only from ebook headings (and optionally\nfrom transcript gaps per prompt #65). Users cannot manually add TOC entries.\n\n## Data model\nAdd to book object:\n  b.customToc = [];  // Array of { text: string, sentIdx: number }\n\n## Implementation\n\n### 1. Add custom mark\n  function addChapterMark(sentIdx, text){\n    if(curBookIdx < 0) return;\n    const b = library[curBookIdx];\n    if(!b.customToc) b.customToc = [];\n    const label = text || 'Mark at ' + Math.round(sentIdx / (sentences.length - 1) * 100) + '%';\n    b.customToc.push({ text: label, sentIdx });\n    b.customToc.sort((a, c) => a.sentIdx - c.sentIdx);\n    saveBookProgressDebounced();\n    buildToc(); // rebuild to include new mark\n    showToast('Chapter mark added', '', 1500);\n  }\n\n  function removeChapterMark(sentIdx){\n    if(curBookIdx < 0) return;\n    const b = library[curBookIdx];\n    if(!b.customToc) return;\n    b.customToc = b.customToc.filter(m => m.sentIdx !== sentIdx);\n    saveBookProgressDebounced();\n    buildToc();\n  }\n\n### 2. Merge into buildToc()\nIn buildToc(), after populating from tocEntries, merge custom marks:\n  const b = library[curBookIdx];\n  if(b.customToc && b.customToc.length){\n    b.customToc.forEach(m => {\n      tocEntries.push({ text: m.text, level: 1, sentIdx: m.sentIdx, custom: true });\n    });\n    tocEntries.sort((a, c) => a.sentIdx - c.sentIdx);\n  }\n\nStyle custom entries:\n  if(entry.custom) btn.classList.add('toc-custom');\n  .toc-custom { border-left: 2px solid var(--accent); }\n\n### 3. UI — add mark from current position\nOption A: button in options panel Advanced tab.\nOption B: long-press on reading progress bar.\nOption C: context action in gesture config (#60).\n\nSimplest: add a button in the TOC sidebar footer:\n  <button class=\"toc-add-mark\" onclick=\"addChapterMark(curSent)\">+ Add mark here</button>\n\n## Constraints\n- customToc is persisted via saveBookProgress (both modes).\n- Custom marks survive book close/reopen.\n- Custom marks are cleared if ebook is replaced (sentIdx invalidated).\n- Do not mix custom marks into the auto-generated TOC from #65 — they\n  are separate sources merged at buildToc() time.\n\n## Verification\n- Add a mark at current position: appears in TOC sidebar.\n- Tap mark: scrolls to position.\n- Reopen book: marks preserved.\n- Run syntax check."

  prompt:"# Perf: Windowed / lazy sentence rendering in index.html\n\n## Context\nRead loadEbook() in full — it builds ALL sentence spans into the DOM in\nchunks. sentences[] holds live DOM refs. updateHL(), scrollToSent(),\n_wordTick() all reference sentences[i].el directly.\n\nFor a 10,000-sentence book, the DOM contains ~30,000+ elements (sentence\nspans + word spans). This causes:\n- Slow initial render (2-5s on mobile)\n- High memory usage\n- Sluggish scrolling due to layout recalculation\n\n## Approach: content-visibility windowing\nRather than a full virtual scroll (which would break live DOM refs),\nuse content-visibility: auto on paragraph-level containers. This is\nalready partially implemented (.ebook-para has content-visibility: auto).\n\n### Enhancement: lazy sentence span creation\nInstead of creating all word spans upfront, defer word span creation\nuntil a paragraph scrolls into view:\n\n1. In loadEbook(), create sentence spans with only textContent (no word spans).\n2. Use IntersectionObserver on .ebook-para elements.\n3. When a paragraph enters the viewport, split its sentences into word spans.\n4. Update sentences[i].words with the new DOM refs.\n5. When a paragraph leaves the viewport (optional), collapse word spans\n   back to textContent to reduce DOM nodes.\n\n### Word span creation on demand\n  const _paraObserver = new IntersectionObserver((entries) => {\n    entries.forEach(entry => {\n      if(entry.isIntersecting){\n        const para = entry.target;\n        // Find sentence indices in this paragraph\n        const sentEls = para.querySelectorAll('.sent:not(.words-built)');\n        sentEls.forEach(el => {\n          const si = parseInt(el.dataset.si);\n          if(isNaN(si) || !sentences[si]) return;\n          // Build word spans\n          const text = sentences[si].text;\n          const words = text.split(/\\s+/);\n          el.innerHTML = words.map((w, wi) =>\n            '<span class=\"word\" data-wi=\"' + wi + '\">' + w + '</span>'\n          ).join(' ');\n          sentences[si].words = Array.from(el.querySelectorAll('.word')).map((we, wi) => ({\n            el: we, text: words[wi]\n          }));\n          el.classList.add('words-built');\n        });\n      }\n    });\n  }, { rootMargin: '200px' }); // pre-build 200px ahead of viewport\n\n### Risks\n- _wordTick() accesses sentences[curSent].words — if words aren't built\n  yet, it will fail. Guard: if(!wt || !sentences[curSent].words) return;\n  (already partially guarded).\n- scrollToSent() accesses sentences[i].el — sentence elements always\n  exist, only word spans are lazy. No change needed.\n- updateHL() accesses sentences[curSent].words[curWord] — guard with\n  optional chaining.\n- buildSentenceTimings() accesses sentences[i].text — text is always\n  available (stored separately from DOM). No change needed.\n\n## Constraints\n- sentences[i].el MUST always be a live DOM ref (never virtualized).\n- sentences[i].text MUST always be available.\n- Only word spans (.word) are lazy — sentence spans (.sent) are always in DOM.\n- IntersectionObserver rootMargin: 200px provides pre-build buffer.\n- Fallback for browsers without IntersectionObserver: build all words\n  immediately (current behaviour).\n- This is a significant refactor — test thoroughly with:\n  - Short books (<100 sentences)\n  - Long books (>5000 sentences)\n  - Books with word-level highlighting\n  - Books without word-level highlighting\n  - Rapid scrolling\n  - Seek bar jumps to distant positions\n\n## Verification\n- 10,000-sentence book loads in under 1s (vs 3-5s currently).\n- Word highlighting works when scrolling to a new paragraph.\n- Seek bar jump to distant position: words build on scroll.\n- Memory usage is lower for long books.\n- Run syntax check."
  },

  {
  num:"82", status:"deferred", type:"perf", model:"sonnet", effort:"med",
  title:"Revoke audio blob URL on book close in browser mode",
  desc:"Browser-mode audio blob URLs persist in memory after leaving the player. Revoking on goLib() and re-creating on next open reduces memory pressure for libraries with large audio files. The re-fetch path from IndexedDB already exists.",
  prompt:"# Perf: Revoke audio blob URL on book close (browser mode) in index.html\n\n## Context\nRead goLib() in full. In browser mode, audio blob URLs created by addBook()\nor relinkOverlay persist for the page lifetime. Each blob URL holds the\nentire audio file in memory.\n\nRead configurePlayerForMode() — it already revokes the previous _audio.src\nblob URL before assigning a new one. But goLib() does not revoke when\nleaving the player.\n\n## Fix\n\n### 1. Revoke on goLib()\nIn goLib(), before resetting state:\n  if(curBookIdx >= 0 && !IS_PWA){\n    const b = library[curBookIdx];\n    if(b && b.audioUrl){\n      URL.revokeObjectURL(b.audioUrl);\n      b.audioUrl = null;\n    }\n  }\n\n### 2. Recreate on openBook()\nIn openBook(i), if b.audioUrl is null but audio data exists in IDB:\n  if(!b.audioUrl && b.audioName){\n    // Audio blob was revoked — recreate from IDB\n    const blobs = await idbGet(b.id);\n    if(blobs && blobs.audioData){\n      b.audioUrl = URL.createObjectURL(new Blob([blobs.audioData]));\n    }\n  }\n\nWait — audio data is NOT stored in IDB in browser mode. The audio File\nobject from the file picker is converted to a blob URL immediately in\naddBook(). The original File is not persisted.\n\nThis means revoking the blob URL permanently loses the audio reference\nuntil the user re-links it via the relink overlay.\n\n### Revised approach: store audio ArrayBuffer in IDB\nIn addBook(), after creating the blob URL, also store the audio data:\n  const audioArrayBuffer = await upData.audio.arrayBuffer();\n  // Store alongside other blobs in idbSet\n\nThen on reopen, recreate from IDB.\n\nThis is a larger change — adds audio persistence to browser mode, which\nalso fixes the existing 'blob URL expires on reload' issue.\n\n### Simpler alternative: just revoke _audio.src, keep b.audioUrl\nRevoke only the src attribute's blob URL (which configurePlayerForMode\nalready does), not b.audioUrl itself. This frees the audio element's\nbuffer but keeps the reference for re-linking.\n\nActually, _audio.src IS b.audioUrl — they're the same blob URL.\nRevoking either revokes both.\n\n## Decision\nThe safest approach for now:\n1. In goLib(), pause audio and clear _audio.src:\n     _audio.pause();\n     _audio.removeAttribute('src');\n     _audio.load(); // releases internal buffer\n2. Keep b.audioUrl — it may be revoked but we don't null it.\n3. On reopen, if _audio.src is empty, reassign from b.audioUrl.\n   If the blob URL was revoked, the load will fail and trigger showRelink().\n\nThis releases the audio element's internal buffer without permanently\nlosing the blob URL reference (it may still work if not revoked).\n\n## Constraints\n- Do not revoke b.audioUrl if it might be needed on reopen.\n- _audio.removeAttribute('src') + load() releases the buffer.\n- The relink flow already handles expired blob URLs.\n- PWA mode is unaffected (handles are persistent).\n\n## Verification\n- Open a book, go back to library: audio buffer released.\n- Reopen same book: audio plays (blob URL may still be valid).\n- Reload page, reopen book: relink overlay appears (existing behaviour).\n- Run syntax check."
  },

  prompt:"# DEFERRED FEATURE: Confidence-Aware Sync Correction\n# Status: NOT implemented. Deliberately deferred.\n# Do not build until explicitly requested.\n\n## The Problem\nbuildSentenceTimings matches ebook sentences to transcript word runs via\nJaccard similarity in two passes. The fill pass accepts weak matches\n(bestScore > 0.35). During playback, timeupdate blindly trusts these\ntimestamps, which can cause highlight drift at poorly-matched sections.\n\n## The Approach (when ready to build)\nUse Option B: keep transcriptWords alive conditionally, store confidence\nscores alongside sentenceTimings, and add correctSyncDrift(audioTime)\nthat binary-searches transcriptWords by time, windows ~10 words, and\nre-checks similarity against +-5 ebook sentences around curSent.\n\n## Full spec\n\n1. Store bestScore in a parallel sentenceConfidence[] array in\n   buildSentenceTimings / _buildSentenceTimingsSync / worker\n   doSentenceTimings. Include in worker postMessage payload.\n\n2. Add: const SYNC_CONFIDENCE_THRESHOLD = 0.3;\n\n3. Only null transcriptWords if all confidence scores are above\n   threshold. If any are weak, keep transcriptWords alive.\n\n4. Add correctSyncDrift(audioTime): binary search transcriptWords for\n   word at audioTime, window ~10 words, run similarity() against\n   sentences[curSent-5..curSent+5], return best index or curSent.\n\n5. In timeupdate: if bestSent !== curSent AND confidence below\n   threshold, call correctSyncDrift(t) and use result instead.\n   High-confidence path must have zero additional overhead.\n\n6. Toast \"Sync corrected\" debounced to 30s between toasts.\n\n7. Update folio-context.md with sentenceConfidence,\n   _lastCorrectionToast, correctSyncDrift.\n\n8. Run node --check index.html when done.\n\n## Known limitation\nOnly helps when original match was weak due to OCR noise or minor text\ndifferences. Won't help with genuine ebook/transcript divergence."
  },

function matches(p, f) {
  if(f === 'all')      return true;
  if(f === 'active')   return p.status === 'active';
  if(f === 'deferred') return p.status === 'deferred';
  if(f === 'done')     return p.status === 'done';
  if(f === 'backlog')  return p.status === 'backlog';
  if(f === 'fix')      return p.type === 'fix';
  if(f === 'feat')     return p.type === 'feat';
  if(f === 'perf')     return p.type === 'perf';
  return true;
}

// ── Custom prompts (localStorage) ─────────────────────────
const CUSTOM_KEY = 'folio_custom_prompts_v1';
function loadCustom() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]'); } catch(e){ return []; }
}
function saveCustom(arr) { localStorage.setItem(CUSTOM_KEY, JSON.stringify(arr)); }
function allPrompts() { return [...PROMPTS, ...loadCustom()]; }

// ── Core render ────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendSection(label, items, container) {
  // Sort by numeric num ascending; non-numeric (✓, D) keep file order
  items = [...items].sort((a, b) => {
    const na = parseInt(a.num), nb = parseInt(b.num);
    if(isNaN(na) && isNaN(nb)) return 0;
    if(isNaN(na)) return 1;
    if(isNaN(nb)) return -1;
    return na - nb;
  });

  const h = document.createElement('div');
  h.className = 'section-heading';
  h.innerHTML = `${escHtml(label)}<span class="section-count">${items.length}</span>`;
  container.appendChild(h);

  items.forEach((p) => {
    const isDone     = p.status === 'done';
    const isDeferred = p.status === 'deferred';
    const isBacklog  = p.status === 'backlog';

    const typTag    = p.type==='fix'  ? '<span class="tag tag-fix">Fix</span>'
                    : p.type==='perf' ? '<span class="tag tag-perf">Perf</span>'
                    : '<span class="tag tag-feat">Feature</span>';
    const modelTag  = '<span class="tag tag-sonnet">Sonnet</span>';
    const effortLabels = { low:'Low', med:'Med', high:'High' };
    const effortTag = p.effort ? `<span class="tag tag-effort-${p.effort}">${effortLabels[p.effort]} effort</span>` : '';
    const hasPrompt  = p.prompt && p.prompt.trim().length > 0;
    const doneDate  = isDone && p.done ? `<span class="tag tag-date">${escHtml(p.done)}</span>` : '';
    const extraTag  = isDone     ? '<span class="tag tag-done">Done</span>' + doneDate
                    : isDeferred ? '<span class="tag tag-defer">Deferred</span>'
                    : isBacklog  ? (hasPrompt ? '' : '<span class="tag tag-backlog">Needs prompt</span>')
                    : '';
    const customTag = p.custom ? '<span class="tag tag-custom">Custom</span>' : '';

    const showPrompt = !isDone && hasPrompt;

    const bodyInner = !showPrompt
      ? `<div class="card-desc" style="padding-bottom:14px">${escHtml(p.desc)}</div>`
      : `<div class="card-desc">${escHtml(p.desc)}</div>
         <div class="prompt-wrap">
           <div class="prompt-text">${escHtml(p.prompt)}</div>
           <div class="copy-bar">
             <button class="copy-btn" onclick="copyText(this)">
               <span class="copy-icon">&#x2398;</span> Copy prompt
             </button>
           </div>
         </div>`;

    const deleteBtn = p.custom
      ? `<button class="modal-close" title="Delete" style="margin-left:4px;font-size:14px" onclick="deleteCustom('${escHtml(p.num)}',event)">&#x2715;</button>`
      : '';

    const card = document.createElement('div');
    card.className = 'prompt-card' + (isDone ? ' done-card' : '') + (isBacklog && !hasPrompt ? ' backlog-card' : '');
    card.innerHTML = `
      <div class="card-header" onclick="this.closest('.prompt-card').classList.toggle('open')">
        <div class="card-num">${escHtml(p.num)}</div>
        <div class="card-meta">
          <div class="card-title">${escHtml(p.title)}</div>
          <div class="card-tags">${typTag}${modelTag}${effortTag}${extraTag}${customTag}</div>
        </div>
        ${deleteBtn}
        <span class="card-chevron">&#9660;</span>
      </div>
      <div class="card-body">${bodyInner}</div>`;
    container.appendChild(card);
    const copyBtn = card.querySelector('.copy-btn');
    if(copyBtn) copyBtn._promptText = p.prompt || '';
  });
}

function renderAll(f) {
  const all = allPrompts();
  const container = document.getElementById('cards');
  container.innerHTML = '';

  const active   = all.filter(p => p.status==='active'   && matches(p,f));
  const backlog  = all.filter(p => p.status==='backlog'  && matches(p,f));
  const deferred = all.filter(p => p.status==='deferred' && matches(p,f));
  const done     = all.filter(p => p.status==='done'     && matches(p,f));
  const total    = active.length + backlog.length + deferred.length + done.length;

  document.getElementById('empty').style.display = total===0 ? 'block' : 'none';
  if(active.length)   appendSection('Active', active, container);
  if(backlog.length)  appendSection('Backlog', backlog, container);
  if(deferred.length) appendSection('Deferred', deferred, container);
  if(done.length)     appendSection('Completed', done, container);
}

function filter(f, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll(f);
}

function copyText(btn) {
  const text = btn._promptText || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<span class="copy-icon">&#10003;</span> Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<span class="copy-icon">&#x2398;</span> Copy prompt';
    }, 2000);
  });
}

// ── Add-prompt modal ───────────────────────────────────────
function _toggleDoneField() {
  const isDone = document.getElementById('f-status').value === 'done';
  document.getElementById('f-done-wrap').style.display = isDone ? '' : 'none';
  if(isDone && !document.getElementById('f-done').value) {
    document.getElementById('f-done').value = new Date().toISOString().slice(0,10);
  }
}
document.getElementById('f-status').addEventListener('change', _toggleDoneField);

function openAddModal() {
  document.getElementById('f-title').value  = '';
  document.getElementById('f-desc').value   = '';
  document.getElementById('f-prompt').value = '';
  document.getElementById('f-status').value = 'active';
  document.getElementById('f-type').value   = 'feat';
  document.getElementById('f-effort').value = 'low';
  document.getElementById('f-done').value   = '';
  _toggleDoneField();
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(), 50);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

function saveNewPrompt() {
  const title = document.getElementById('f-title').value.trim();
  if(!title){ document.getElementById('f-title').focus(); return; }
  const custom = loadCustom();
  const maxNum = allPrompts().reduce((m,p)=>Math.max(m, parseInt(p.num)||0), 0);
  const status = document.getElementById('f-status').value;
  custom.push({
    num:    String(maxNum + 1),
    status,
    type:   document.getElementById('f-type').value,
    model:  'sonnet',
    effort: document.getElementById('f-effort').value,
    done:   status === 'done' ? document.getElementById('f-done').value : '',
    title,
    desc:   document.getElementById('f-desc').value.trim(),
    prompt: document.getElementById('f-prompt').value,
    custom: true
  });
  saveCustom(custom);
  closeAddModal();
  refreshStats();
  const activeBtn = document.querySelector('.filter-btn.active');
  renderAll(activeBtn ? activeBtn.textContent.toLowerCase().replace('completed','done').trim() : 'all');
}

function deleteCustom(num, e) {
  e.stopPropagation();
  saveCustom(loadCustom().filter(p => p.num !== num));
  refreshStats();
  const activeBtn = document.querySelector('.filter-btn.active');
  renderAll(activeBtn ? activeBtn.textContent.toLowerCase().replace('completed','done').trim() : 'all');
}

// ── Stats ──────────────────────────────────────────────────
function refreshStats() {
  const all = allPrompts();
  document.getElementById('statActive').textContent  = all.filter(p=>p.status==='active').length;
  document.getElementById('statDone').textContent    = all.filter(p=>p.status==='done').length;
  document.getElementById('statBacklog').textContent = all.filter(p=>p.status==='backlog').length;
  document.getElementById('statDefer').textContent   = all.filter(p=>p.status==='deferred').length;
}

refreshStats();
renderAll('all');
</script>
