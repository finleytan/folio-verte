  {
  num:"54", status:"backlog", type:"fix", model:"sonnet", effort:"low",
  title:"parseMd leaves partial markdown symbols on edge-case formatting",
  desc:"parseMd strips inline markdown with /[*_`~]+/g but leaves partial symbols on tokens like word* or _word where the asterisk or underscore is adjacent to a non-space character. Produces garbage text fragments for heavily formatted Markdown ebooks.",
  prompt:"# Fix: parseMd leaves partial markdown symbols in index.html\n\n## Context\nRead parseMd(data) in full. The current inline stripping regex is:\n  line.replace(/[*_`~]+/g, '')\nThis removes runs of markdown chars but leaves isolated ones:\n- \"word*\" (trailing asterisk) → \"word*\" (asterisk not in a run of 2+)\n- \"_word\" (leading underscore) → \"_word\"\n\n## Fix\nReplace the stripping regex with one that handles both paired and unpaired markers:\n\n  // Remove markdown bold/italic/code/strikethrough markers\n  // Handles paired (**word**), single markers adjacent to word chars,\n  // and trailing punctuation attached to markdown syntax\n  const t = line\n    .replace(/[*_]{1,3}([^*_]+)[*_]{1,3}/g, '$1')  // paired markers: **word** → word\n    .replace(/[*_`~]+/g, '')                          // remaining isolated markers\n    .trim();\n\nApply this two-pass approach in parseMd(): first strip paired markers\n(which preserves the enclosed text), then strip any leftover isolated markers.\n\n## Constraints\n- Only change parseMd(). Do not change parseTxt(), parseHtml(), or extractFromDom().\n- The function must return the same items structure: [{type, level, text}].\n- Heading detection (hm = line.match(/^(#{1,3})\\s+(.+)/)) runs before stripping\n  and is unaffected — check that headings still work correctly.\n- Do not add a full Markdown parser — minimal stripping is sufficient for this use case.\n\n## Verification\n- \"This is **bold** and _italic_ text.\" → \"This is bold and italic text.\"\n- \"word*\" → \"word\" (no trailing asterisk).\n- \"# Heading with **bold**\" → heading with text \"Heading with bold\".\n- Run syntax check."
  },

  prompt:"# Feature: Freeform notes per book in index.html\n\n## Context\nRead the book object structure and openBookInfoModal() in full.\nThe book info modal shows file details — it's the natural place to\nadd a notes section.\n\n## Data model\nAdd to book object:\n  b.notes = '';  // freeform text, persisted\n\n## Implementation\n\n### HTML — add to book info modal\nAfter the existing file info sections in #bookInfoModal, add:\n  <div class=\"binfo-sec\">\n    <div class=\"binfo-label\">Notes</div>\n    <textarea id=\"biNotes\" class=\"bi-notes\" rows=\"4\"\n      placeholder=\"Add notes about this book…\"\n      oninput=\"saveBookNotes(this.value)\"></textarea>\n  </div>\n\n### CSS\n  .bi-notes {\n    width: 100%; background: var(--surface); color: var(--text);\n    border: 1px solid var(--border); border-radius: 6px;\n    padding: 10px; font: inherit; font-size: 13px; line-height: 1.5;\n    resize: vertical; min-height: 80px;\n  }\n\n### JS\n  function saveBookNotes(val){\n    if(curBookIdx < 0) return;\n    library[curBookIdx].notes = val;\n    saveBookProgressDebounced();\n  }\n\nIn openBookInfoModal(), populate the textarea:\n  document.getElementById('biNotes').value = library[curBookIdx].notes || '';\n\n## Constraints\n- Notes persisted via saveBookProgress (both browser and PWA modes).\n- No character limit enforced in code (textarea handles overflow).\n- Do not add rich text editing — plain text only.\n- oninput with debounced save is sufficient.\n\n## Verification\n- Open book info: notes textarea visible with placeholder.\n- Type notes, close modal, reopen: notes preserved.\n- Different books have independent notes.\n- Run syntax check."

  {
  num:"62", status:"backlog", type:"perf", model:"sonnet", effort:"low",
  title:"Debounce interval review for high-speed TTS playback",
  desc:"At high TTS rates (2x+), the advanceSent() timer and saveBookProgressDebounced() may fire too frequently. Quick audit of timing constants to ensure they scale with playback rate.",
  prompt:"# Perf: Debounce interval review for high-speed TTS in index.html\n\n## Context\nRead advanceSent() — it calculates ms from character count + wpm + sentPauseMs.\nRead saveBookProgressDebounced() — it uses a 500ms timer.\nAt 2x TTS rate, sentences advance roughly twice as fast.\n\n## Audit\n1. Check if advanceSent() accounts for playback rate in its timing calculation.\n   If wpm is 300 and rate is 2x, the effective WPM is 600 — does the timer\n   reflect this? If not, the scroll engine falls behind speech.\n\n2. Check saveBookProgressDebounced() — at 2x rate, saves fire more often.\n   Is 500ms still appropriate or should it scale? 500ms is likely fine\n   since it's debounced (coalesces multiple calls).\n\n3. Check _lastTimeUpdate throttle (250ms / ~4fps) — does this cause\n   missed sentence transitions at high speed? At 2x, a 2-second sentence\n   takes 1 second. At ~4Hz, that's 4 checks per sentence — should be fine.\n\n4. Check the scroll-pause IIFE cooldown (2 seconds). At high speed,\n   2 seconds of paused auto-scroll means missing several sentences.\n   Consider: should the cooldown scale with rate?\n\n## Fix\nBased on audit findings:\n- If advanceSent() doesn't account for rate: multiply wpm by rate.\n- If scroll-pause is too long at high speed: scale cooldown by 1/rate\n  (min 500ms).\n- If 500ms save debounce is fine: no change needed.\n- If 250ms timeupdate throttle is fine: no change needed.\n\n## Constraints\n- Only change timing constants, not control flow.\n- Do not change the debounce mechanism itself.\n- Changes must not affect normal (1x) speed behaviour.\n\n## Verification\n- Play TTS at 2x: sentences advance smoothly, no lag.\n- Scroll follows speech at all rates.\n- Progress saves are not excessive.\n- Run syntax check."
  },

  {
  num:"63", status:"backlog", type:"fix", model:"sonnet", effort:"low",
  title:"configurePlayerForMode called before all handles resolved — wrong mode if both fail",
  desc:"configurePlayerForMode() is called as soon as the first file handle resolves, but if both audio and ebook handles fail the function may lock the player into the wrong mode with no recovery path. The resolution order is not guaranteed and there is no final reconciliation step.",
  prompt:"# Fix: configurePlayerForMode called before all handles resolved in index.html\n\n## Context\nRead pwaOpenBook(i) in full. The current flow:\n  1. Resolve audio handle → create blob URL (or show error toast)\n  2. Resolve transcript handle → load text\n  3. Resolve cover handle → create blob URL\n  4. Call configurePlayerForMode(b, resolvedAudioUrl, rate)   ← called after audio attempt\n  5. loadTranscriptData(b)\n  6. Resolve ebook handle → load data\n  7. loadEbook(b, onDone)\n\nIf BOTH audio handle resolution fails AND ebook handle resolution fails later,\nconfigurePlayerForMode has already been called with resolvedAudioUrl=null and\nttsMode was set to true. But then loadEbook also fails — the player is left\nin TTS mode with no content, no error recovery.\n\n## Fix\nMove configurePlayerForMode() to after the ebook handle is resolved,\nso the mode decision has full information:\n\n  1. Resolve audio handle → store resolvedAudioUrl (or null on failure)\n  2. Resolve transcript handle\n  3. Resolve cover handle\n  4. Resolve ebook handle → store ebookData (or null on failure)\n  5. Call configurePlayerForMode(b, resolvedAudioUrl, rate)   ← moved here\n  6. loadTranscriptData(b)\n  7. loadEbook(b, onDone)  ← or show error if ebookData still null\n\nIf both audio and ebook fail, show a clear error toast and return without\ncalling configurePlayerForMode or loadEbook.\n\n## Constraints\n- configurePlayerForMode must still be called before loadTranscriptData.\n- The existing try/catch blocks around each handle resolution must remain.\n- The existing error toasts for audio/ebook failure must remain.\n- Do not change configurePlayerForMode() itself.\n\n## Verification\n- Audio handle resolves, ebook fails: show error toast, don't open player.\n- Both handles fail: single error toast, stay on library screen.\n- Both succeed: normal book open flow.\n- Run syntax check."
  },

  {

  title:"rateBtnInline opens options panel using fragile querySelector for tab selection",
  desc:"The inline speed button calls switchOptTab('playback', document.querySelector('.op-tab')) which relies on the first .op-tab in the DOM being the Playback tab. If tab order ever changes it will silently open the wrong tab.",
  prompt:"# Fix: rateBtnInline uses fragile querySelector for tab selection in index.html\n\n## Context\nRead the #rateBtnInline onclick attribute in HTML. It calls:\n  switchOptTab('playback', document.querySelector('.op-tab'))\nThis relies on the first .op-tab in the DOM being the Playback tab.\n\nRead switchOptTab(name, btn) — it uses btn to mark the active tab button.\nThe tabs are Playback, Display, Advanced. Their pill buttons should have\nstable IDs.\n\n## Fix\n\n### 1. Add IDs to the option tab buttons in HTML\nFind the three .op-tab buttons in the options panel and add IDs if they\ndon't already have them:\n  <button class=\"op-tab\" id=\"opTabBtn-playback\" ...>Playback</button>\n  <button class=\"op-tab\" id=\"opTabBtn-display\"  ...>Display</button>\n  <button class=\"op-tab\" id=\"opTabBtn-advanced\" ...>Advanced</button>\n\n### 2. Update the #rateBtnInline onclick\nChange from:\n  onclick=\"toggleOpts();switchOptTab('playback',document.querySelector('.op-tab'))\"\nTo:\n  onclick=\"toggleOpts();switchOptTab('playback',document.getElementById('opTabBtn-playback'))\"\n\nThis makes the tab selection robust regardless of DOM order.\n\n## Constraints\n- If the tab buttons already have IDs, use those instead of adding new ones.\n- switchOptTab() must not be changed.\n- Do not change the other tabs' onclick handlers (if they also use querySelector,\n  fix those too with the same pattern — but only if they share the same fragility).\n\n## Verification\n- Tapping rate button opens options panel on the Playback tab.\n- Options panel tab switching still works normally.\n- Run syntax check."

  {
  num:"65", status:"backlog", type:"fix", model:"sonnet", effort:"low",
  title:"folio_install_dismissed flag never expires — install prompt permanently hidden after one dismissal",
  desc:"Once the install banner is dismissed the folio_install_dismissed flag is set with no version key or expiry. Users who dismiss it accidentally can never get the install prompt back without manually clearing localStorage, and the flag persists across major app updates.",
  prompt:"# Fix: folio_install_dismissed flag never expires in index.html\n\n## Context\nRead dismissInstall() in full. It sets localStorage.setItem('folio_install_dismissed','1').\nRead the beforeinstallprompt handler — it checks this flag with getItem().\n\n## Fix\nInstead of a bare '1' flag, store a versioned dismissal with a timestamp:\n\n  function dismissInstall(){\n    document.getElementById('installBanner').classList.remove('show');\n    const rec = { v: 1, ts: Date.now() };\n    localStorage.setItem('folio_install_dismissed', JSON.stringify(rec));\n  }\n\nUpdate the beforeinstallprompt check to:\n  const raw = localStorage.getItem('folio_install_dismissed');\n  if(raw) {\n    try {\n      const rec = JSON.parse(raw);\n      // Expire after 30 days\n      const EXPIRE_MS = 30 * 24 * 60 * 60 * 1000;\n      if(rec.v === 1 && Date.now() - rec.ts < EXPIRE_MS) return;\n      // Expired or wrong version — show banner again\n    } catch(e) {\n      // Legacy bare '1' flag — treat as permanent (don't show)\n      return;\n    }\n  }\n\nThe 30-day expiry means users who accidentally dismiss it will see the\nprompt again after a month. Keep the legacy bare-'1' handling so old\ndismissals are still respected.\n\n## Constraints\n- Do not change installPWA() logic.\n- The banner must not show on every page load if dismissed recently.\n- The 3-second delay before showing the banner must remain.\n\n## Verification\n- Dismiss banner: does not reappear immediately.\n- Simulate expired record (set ts to 0): banner reappears on next load.\n- Legacy bare-'1' flag: still suppresses banner.\n- Run syntax check."
  },

  {

  title:"pwaScanBookFolder has no early exit once all slots are filled",
  desc:"pwaScanBookFolder() iterates every file in the folder even after audio, ebook, transcript, and cover slots are all populated. For folders with many non-book files this wastes time on unnecessary getFile() calls.",
  prompt:"# Perf: pwaScanBookFolder has no early exit in index.html\n\n## Context\nRead pwaScanBookFolder(folderName, entry) in full. It iterates all files\nin a directory entry. After the loop, it checks if audioFile && ebookFile\nare filled. But the loop continues even after all four slots are filled.\n\n## Fix\nAdd an early-exit check at the bottom of the for-await loop body. After\neach file is assigned to a slot, check if all slots are filled:\n\n  // After the if/else chain that assigns to audioFile, ebookFile, etc.:\n  if(audioFile && ebookFile && transcriptFile && coverFile) break;\n\nThis exits the loop as soon as all four slots are populated, skipping\nany remaining files in the folder.\n\n## Where to place it\nAt the very end of the for-await loop body, after all the if/else\nassignment conditions. The break exits the for-await loop.\n\n## Constraints\n- The break must come after ALL assignment conditions in the loop body,\n  not inside any of them.\n- The logic that chooses preferred JSON/image files (prefer \"transcript\"\n  in name, prefer \"cover\" in name) happens in a second pass AFTER the loop\n  — this is NOT changed. The break only applies to the main loop.\n- Verify: if audioFile is filled on file 1 but ebookFile is not yet filled\n  on file 2, the loop must continue until ebookFile is also found or exhausted.\n\n## Verification\n- A folder with 50 files where the book files are first: scan time reduced.\n- A folder where book files are last: scan result unchanged (all files checked).\n- Run syntax check."

  {

  title:"Ebook data string held in memory after DOM is built (PWA only)",
  desc:"In PWA mode the raw ebook text string read from the file handle is kept in the library entry after loadEbook() has finished building the DOM. The string can be several MB for large books and is never needed again after rendering — it should be nulled out to reduce memory pressure.",
  prompt:"# Perf: Ebook data string held in memory after DOM is built (PWA only) in index.html\n\n## Context\nRead pwaOpenBook(i) — it sets b.ebookData from the file handle.\nRead loadEbook(book, onDone) — it reads book.ebookData to build the DOM.\nAfter loadEbook() completes (onDone fires), ebookData is no longer needed\nbecause the DOM is already built and sentences[] is populated.\nIn PWA mode, ebookData can be several MB for large books.\n\n## Fix\nAt the end of the onDone callback in pwaOpenBook() — after curSent, updateHL,\nupdateProg, seekAudioToSentence, pulseResumeSent — add:\n  b.ebookData = null; // free memory — DOM is already built\n\nSimilarly, null it in the browser-mode openBook() onDone callback as well,\nsince in browser mode the data is in IndexedDB and can be reloaded from there\nif needed (though reloading the page is the only scenario where it would be\nneeded again):\n  b.ebookData = null; // DOM built, data no longer needed in memory\n\n## Constraints\n- Only null it INSIDE the onDone callback (after DOM is fully built).\n- Do not null it before onDone — loadEbook() reads ebookData throughout\n  the async build process.\n- biReassign() (ebook reassign) reloads the ebook from the new file and\n  calls loadEbook() again — this is fine because it reassigns b.ebookData\n  from the new FileReader result before calling loadEbook().\n- In PWA mode, the handle (b.ebookHandle) is still valid for future reloads.\n\n## Verification\n- Open a large EPUB. After onDone fires, b.ebookData is null in console.\n- Go back to library and reopen: pwaOpenBook re-reads from handle, works normally.\n- Run syntax check."

  {
  num:"70", status:"backlog", type:"perf", model:"sonnet", effort:"low",
  title:"content-visibility intrinsic size hint may cause layout shifts",
  desc:"ebook-para uses contain-intrinsic-size: auto 80px but paragraphs vary widely in height — incorrect cached estimates cause layout shifts as the user scrolls through books with short or long paragraphs.",
  prompt:"# Perf: content-visibility intrinsic size hint layout shifts in index.html\n\n## Context\nRead the CSS for .ebook-para. It uses:\n  content-visibility: auto;\n  contain-intrinsic-size: auto 80px;\nThe 80px estimate is wrong for most paragraphs and causes layout jumps\nas the browser corrects its size estimate when paragraphs scroll into view.\n\n## Fix\nChange the contain-intrinsic-size to use the 'auto' keyword which caches\nthe last measured size instead of using a fixed estimate:\n\n  .ebook-para {\n    content-visibility: auto;\n    contain-intrinsic-size: auto 120px;  /* 120px is a better starting estimate */\n  }\n\nThe 'auto' prefix before the size value (already present) means the browser\nremembers the actual rendered size after first paint — subsequent scrolling\nback to a paragraph uses the cached size instead of the estimate. The 80px\nhint is only used on first render before measurement; 120px is closer to\nan average paragraph height at default font size.\n\nAdditionally, check if contain-intrinsic-block-size would be more\nappropriate (only constrains block/vertical axis) — use it if supported:\n  contain-intrinsic-block-size: auto 120px;\n\n## Constraints\n- CSS-only change. Do not remove content-visibility: auto — it is a\n  significant performance win for long books.\n- Do not change any other .ebook-para properties (margins, font, etc).\n- If contain-intrinsic-block-size is used, keep the auto prefix.\n\n## Verification\n- Open a long book. Scroll quickly through it. No visible layout jumps.\n- Run syntax check (JS unchanged)."

  {

  title:"Tap rate display to cycle speed presets",
  desc:"Tapping #rateBtnInline on the seek strip cycles through RATE_STEPS presets. Long-press (400ms) still opens the options panel. Adds a brief flash animation on cycle.",
  prompt:"# Feature: Tap rate display to cycle speed presets in index.html\n\n## Goal\nTapping the #rateBtnInline display on the seek strip cycles through\nRATE_STEPS presets instead of opening the options panel. Long-press\n(400ms+) still opens options for full control.\n\n## 1. Remove onclick from #rateBtnInline in HTML\nThe button currently has:\n  onclick=\"toggleOpts();switchOptTab('playback',document.querySelector('.op-tab'))\"\nRemove that onclick attribute entirely.\n\n## 2. Add press-duration handler in JS\nAdd near the other rate/speed functions:\n\n  function _initRateBtnBehaviour(){\n    const btn = document.getElementById('rateBtnInline');\n    if(!btn) return;\n    let t = 0;\n    btn.addEventListener('pointerdown', () => { t = Date.now(); });\n    btn.addEventListener('pointerup', () => {\n      const dur = Date.now() - t;\n      t = 0;\n      if(dur < 400){\n        changeSpeed(1);\n      } else {\n        toggleOpts();\n        switchOptTab('playback', document.querySelector('.op-tab'));\n      }\n    });\n    btn.addEventListener('pointercancel', () => { t = 0; });\n  }\n\nCall _initRateBtnBehaviour() once in init() after cacheDOM().\n\n## 3. Visual flash on cycle\nIn changeSpeed(), after calling setRate(next), briefly flash the button:\n\n  const b = document.getElementById('rateBtnInline');\n  if(b){ b.classList.add('rate-flash');\n    setTimeout(() => b.classList.remove('rate-flash'), 180); }\n\nAdd to stylesheet:\n  .rate-flash { background: var(--accent) !important;\n                color: #fff !important;\n                transition: none !important; }\n\n## Notes\n- changeSpeed() and setRate() already exist — no changes needed there\n- Do not remove the rate presets from the options panel\n- Do not add onclick back — the pointerdown/up pair handles both tap and long-press\n\nRun node --check index.html when done."

  desc:"In PWA mode the top bar and seek strip are always visible, reducing reading area. Controls should fade out after 3 seconds of inactivity and reappear on any tap or touch. This is a PWA-only feature — browser mode is unchanged.",
  prompt:"# Feature: Auto-hide controls on inactivity in PWA mode in index.html\n\n## Context\nRead folio-context.md: CSS SECTIONS (Top bar, Seek strip), HTML player screen breakdown,\nand CLAUDE.md constraints (IS_PWA branch separation).\nAffected elements: .top-bar, #seekStrip, #ttsBar (when visible).\nIS_PWA is a boolean constant. Only apply this behaviour inside IS_PWA === true.\n\n## Implementation\n\n### CSS\nAdd a CSS class .controls-hidden to #player:\n  #player.controls-hidden .top-bar,\n  #player.controls-hidden #seekStrip,\n  #player.controls-hidden #ttsBar {\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity 0.3s ease;\n  }\nAdd the base transition to .top-bar, #seekStrip, #ttsBar (opacity 0.3s) so the fade-in is smooth.\nDo not change any layout properties — controls must still occupy space (visibility not display).\n\n### JS\nAdd near the player initialisation block (inside or just after openBook or init()):\n\n  let _controlsTimer = null;\n  function _showControls() {\n    document.getElementById('player').classList.remove('controls-hidden');\n    clearTimeout(_controlsTimer);\n    _controlsTimer = setTimeout(_hideControls, 3000);\n  }\n  function _hideControls() {\n    document.getElementById('player').classList.add('controls-hidden');\n  }\n  function _initAutoHide() {\n    if (!IS_PWA) return;\n    ['touchstart','pointerdown','pointermove'].forEach(ev => {\n      document.getElementById('player').addEventListener(ev, _showControls, { passive: true });\n    });\n    _showControls(); // start the initial timer\n  }\n\nCall _initAutoHide() from init() after cacheDOM().\n\n### Rules\n- Auto-hide must pause while any modal is open — call _showControls() from _openModalEl and\n  clearTimeout(_controlsTimer) to freeze the timer while modal is visible, restart on _closeModalRestore.\n- Auto-hide must not trigger while the options panel (#optPanel) is open. Add a guard:\n  if (document.getElementById('optPanel').classList.contains('open')) { _showControls(); return; }\n  inside _hideControls() so it bails out if options are open.\n- Browser mode (IS_PWA===false): no changes, no classes added, no timers.\n- Do not change .top-bar or #seekStrip layout, position, or z-index.\n\n## Verification\n- PWA mode: controls visible on open, fade after 3s, reappear on tap.\n- PWA mode: tap seek bar — controls reappear and timer resets.\n- PWA mode: options panel open — controls do not hide.\n- Browser mode: controls always visible, no fade behaviour.\n- Run syntax check.\n"
  },

  {
  num:"55", status:"backlog", type:"feat", model:"sonnet", effort:"med",
  title:"Library sort order is fixed — no user control",
  desc:"Books are sorted alphabetically in PWA mode and by insertion order in browser mode with no way to reorder — users with large libraries have no way to surface recently-read or prioritised books.",
  prompt:"# Feature: Library sort order control in index.html\n\n## Context\nRead renderLib() and pwaScanAndRender(). In PWA mode, books are sorted\nalphabetically by title after scan. In browser mode, books are in insertion\norder (library[] array order). There is no UI to change sort order.\n\n## Implementation\n\n### State\nAdd a module-level variable:\n  let _libSortOrder = 'alpha'; // 'alpha' | 'recent' | 'progress'\nPersist to localStorage: key 'folio_lib_sort_v1'. Load in init().\n\n### Sort function\n  function _sortedLibrary() {\n    const idx = library.map((b, i) => i); // indices to sort\n    if(_libSortOrder === 'alpha') {\n      idx.sort((a, b) => library[a].title.localeCompare(library[b].title));\n    } else if(_libSortOrder === 'recent') {\n      idx.sort((a, b) => (library[b].lastOpened || 0) - (library[a].lastOpened || 0));\n    } else if(_libSortOrder === 'progress') {\n      const pct = i => library[i].totalSents > 1\n        ? (library[i].curSent || 0) / (library[i].totalSents - 1) : 0;\n      idx.sort((a, b) => pct(b) - pct(a));\n    }\n    return idx;\n  }\n\nUpdate renderLib() to use _sortedLibrary() to order cards:\n  const order = _sortedLibrary();\n  order.forEach(i => { const b = library[i]; ... });\n\n### Track last-opened\nIn openBook() and pwaOpenBook(), set:\n  library[i].lastOpened = Date.now();\n\n### UI\nAdd a small sort toggle button to the lib-header:\n  <button id=\"libSortBtn\" class=\"ic-btn\" title=\"Sort order\" onclick=\"cycleLibSort()\">⇅</button>\n\n  function cycleLibSort() {\n    const orders = ['alpha', 'recent', 'progress'];\n    _libSortOrder = orders[(orders.indexOf(_libSortOrder) + 1) % orders.length];\n    localStorage.setItem('folio_lib_sort_v1', _libSortOrder);\n    const labels = {alpha:'A–Z', recent:'Recent', progress:'Progress'};\n    showToast('Sort: ' + labels[_libSortOrder]);\n    renderLib();\n  }\n\n## Constraints\n- In PWA mode, pwaScanAndRender() currently calls .sort() — remove that\n  sort() call and let renderLib() handle ordering via _sortedLibrary().\n- Browser mode: library[] order is preserved (renderLib handles sort).\n- lastOpened is not persisted to IDB blobs — it's metadata, so save via\n  saveLibrary() (browser mode) or savePwaProgress() (PWA mode).\n\n## Verification\n- Cycle through A–Z, Recent, Progress: cards reorder.\n- Sort choice persists across reload.\n- Run syntax check."

  {
  num:"56", status:"backlog", type:"feat", model:"sonnet", effort:"med",
  title:"Export / backup reading progress",
  desc:"Reading positions are stored only in localStorage and IndexedDB — clearing browser data or moving to a new device permanently loses all progress with no recovery path.",
  prompt:"# Feature: Export / backup reading progress in index.html\n\n## Context\nRead saveLibrary(), getPwaProgress(), saveBookProgress(). Progress is stored\nin localStorage (folio_library_v2 for browser mode, folio_pwa_progress_v1\nfor PWA mode). There is no way to export this data.\n\n## Implementation\n\n### Export\nAdd a \"Export Progress\" button to the library screen header or to the\nAdvanced tab of the options panel:\n  <button onclick=\"exportProgress()\">Export progress</button>\n\n  function exportProgress() {\n    const data = {\n      version: 1,\n      exported: new Date().toISOString(),\n      mode: IS_PWA ? 'pwa' : 'browser',\n      progress: IS_PWA\n        ? getPwaProgress()\n        : library.map(b => ({\n            id: b.id, title: b.title,\n            curSent: b.curSent, curWord: b.curWord,\n            audioTime: b.audioTime, totalSents: b.totalSents,\n            syncOffset: b.syncOffset || 0\n          }))\n    };\n    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'folio-progress-' + Date.now() + '.json';\n    a.click();\n    URL.revokeObjectURL(url);\n    showToast('Progress exported', 'success');\n  }\n\n### Import (basic)\nAdd a companion import that reads the JSON and merges progress:\n  function importProgress(file) {\n    const reader = new FileReader();\n    reader.onload = e => {\n      try {\n        const data = JSON.parse(e.target.result);\n        if(data.version !== 1) { showToast('Unrecognised backup format', 'error'); return; }\n        if(IS_PWA) {\n          const all = getPwaProgress();\n          Object.assign(all, data.progress);\n          localStorage.setItem(PWA_PROG_KEY, JSON.stringify(all));\n        } else {\n          // Merge into library by id\n          data.progress.forEach(p => {\n            const b = library.find(b => b.id === p.id);\n            if(b) Object.assign(b, {curSent:p.curSent, curWord:p.curWord,\n              audioTime:p.audioTime, syncOffset:p.syncOffset});\n          });\n          saveLibrary();\n        }\n        showToast('Progress restored', 'success');\n        renderLib();\n      } catch(e) { showToast('Import failed: ' + e.message, 'error'); }\n    };\n    reader.readAsText(file);\n  }\n\nAdd a hidden file input and a trigger button near the export button.\n\n## Constraints\n- Do NOT export ebook data, audio data, or cover images — progress only.\n- The export file must be human-readable JSON.\n- Import is a merge (not replace) — existing books not in the backup are unaffected.\n- Do not add any UI for server sync — local file only.\n\n## Verification\n- Click export: JSON file downloaded with current positions.\n- Import the file: positions restored.\n- Run syntax check."

  {
  num:"57", status:"backlog", type:"feat", model:"sonnet", effort:"med",
  title:"Sleep timer — no custom duration and no way to extend a running timer",
  desc:"The sleep timer cycles through fixed 15/30/45/60 min presets only. There is no way to set an arbitrary duration or extend a timer that is already running without cycling all the way back around.",
  prompt:"# Feature: Sleep timer custom duration and extend in index.html\n\n## Context\nRead cycleSleepTimer(), clearSleepTimer(), _updateSleepBadge() in full.\nSLEEP_OPTIONS array holds fixed presets. The timer badge shows remaining time.\nThere is no way to set a custom duration or extend the running timer.\n\n## Fix — two improvements:\n\n### 1. Extend button when timer is running\nWhen the sleep badge is visible (timer running), allow tapping it to add 15 minutes:\n  cycleSleepTimer() currently cycles through presets. Change its behaviour:\n  - If NO timer is running: cycle to next preset and start it (existing behaviour).\n  - If a timer IS RUNNING: add 15 minutes to the remaining time and show toast\n    \"Sleep timer extended +15 min\".\n\n  function cycleSleepTimer() {\n    if(_sleepTimerId) {\n      // Extend by 15 minutes\n      const remaining = Math.max(0, _sleepEndTime - Date.now());\n      const extended = remaining + 15 * 60 * 1000;\n      clearSleepTimer();\n      _startSleepTimer(extended);\n      showToast('Sleep timer +15 min', '', 2000);\n      return;\n    }\n    // ... existing cycle logic ...\n  }\n\nExtract the timer-start logic into a helper:\n  function _startSleepTimer(ms) {\n    _sleepEndTime = Date.now() + ms;\n    _sleepTimerId = setTimeout(() => { mediaPause(); clearSleepTimer(); }, ms);\n    _sleepTickId = setInterval(_updateSleepBadge, 1000);\n    _updateSleepBadge();\n  }\n\n### 2. Add a \"30 min\" and \"90 min\" preset to SLEEP_OPTIONS\n  const SLEEP_OPTIONS = [0, 15, 30, 45, 60, 90]; // minutes; 0 = off\n\nThis adds a 90-minute option for long listening sessions.\n\n## Constraints\n- _sleepTimerId, _sleepEndTime, _sleepTickId variable names must stay the same.\n- clearSleepTimer() must still work (reset all three).\n- The sleep badge UI must update correctly for extended timers.\n- mediaPause() is called on timer expiry — this must remain.\n\n## Verification\n- Tap sleep badge with no timer: cycles through presets.\n- Start a 15-min timer. Tap badge: +15 min, now shows 30 min.\n- Timer reaches zero: playback pauses.\n- Run syntax check."
  },

  {
  num:"58", status:"backlog", type:"feat", model:"sonnet", effort:"med",
  title:"Reading statistics — time remaining and session tracking",
  desc:"Estimated time remaining and session progress for planning listening sessions. All data is in memory — purely additive display work. Optional b.totalReadingTime accumulator for lifetime stats.",
  prompt:"# Feature: Reading statistics in index.html\n\n## Context\nRead updateProg(), sentences[], sentenceTimings[], curSent, and the book\nobject structure. All data needed for estimates is already in memory.\n\n## Implementation\n\n### 1. Time remaining estimate\nCalculate based on available data:\n\n  function getTimeRemaining(){\n    const remaining = sentences.length - curSent;\n    if(!ttsMode && sentenceTimings.length){\n      // Audio mode: use actual audio duration\n      const lastTiming = sentenceTimings.findLast(t => t);\n      if(lastTiming && _audio.duration){\n        const elapsed = _audio.currentTime;\n        const rate = _audio.playbackRate || 1;\n        return Math.max(0, (_audio.duration - elapsed) / rate);\n      }\n    }\n    // TTS/fallback: estimate from WPM\n    let totalWords = 0;\n    for(let i = curSent; i < sentences.length; i++){\n      totalWords += (sentences[i].words?.length || 0);\n    }\n    return (totalWords / (wpm || 150)) * 60; // seconds\n  }\n\n### 2. Display in options panel or top bar\nAdd to the About section of the Advanced tab or as a hoverable tooltip:\n  <div class=\"op-row\">\n    <span class=\"op-ttl\">Time remaining</span>\n    <span id=\"statTimeRemaining\">—</span>\n  </div>\n  <div class=\"op-row\">\n    <span class=\"op-ttl\">Session time</span>\n    <span id=\"statSessionTime\">—</span>\n  </div>\n\n### 3. Session timer\n  let _sessionStart = 0;\n  // Set _sessionStart = Date.now() when playback starts (in mediaPlay/ttsPlay)\n  // Clear on mediaStop/ttsStop\n\n  function getSessionTime(){\n    if(!_sessionStart) return 0;\n    return (Date.now() - _sessionStart) / 1000;\n  }\n\n### 4. Update stats periodically\nIn the timeupdate handler (throttled to ~4fps), update the display:\n  if(document.getElementById('statTimeRemaining')){\n    const rem = getTimeRemaining();\n    document.getElementById('statTimeRemaining').textContent = fmt(rem);\n    document.getElementById('statSessionTime').textContent = fmt(getSessionTime());\n  }\n\n### 5. Lifetime accumulator (optional)\nAdd b.totalReadingTime (seconds) to book object:\n  // In saveBookProgress, add elapsed session time\n  if(_sessionStart) b.totalReadingTime = (b.totalReadingTime || 0) + getSessionTime();\n\n## Constraints\n- Do not add heavy computation to the rAF loop — stats update at timeupdate rate (~4Hz).\n- fmt() already exists for time formatting.\n- Session timer resets on each play, not on book open.\n- Stats display is informational only — no new persistent state required\n  except the optional totalReadingTime.\n\n## Verification\n- Open options during playback: time remaining and session time shown.\n- Time remaining decreases as playback progresses.\n- Session time increases.\n- Run syntax check."
  },

  {
  num:"60", status:"backlog", type:"feat", model:"sonnet", effort:"med",
  title:"Jump-to-time input for audio mode",
  desc:"Most useful for very long audiobooks (10+ hours) where the seek bar is imprecise. A time input field lets users type an exact timestamp to jump to.",
  prompt:"# Feature: Jump-to-time input for audio mode in index.html\n\n## Context\nRead onSeekChange() and the #seekStrip HTML. The seek bar is a range input\nthat maps percentage to audio duration. For a 10-hour audiobook, each pixel\nof the seek bar represents ~2 minutes — fine scrubbing is impossible.\n\n## Implementation\n\n### UI — tappable time display\nMake the current time label (#tCur) tappable to open an inline time input:\n\n  function openTimeJump(){\n    if(ttsMode || !_audio.duration) return;\n    const cur = document.getElementById('tCur');\n    const input = document.createElement('input');\n    input.type = 'text';\n    input.className = 'time-jump-input';\n    input.value = fmt(_audio.currentTime);\n    input.placeholder = 'h:mm:ss';\n    cur.style.display = 'none';\n    cur.parentElement.insertBefore(input, cur);\n    input.focus();\n    input.select();\n\n    function commit(){\n      const secs = parseTimeInput(input.value);\n      if(secs !== null && secs >= 0 && secs <= _audio.duration){\n        _audio.currentTime = secs;\n        // Trigger sentence update\n        if(sentenceTimings.length){\n          const t = secs + syncOffset;\n          let best = curSent;\n          for(let i = sentenceTimings.length - 1; i >= 0; i--){\n            if(sentenceTimings[i] && t >= sentenceTimings[i].start){ best = i; break; }\n          }\n          if(best !== curSent){\n            curSent = best; curWord = 0;\n            updateHL(); updateProg();\n            scrollToSent(curSent, true);\n          }\n        }\n      }\n      input.remove();\n      cur.style.display = '';\n    }\n\n    input.addEventListener('blur', commit);\n    input.addEventListener('keydown', e => {\n      if(e.key === 'Enter') { e.preventDefault(); commit(); }\n      if(e.key === 'Escape') { input.remove(); cur.style.display = ''; }\n    });\n  }\n\n  function parseTimeInput(str){\n    const parts = str.trim().split(':').map(Number);\n    if(parts.some(isNaN)) return null;\n    if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];\n    if(parts.length === 2) return parts[0]*60 + parts[1];\n    if(parts.length === 1) return parts[0];\n    return null;\n  }\n\n### Wire the tap\nIn the seek strip HTML, add onclick to #tCur:\n  <span id=\"tCur\" class=\"seek-time\" onclick=\"openTimeJump()\">0:00</span>\n\nOr wire in init() to avoid changing HTML.\n\n### CSS\n  .time-jump-input {\n    width: 64px; background: var(--surface); color: var(--text);\n    border: 1px solid var(--accent); border-radius: 4px;\n    padding: 2px 6px; font: inherit; font-size: 12px;\n    text-align: center; outline: none;\n  }\n\n## Constraints\n- Only available in audio mode (not TTS).\n- Accept h:mm:ss, mm:ss, or plain seconds.\n- Clamp to [0, duration].\n- Do not change fmt() or the normal time display.\n- The sentence update uses reverse linear scan (not binary search)\n  for sparse sentenceTimings safety.\n\n## Verification\n- Tap time display: input appears with current time.\n- Type '1:30:00', press Enter: audio jumps to 1h30m, ebook scrolls to match.\n- Type invalid value: input closes, no change.\n- Press Escape: input closes, no change.\n- TTS mode: tap does nothing.\n- Run syntax check."
  },

  {
  num:"61", status:"backlog", type:"feat", model:"sonnet", effort:"med",
  title:"Service worker for offline app shell caching",
  desc:"Cache the app shell (index.html, fonts, icons) for instant second-visit loads and offline access. Requires a separate sw.js file — the one exception to the single-file constraint. navigator.serviceWorker.register() already exists in init().",
  prompt:"# Feature: Service worker for offline app shell caching in index.html\n\n## Context\nRead the SERVICE WORKER section near the end of the JS. navigator.serviceWorker\n.register() is already called in init(). The current sw.js (if it exists) may\nbe minimal or missing.\n\n## Implementation\n\n### 1. Create sw.js\nCreate a new file sw.js in the same directory as index.html:\n\n  const CACHE_NAME = 'folio-v1';\n  const SHELL_URLS = [\n    './',\n    './index.html',\n    'https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap',\n    'https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap',\n  ];\n\n  self.addEventListener('install', e => {\n    e.waitUntil(\n      caches.open(CACHE_NAME)\n        .then(cache => cache.addAll(SHELL_URLS))\n        .then(() => self.skipWaiting())\n    );\n  });\n\n  self.addEventListener('activate', e => {\n    e.waitUntil(\n      caches.keys().then(keys =>\n        Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))\n      ).then(() => self.clients.claim())\n    );\n  });\n\n  self.addEventListener('fetch', e => {\n    // Network-first for HTML (always get latest)\n    if(e.request.mode === 'navigate'){\n      e.respondWith(\n        fetch(e.request).catch(() => caches.match('./index.html'))\n      );\n      return;\n    }\n    // Cache-first for fonts and static assets\n    e.respondWith(\n      caches.match(e.request).then(cached => cached || fetch(e.request))\n    );\n  });\n\n### 2. Version-aware cache busting\nUse APP_VERSION in the cache name:\n  const CACHE_NAME = 'folio-' + '1.0.0';  // manually match APP_VERSION\n\nOr pass version from index.html to sw.js via the register URL:\n  navigator.serviceWorker.register('./sw.js?v=' + APP_VERSION);\n\nThe activate handler already deletes old caches by name.\n\n### 3. Update notification\nIn init(), after registering the SW, listen for updates:\n  navigator.serviceWorker.register('./sw.js').then(reg => {\n    reg.addEventListener('updatefound', () => {\n      const newWorker = reg.installing;\n      newWorker.addEventListener('statechange', () => {\n        if(newWorker.state === 'activated'){\n          showToast('App updated — reload for latest version', '', 5000);\n        }\n      });\n    });\n  });\n\n## Constraints\n- sw.js is the ONLY file outside index.html.\n- Network-first for HTML ensures updates are always fetched when online.\n- Cache-first for fonts and CDN assets (immutable URLs).\n- Do NOT cache audio files, ebook data, or blob URLs — those are handled\n  by IndexedDB and File System Access.\n- Do NOT cache JSZip CDN script — it's loaded on demand and may update.\n- skipWaiting + clients.claim for immediate activation.\n\n## Verification\n- First visit: app loads normally, assets cached.\n- Second visit: app loads instantly from cache.\n- Offline: app shell loads, library screen works.\n- Update sw.js cache version: old cache purged, update toast shown.\n- Run syntax check on index.html."
  },

  {
  num:"66", status:"backlog", type:"perf", model:"sonnet", effort:"med",
  title:"Cover + audio blob URLs leaked on PWA rescan",
  desc:"When pwaScanBookFolder() rescans a book folder it creates new blob URLs for cover and audio files without revoking the previous ones. Repeated rescans accumulate orphaned blob URLs that hold file data in memory.",
  prompt:"# Perf: Cover + audio blob URLs leaked on PWA rescan in index.html\n\n## Context\nRead pwaOpenBook() in full. When a book is opened in PWA mode, it calls\nURL.createObjectURL(audioFile) for audio and URL.createObjectURL(imgFile)\nfor cover. These are stored in b.audioUrl and b.coverUrl respectively.\nIf the book is closed and reopened (or the library is rescanned), new blob\nURLs are created without revoking the old ones.\n\n## Fix\n\n### Audio URL\nIn pwaOpenBook(), before creating a new audio blob URL:\n  if(b.audioUrl) URL.revokeObjectURL(b.audioUrl);\n  b.audioUrl = resolvedAudioUrl = URL.createObjectURL(audioFile);\n\nThis line is already present in the code — verify it is there. If missing, add it.\n\n### Cover URL\nIn pwaOpenBook(), before creating a new cover blob URL:\n  if(b.coverUrl) URL.revokeObjectURL(b.coverUrl);\n  b.coverUrl = URL.createObjectURL(imgFile);\n\nThis guard is missing — add it.\n\n### goLib() cleanup\nIn goLib(), when leaving the player screen, revoke the current book's blob URLs\nto free memory immediately rather than waiting for the next open:\n  if(curBookIdx >= 0) {\n    const b = library[curBookIdx];\n    if(b && b.audioUrl) { URL.revokeObjectURL(b.audioUrl); b.audioUrl = null; }\n    // Do NOT revoke coverUrl here — it is displayed on library cards\n  }\nAdd this block at the start of goLib(), before curBookIdx = -1.\n\n## Constraints\n- Do NOT revoke coverUrl in goLib() — library cards display cover images.\n- Only revoke URLs that were created via URL.createObjectURL in PWA mode.\n  Browser-mode audioUrl is also a blob URL — the existing revoke-before-assign\n  in pwaOpenBook already handles that path (audioUrl revoke is inside b.audioHandle block).\n- Do not change configurePlayerForMode — it already revokes _audio.src blob if needed.\n\n## Verification\n- Open a book, go back, reopen: no errors in console about revoked object URLs.\n- Run syntax check."
  },

  {
  num:"67", status:"backlog", type:"perf", model:"sonnet", effort:"med",
  title:"Timing worker blob URL never revoked",
  desc:"The timing worker is created via URL.createObjectURL() on a Blob but the blob URL is never revoked after the worker is started. Each book open leaks a blob URL that persists for the lifetime of the page.",
  prompt:"# Perf: Timing worker blob URL never revoked in index.html\n\n## Context\nRead getTimingWorker() in full. It creates a Blob Worker via:\n  URL.createObjectURL(blob) → stored in _timingWorkerBlobUrl\n  new Worker(_timingWorkerBlobUrl) → stored in _timingWorker\nThe blob URL is created once and never revoked. Each time the worker is\nrecreated (new book open) a new blob URL leaks.\n\n## Fix\nIn getTimingWorker(), immediately after new Worker(_timingWorkerBlobUrl):\n  URL.revokeObjectURL(_timingWorkerBlobUrl);\n  // The Worker already has a reference to the blob internally; revoking the URL\n  // is safe at this point and frees the string reference from the JS heap.\n\nRevoke immediately after construction — the Worker doesn't need the URL to stay\nalive once it has been instantiated.\n\n## Constraints\n- Do not change _timingWorkerBlobUrl = null — it is used as a guard to check\n  whether the worker Blob has already been created.\n  After revoking, set _timingWorkerBlobUrl = 'revoked' (truthy sentinel) OR\n  keep it set to the URL string (harmless after revoke) — either is fine.\n  The important thing is the revoke call is placed right after new Worker().\n- Do not change worker message handling, watchdog, or error paths.\n- One revoke call only — do not revoke on every buildSentenceTimings call.\n\n## Verification\n- Open several books sequentially. No growing blob: URLs in DevTools → Memory.\n- Run syntax check."
  },

  {
  num:"72", status:"backlog", type:"feat", model:"sonnet", effort:"med",
  title:"Settings accessible from library screen",
  desc:"Options menu is only accessible from inside the reader. Should be reachable from the library view without opening a book.",
  prompt:"# Feature: Settings accessible from library screen in index.html\n\n## Context\nRead toggleOpts() and the #optPanel HTML. The options panel is currently\nonly opened from inside the player screen via the opt button (#optBtn).\nRead the library screen HTML (libGrid, lib-header).\n\n## Implementation\n\n### Approach: expose a subset of settings from library\nRather than showing the full options panel (which has player-specific controls\nlike Sync offset, Resync, Stop), add a simple library-level settings button\nthat opens the options panel's Display tab only.\n\n### HTML changes\n1. In the library header (.lib-header), add a settings icon button:\n   <button id=\"libSettingsBtn\" class=\"ic-btn\" title=\"Display settings\"\n     onclick=\"toggleLibSettings()\">⚙️</button>\n\n2. The #optPanel itself is in the player screen, but can be temporarily\n   re-parented or cloned. A simpler approach: add a small CSS-positioned\n   settings popover scoped to the library screen that shows font/theme/size\n   controls only (duplicating just those controls).\n\n   PREFERRED simpler approach: move #optPanel out of #player and into\n   <body> at the top level, then show/hide it independently of which screen\n   is active. Filter which tabs are visible based on current screen.\n\n### JS changes\n  function toggleLibSettings() {\n    // Show optPanel anchored to library header\n    const panel = document.getElementById('optPanel');\n    // Hide Playback and Advanced tabs when on library screen\n    document.getElementById('opTabBtn-playback')?.style.setProperty('display','none');\n    document.getElementById('opTabBtn-advanced')?.style.setProperty('display','none');\n    // Activate Display tab\n    switchOptTab('display', document.getElementById('opTabBtn-display'));\n    toggleOpts();\n  }\n\nRestore all tabs when reopening from inside the player.\n\n## Constraints\n- Do not duplicate settings HTML — reuse the existing #optPanel.\n- Moving #optPanel out of #player may require CSS z-index adjustments.\n- If moving is complex: create a minimal second display-only panel for\n  the library screen with only font/theme/size controls. Keep the full\n  panel in the player.\n- Do not break the existing player settings flow.\n\n## Verification\n- Library screen: settings button visible, opens Display options.\n- Player screen: all three tabs available as before.\n- Theme/font/size changes from library are reflected immediately.\n- Run syntax check."

  desc:"Relinking an audiobook requires re-uploading. Should remember the filename/path so relinking is quicker — especially for PWA mode where file handles are available.",
  prompt:"# Feature: Faster audiobook relinking (remember filepath) in index.html\n\n## Context\nRead showRelink() and rlLoad() in full. When a browser-mode blob URL expires\n(page reload), the user must re-select the audio file from scratch. The filename\n(b.audioName) is already saved. In PWA mode, file handles are persistent and\nthis issue doesn't apply.\n\n## Fix for browser mode\nStore the audio file itself in a module-level variable when first loaded,\nso relinking only requires confirmation rather than re-picking the file.\n\nSince browser storage can't hold File objects across sessions, the best\napproach is: remember the last-used File objects in a module-level Map\nduring the current session:\n  const _sessionFiles = new Map(); // bookId → { audio: File | null }\n\nIn addBook() (after reading the audio File from upData.audio), store it:\n  _sessionFiles.set(book.id, { audio: upData.audio });\n\nIn rlLoad(), after successfully linking the audio:\n  _sessionFiles.set(b.id, { audio: f });\n\nIn showRelink(), check if a session File is cached for this book:\n  const cached = _sessionFiles.get(library[i]?.id);\n  if(cached?.audio) {\n    // Show a \"Reuse [filename]\" button in addition to the file picker\n    // so the user can re-link with one tap\n  }\n\nAdd a \"Reuse [filename]\" button to the relink overlay HTML (conditionally\nshown from showRelink() when a cached file exists):\n  <button id=\"relinkReuseBtn\" style=\"display:none\"\n    onclick=\"rlReuseSession()\">Reuse [filename]</button>\n\n  function rlReuseSession() {\n    const cached = _sessionFiles.get(library[curBookIdx]?.id);\n    if(cached?.audio) rlLoad(cached.audio);\n  }\n\n## Constraints\n- Session cache is memory-only — not persisted to localStorage/IDB.\n- Works within a single page session only.\n- In PWA mode, showRelink() is never called (handles are persistent) — no change needed.\n- Do not change the file picker path — it must still work when no cached file exists.\n\n## Verification\n- Add a book with audio. Reload page (blob URL expires). Tap book → relink overlay.\n  If session is still alive: \"Reuse\" button shown, one tap re-links.\n- Fresh session: no \"Reuse\" button, file picker works normally.\n- Run syntax check."

  title:"Multi-select books in library for bulk delete",
  desc:"There is no way to select multiple books at once in the library — deleting several books requires opening each one individually and removing it. Should support a selection mode (long-press or edit button) with a bulk delete action.",
  prompt:"# Feature: Multi-select books for bulk delete in index.html\n\n## Context\nRead renderLib() and deleteBook() in full. Each book card has an individual\ndelete action with inline confirmation. There is no batch selection mode.\n\n## Implementation\n\n### State\n  let _libSelectMode = false;\n  const _libSelected = new Set(); // indices of selected books\n\n### Toggle selection mode\nAdd to the library header:\n  <button id=\"libSelectBtn\" class=\"ic-btn\" title=\"Select books\"\n    onclick=\"toggleLibSelectMode()\">☑</button>\n\n  function toggleLibSelectMode() {\n    _libSelectMode = !_libSelectMode;\n    _libSelected.clear();\n    document.getElementById('libSelectBtn').classList.toggle('active', _libSelectMode);\n    document.getElementById('libBulkDeleteBtn').style.display = _libSelectMode ? '' : 'none';\n    renderLib();\n  }\n\n### Select cards\nIn renderLib(), if _libSelectMode: add a checkbox overlay to each card:\n  if(_libSelectMode) {\n    const cb = document.createElement('div');\n    cb.className = 'lib-checkbox' + (_libSelected.has(i) ? ' checked' : '');\n    cb.onclick = (e) => { e.stopPropagation(); toggleLibSelect(i); };\n    card.appendChild(cb);\n    if(_libSelected.has(i)) card.classList.add('lib-selected');\n  }\n\nAlso, in selection mode, card click selects rather than opens:\n  card.addEventListener('click', (e) => {\n    if(e.target.closest('.book-card-actions')) return;\n    if(_libSelectMode) { toggleLibSelect(i); return; }\n    openBook(i);\n  });\n\n  function toggleLibSelect(i) {\n    if(_libSelected.has(i)) _libSelected.delete(i); else _libSelected.add(i);\n    renderLib();\n  }\n\n### Bulk delete button\nAdd a \"Delete selected\" button near the lib header (hidden by default):\n  <button id=\"libBulkDeleteBtn\" class=\"btn btn-danger\" style=\"display:none\"\n    onclick=\"bulkDeleteSelected()\">Delete selected</button>\n\n  function bulkDeleteSelected() {\n    if(_libSelected.size === 0) return;\n    const indices = [..._libSelected].sort((a,b)=>b-a); // descending\n    indices.forEach(i => {\n      const b = library[i];\n      if(b.audioUrl) URL.revokeObjectURL(b.audioUrl);\n      _deleteBlobsFor(b.id);\n      library.splice(i, 1);\n    });\n    if(!IS_PWA) saveLibrary();\n    else {\n      const all = getPwaProgress();\n      indices.forEach(i => delete all[library[i]?.id]);\n      localStorage.setItem(PWA_PROG_KEY, JSON.stringify(all));\n    }\n    toggleLibSelectMode(); // exits select mode and re-renders\n    showToast(indices.length + ' book(s) deleted');\n  }\n\n### CSS\n  .lib-checkbox { position:absolute; top:8px; left:8px; width:20px; height:20px;\n    border:2px solid var(--border); border-radius:4px; background:var(--surface2);\n    cursor:pointer; z-index:2; }\n  .lib-checkbox.checked { background:var(--accent); border-color:var(--accent); }\n  .lib-checkbox.checked::after { content:'✓'; color:#fff; font-size:13px;\n    display:flex; align-items:center; justify-content:center; height:100%; }\n  .lib-selected { border-color:var(--accent) !important; }\n\n## Constraints\n- Normal (non-select) mode: no UI change on cards.\n- bulkDeleteSelected() must delete in descending index order to avoid\n  index shifting during splice.\n- Do not remove the individual deleteBook() inline confirm.\n\n## Verification\n- Tap select button: checkboxes appear on cards.\n- Select 3 cards, tap Delete: confirmation? (add if desired) → all 3 removed.\n- Exit select mode: cards return to normal.\n- Run syntax check."

  desc:"There is no way to find a word or phrase in the current ebook text — a significant gap for non-fiction and reference books where users need to locate specific passages.",
  prompt:"# Feature: Search within book in index.html\n\n## Context\nRead sentences[] structure: each sentence has a .text string. Read updateHL()\nand scrollToSent(). The player screen top bar has icon buttons.\n\n## Implementation\n\n### State\n  let _searchQuery = '';\n  let _searchResults = []; // sentence indices matching query\n  let _searchResultIdx = 0; // current match index\n\n### UI\nAdd a search toggle button to the top bar:\n  <button id=\"searchBtn\" class=\"ic-btn\" title=\"Search\" onclick=\"toggleSearch()\">🔍</button>\n\nAdd a search bar below the top bar (hidden by default):\n  <div id=\"searchBar\" style=\"display:none\" class=\"search-bar\">\n    <input id=\"searchInput\" type=\"search\" placeholder=\"Search…\"\n      oninput=\"onSearchInput(this.value)\"\n      onkeydown=\"onSearchKey(event)\" />\n    <span id=\"searchCount\" class=\"search-count\"></span>\n    <button onclick=\"searchNav(-1)\">↑</button>\n    <button onclick=\"searchNav(1)\">↓</button>\n    <button onclick=\"closeSearch()\">✕</button>\n  </div>\n\n### JS\n  function toggleSearch() {\n    const bar = document.getElementById('searchBar');\n    if(bar.style.display === 'none') {\n      bar.style.display = '';\n      document.getElementById('searchInput').focus();\n    } else {\n      closeSearch();\n    }\n  }\n\n  function closeSearch() {\n    _searchQuery = '';\n    _searchResults = [];\n    document.getElementById('searchBar').style.display = 'none';\n    document.querySelectorAll('.sent.search-match').forEach(el =>\n      el.classList.remove('search-match', 'search-active'));\n  }\n\n  function onSearchInput(q) {\n    _searchQuery = q.trim().toLowerCase();\n    _searchResults = [];\n    document.querySelectorAll('.sent.search-match').forEach(el =>\n      el.classList.remove('search-match', 'search-active'));\n    if(!_searchQuery) { document.getElementById('searchCount').textContent=''; return; }\n    sentences.forEach((s, i) => {\n      if(s.text.toLowerCase().includes(_searchQuery)) {\n        _searchResults.push(i);\n        s.el.classList.add('search-match');\n      }\n    });\n    _searchResultIdx = 0;\n    document.getElementById('searchCount').textContent =\n      _searchResults.length ? '1/' + _searchResults.length : 'No results';\n    if(_searchResults.length) _jumpToSearchResult(0);\n  }\n\n  function _jumpToSearchResult(idx) {\n    document.querySelectorAll('.sent.search-active').forEach(el =>\n      el.classList.remove('search-active'));\n    const si = _searchResults[idx];\n    if(si == null) return;\n    sentences[si].el.classList.add('search-active');\n    scrollToSent(si, true);\n  }\n\n  function searchNav(dir) {\n    if(!_searchResults.length) return;\n    _searchResultIdx = (_searchResultIdx + dir + _searchResults.length) % _searchResults.length;\n    document.getElementById('searchCount').textContent =\n      (_searchResultIdx + 1) + '/' + _searchResults.length;\n    _jumpToSearchResult(_searchResultIdx);\n  }\n\n  function onSearchKey(e) {\n    if(e.key === 'Enter') searchNav(1);\n    if(e.key === 'Escape') closeSearch();\n  }\n\n### CSS\n  .search-bar {\n    background: var(--surface2); border-bottom: 1px solid var(--border);\n    padding: 8px 12px; display: flex; align-items: center; gap: 8px;\n  }\n  #searchInput {\n    flex: 1; background: var(--surface); border: 1px solid var(--border);\n    color: var(--text); border-radius: 6px; padding: 6px 10px;\n    font: inherit; font-size: 14px; outline: none;\n  }\n  .search-count { font-size: 12px; color: var(--text2); min-width: 48px; text-align: right; }\n  .sent.search-match { background: rgba(210,153,34,.15); }\n  .sent.search-active { background: rgba(210,153,34,.35) !important; outline: 2px solid var(--yellow); }\n\n## Constraints\n- Search is purely within sentences[] (already in memory) — no backend.\n- Close search (closeSearch()) when goLib() is called.\n- Do not interfere with normal sentence highlighting (.sent-active).\n- Search bar hidden when no book is open.\n\n## Verification\n- Search \"the\": all matching sentences highlighted, first one in view.\n- ↑ / ↓ navigate between matches.\n- Press Escape: search bar closes, highlights removed.\n- Run syntax check."

  title:"Bookmarks and annotations on sentences",
  desc:"Foundational feature for serious readers. Sentence indices stored on the book object as b.bookmarks[], surfaced in the TOC sidebar. Pairs with search (#52) for navigating back to important passages.",
  prompt:"# Feature: Bookmarks and annotations in index.html\n\n## Context\nRead the book object structure in folio-context.md. Read buildToc() and\nthe TOC sidebar HTML. Read saveBookProgress() and savePwaProgress().\n\n## Data model\nAdd to book object:\n  b.bookmarks = [];  // Array of { sentIdx: number, note: string, created: number }\n\nBookmarks are sentence-level — each bookmark points to a sentence index\nand optionally contains a short note.\n\n## Implementation\n\n### 1. Add bookmark action\n  function addBookmark(sentIdx, note){\n    if(curBookIdx < 0) return;\n    const b = library[curBookIdx];\n    if(!b.bookmarks) b.bookmarks = [];\n    // Prevent duplicate on same sentence\n    if(b.bookmarks.some(bm => bm.sentIdx === sentIdx)) {\n      showToast('Already bookmarked', '', 1500); return;\n    }\n    b.bookmarks.push({ sentIdx, note: note || '', created: Date.now() });\n    b.bookmarks.sort((a, c) => a.sentIdx - c.sentIdx);\n    saveBookProgressDebounced();\n    showToast('Bookmarked', '', 1500);\n    if(tocOpen) buildToc(); // refresh TOC to show new bookmark\n  }\n\n  function removeBookmark(sentIdx){\n    if(curBookIdx < 0) return;\n    const b = library[curBookIdx];\n    if(!b.bookmarks) return;\n    b.bookmarks = b.bookmarks.filter(bm => bm.sentIdx !== sentIdx);\n    saveBookProgressDebounced();\n    if(tocOpen) buildToc();\n  }\n\n### 2. Quick-add from current position\nAdd a bookmark button to the top bar (or options panel):\n  <button class=\"ic-btn\" id=\"bookmarkBtn\" title=\"Bookmark\"\n    onclick=\"addBookmark(curSent)\">🔖</button>\n\nAlternatively, wire to the long-press gesture from prompt #60 if implemented.\n\n### 3. Show bookmarks in TOC sidebar\nIn buildToc(), after appending chapter entries, add a bookmarks section:\n\n  const b = library[curBookIdx];\n  if(b.bookmarks && b.bookmarks.length){\n    const divider = document.createElement('div');\n    divider.className = 'toc-divider';\n    divider.textContent = 'Bookmarks';\n    tocList.appendChild(divider);\n    b.bookmarks.forEach(bm => {\n      const btn = document.createElement('button');\n      btn.className = 'toc-item toc-bookmark';\n      const preview = sentences[bm.sentIdx]?.text?.slice(0, 50) || 'Sentence ' + bm.sentIdx;\n      btn.textContent = bm.note || preview;\n      btn.addEventListener('click', () => {\n        curSent = bm.sentIdx; curWord = 0;\n        updateHL(); updateProg();\n        scrollToSent(curSent, true);\n        if(ttsMode && mediaState === 'playing'){ ttsStop(); ttsPlay(); }\n        else if(!ttsMode && sentenceTimings.length) seekAudioToSentence();\n      });\n      // Long-press to delete\n      let timer;\n      btn.addEventListener('pointerdown', () => { timer = setTimeout(() => {\n        removeBookmark(bm.sentIdx);\n        showToast('Bookmark removed');\n      }, 800); });\n      btn.addEventListener('pointerup', () => clearTimeout(timer));\n      btn.addEventListener('pointercancel', () => clearTimeout(timer));\n      tocList.appendChild(btn);\n    });\n  }\n\n### 4. Visual indicator on bookmarked sentences\nIn updateHL() or loadEbook(), add a subtle bookmark marker to bookmarked\nsentences:\n  .sent.bookmarked::before {\n    content: '🔖'; position: absolute; left: -20px; font-size: 12px;\n    opacity: 0.5;\n  }\n\nApply the class in loadEbook's onDone:\n  if(b.bookmarks){\n    b.bookmarks.forEach(bm => {\n      if(sentences[bm.sentIdx]) sentences[bm.sentIdx].el.classList.add('bookmarked');\n    });\n  }\n\n### CSS\n  .toc-divider {\n    padding: 8px 16px 4px; font-size: 11px; color: var(--text3);\n    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;\n  }\n  .toc-bookmark { color: var(--accent); font-style: italic; }\n\n## Persistence\n- b.bookmarks is saved via saveBookProgress() (both browser and PWA modes).\n- In browser mode: saved to localStorage via saveLibrary().\n- In PWA mode: saved to PWA_PROG_KEY via savePwaProgress().\n- Bookmarks survive book close and reopen.\n- Bookmarks do NOT survive ebook replacement (sentence indices would be wrong).\n  In biReassign() ebook branch, clear b.bookmarks = [] with a toast warning.\n\n## Constraints\n- bookmarks[] is sorted by sentIdx (maintained by addBookmark).\n- Maximum ~100 bookmarks per book (no hard limit, but UI should stay usable).\n- Do not store full sentence text in bookmarks — use sentIdx to look up\n  the live text from sentences[].\n- Do not add annotation editing UI in this prompt — just the note field\n  for future use. Notes are empty strings by default.\n\n## Verification\n- Tap bookmark button: toast confirms, bookmark appears in TOC sidebar.\n- Tap bookmark in TOC: scrolls to bookmarked sentence.\n- Long-press bookmark in TOC: removes it.\n- Reopen book: bookmarks preserved.\n- Replace ebook: bookmarks cleared with warning.\n- Run syntax check."

  {
  num:"45", status:"backlog", type:"feat", model:"sonnet", effort:"high",
  title:"Auto-generate TOC from transcript chapter markers or silence gaps",
  desc:"Books without headings have a dead TOC button. Auto-generating entries from Whisper segment markers, silence gaps in audio, or evenly-spaced intervals makes the TOC sidebar and chapter skip buttons useful for a wider range of audiobooks.",
  prompt:"# Feature: TOC from transcript in index.html\n\n## Context\nRead buildToc(), tocEntries[], and loadTranscriptData() in full.\ntocEntries[] is populated from headings found in the ebook by loadEbook().\nIf the ebook has no headings, tocEntries stays empty and the TOC button\nis effectively dead.\n\nWhisper JSON segments often contain implicit chapter markers (long silence\ngaps between segments), and some Whisper outputs include chapter annotations.\n\n## Implementation\n\n### 1. Detect missing TOC after ebook load\nIn loadEbook()'s onDone, after buildToc(), check if tocEntries is empty:\n  if(!tocEntries.length && sentenceTimings.length){\n    _buildTocFromTimings();\n    buildToc(); // rebuild with generated entries\n  }\n\n### 2. Build TOC from timing gaps\n  function _buildTocFromTimings(){\n    if(!sentenceTimings.length || !sentences.length) return;\n    tocEntries = [];\n    // Always add a Chapter 1 at the start\n    tocEntries.push({ text: 'Chapter 1', level: 1, sentIdx: 0 });\n    let chapterNum = 2;\n    // Scan for silence gaps > 3 seconds between sentences\n    for(let i = 1; i < sentenceTimings.length; i++){\n      const prev = sentenceTimings[i - 1];\n      const cur = sentenceTimings[i];\n      if(!prev || !cur) continue;\n      const gap = cur.start - prev.end;\n      if(gap > 3.0){ // 3-second silence gap = chapter break\n        tocEntries.push({ text: 'Chapter ' + chapterNum, level: 1, sentIdx: i });\n        chapterNum++;\n      }\n    }\n    // Fallback: if fewer than 3 chapters detected, use even spacing\n    if(tocEntries.length < 3){\n      tocEntries = [];\n      const interval = Math.max(1, Math.floor(sentences.length / 10));\n      for(let i = 0; i < sentences.length; i += interval){\n        tocEntries.push({\n          text: 'Section ' + (tocEntries.length + 1),\n          level: 1, sentIdx: i\n        });\n      }\n    }\n  }\n\n### 3. Mark generated TOC entries\nAdd a generated: true flag to distinguish from ebook headings:\n  tocEntries.push({ text: '...', level: 1, sentIdx: i, generated: true });\n\nIn buildToc(), style generated entries differently:\n  if(entry.generated) btn.classList.add('toc-generated');\n\nCSS:\n  .toc-generated { font-style: italic; color: var(--text2); }\n\n## Constraints\n- Only generate TOC if tocEntries is empty after ebook parsing.\n- If the ebook has real headings, never auto-generate.\n- Generated entries use generic names ('Chapter N') — do not try to\n  extract text from the first sentence (too fragile).\n- The 3-second gap threshold should work for most audiobooks.\n- Store generated tocEntries in memory only — not persisted. They are\n  rebuilt on each book open.\n- Do not modify the ebook parser or extractFromDom().\n\n## Verification\n- Book with headings: TOC shows ebook headings (unchanged).\n- Audiobook with no headings but Whisper transcript: auto-generated\n  chapters appear in TOC based on silence gaps.\n- Book with no headings and no transcript: TOC stays empty.\n- Run syntax check."

  prompt:"# Feature: Manual library rescan button in PWA mode in index.html\n\n## Context\nRead folio-context.md: PWA FILE SYSTEM section. pwaScanAndRender() does\nthe full scan. The library screen HTML has a .lib-header div. IS_PWA and\nCAN_FS are constants. pwaRootHandle is the currently active folder handle.\n\n## Task\nAdd a visible \"Rescan\" button to the library header in PWA mode.\n\n### HTML\nFind the .lib-header div in the library screen. Inside it, add a rescan\nbutton that is only visible in PWA mode. Since we can't use server-side\nrendering, hide it by default and show it with JS after init:\n  <button id=\"pwaRescanBtn\" class=\"ic-btn\" style=\"display:none\"\n    title=\"Rescan library\" onclick=\"pwaRescan()\">🔄</button>\n\nPlace it alongside the existing lib-header icon buttons (settings / info).\n\n### JS\nAdd:\n  function pwaRescan() {\n    if(!IS_PWA || !pwaRootHandle) return;\n    showToast('Scanning library…', '', 1500);\n    pwaScanAndRender();\n  }\n\nIn init(), after routing is resolved and if IS_PWA && CAN_FS:\n  const rescanBtn = document.getElementById('pwaRescanBtn');\n  if(rescanBtn && IS_PWA && CAN_FS) rescanBtn.style.display = '';\n\n### Behaviour rules\n- Button is only ever visible in PWA mode (IS_PWA && CAN_FS).\n- Browser mode: button remains display:none permanently.\n- If pwaRootHandle is null (first-run, no folder yet): pwaRescan() is a\n  no-op (the guard handles this).\n- pwaScanAndRender() already shows the scanning indicator — no extra UI needed.\n- Do not change pwaScanAndRender() itself.\n\n## Verification\n- PWA mode, library screen: rescan button visible in header.\n- Tap rescan: library re-scans and re-renders from disk.\n- Browser mode: button not visible.\n- Run syntax check."

  prompt:"# Feature: Manage files from library screen in index.html\n\n## Context\nRead openBookInfoModal() in full. The book info modal lets users view and\nchange files for the currently-open book. It's only accessible from inside\nthe player screen. Library cards have only rename and delete actions.\n\n## Implementation\nAdd an \"Info\" or \"Files\" action button to each library card that opens the\nbook info modal directly from the library screen.\n\n### HTML — per-card action\nIn renderLib(), add a files action button alongside rename/delete:\n  <button class=\"card-action-btn\" title=\"Files\" onclick=\"openBookInfoFromLib(${i},event)\">📋</button>\n\n### JS\n  function openBookInfoFromLib(i, e) {\n    e.stopPropagation();\n    // Temporarily set curBookIdx so openBookInfoModal() works\n    curBookIdx = i;\n    openBookInfoModal();\n    // On modal close, reset curBookIdx if we're still on library screen\n    // (_prevFocus and _closeModalRestore handle focus)\n  }\n\nThe modal's save actions (biReassign) use curBookIdx, so setting it before\nopening is sufficient. After the modal closes:\n  - If the user changed the ebook: loadEbook would be called, but we're on\n    the library screen. Guard: in biReassign(), if the player is not visible,\n    don't call loadEbook() — just save the data and update the library card.\n\nAdd the guard in biReassign() ebook branch:\n  const playerVisible = document.getElementById('player')?.style.display !== 'none';\n  if(playerVisible) {\n    loadEbook(b, () => { curSent=0; curWord=0; updateHL(); updateProg(); });\n  }\n  openBookInfoModal(); // refresh modal\n\nSimilarly guard the ebook reassign render in the transcript branch.\n\n## Constraints\n- Do not move the book info modal out of the player screen HTML.\n- curBookIdx must be restored to -1 if the modal is closed without opening\n  a book. Add to _closeModalRestore() (or use the existing flow since\n  the modal closers call _closeModalRestore already).\n- In browser mode, the modal shows \"click to change\" affordances — these\n  should work from library too.\n- In PWA mode, the modal shows \"from folder\" labels — also works from library.\n\n## Verification\n- Library screen: each card has Files button.\n- Tap Files on a card: book info modal opens.\n- Change cover image from library: cover updates on card.\n- Run syntax check."

  prompt:"# Feature: Per-book display settings in index.html\n\n## Context\nRead saveDisplayPrefs() and loadDisplayPrefs(). Display preferences are global\n(one set for all books). Read the book object structure in folio-context.md —\nit has wpm and sentPauseMs per-book already. Font, size, lineHeight, and theme\nare currently global only.\n\n## Implementation\n\n### Approach: per-book typography overrides\nRather than full per-book settings (complex), add per-book overrides for\nfont size and line height — the two most common adjustments for language\ndifferences.\n\n### State on book object\nAdd optional fields to the book object:\n  b.fontSize    // px integer override, null = use global\n  b.lineHeight  // float override, null = use global\n  b.fontKey     // string override, null = use global\n\n### Apply on book open\nIn openBook() and pwaOpenBook(), after restoring wpm/syncOffset, apply\nper-book overrides if present:\n  if(b.fontSize) {\n    document.documentElement.style.setProperty('--font-size', b.fontSize + 'px');\n  } else {\n    document.documentElement.style.setProperty('--font-size', _fontSize + 'px');\n  }\n  // Same for lineHeight and fontKey\n\n### Restore on close\nIn goLib(), restore global preferences:\n  document.documentElement.style.setProperty('--font-size', _fontSize + 'px');\n  document.documentElement.style.setProperty('--line-height', String(_lineHeight));\n  // Restore font if per-book was set\n\n### UI — per-book toggle in Options panel\nIn the Display tab, add a \"Save for this book\" button near font size and\nline height controls:\n  <button onclick=\"saveBookDisplayPrefs()\">Save for this book</button>\n\n  function saveBookDisplayPrefs() {\n    if(curBookIdx < 0) return;\n    const b = library[curBookIdx];\n    b.fontSize = _fontSize;\n    b.lineHeight = _lineHeight;\n    saveBookProgress();\n    showToast('Typography saved for this book', 'success');\n  }\n\n  function clearBookDisplayPrefs() {\n    if(curBookIdx < 0) return;\n    const b = library[curBookIdx];\n    b.fontSize = null; b.lineHeight = null; b.fontKey = null;\n    saveBookProgress();\n    showToast('Using global typography', '', 2000);\n  }\n\n## Constraints\n- Global settings (setFS, setLH, etc.) continue to update _fontSize/_lineHeight\n  globals as before — per-book overrides only apply when a book is open.\n- In goLib(), always restore global CSS variables from _fontSize/_lineHeight.\n- Per-book settings are saved via saveBookProgress() (routes correctly for both modes).\n- Do not add per-book settings for theme, alignment, or max-width in this prompt\n  — only font size and line height to keep scope manageable.\n\n## Verification\n- Set font size 22px, tap \"Save for this book\". Reopen book: 22px applied.\n- Open a different book: global font size restored.\n- \"Clear for this book\": global size applies to book again.\n- Run syntax check."

  prompt:"# Fix: Sizing and padding issues in PWA player screen in index.html\n\n## Context\nRead folio-context.md CSS SECTIONS (Seek strip, Top bar, Reader body, Media queries).\nThe seek strip and TTS bar use env(safe-area-inset-bottom) in the mobile media query.\nThe reading area is #eScroll > #eContent inside .reader-body.\nIS_PWA mode may need additional top padding if the status bar overlaps .top-bar.\n\n## Task\nThis is a targeted CSS-only fix (no JS changes).\n\n1. Read the CSS for .top-bar, #seekStrip, .tts-bar, .reader-body, #eScroll in full.\n2. Read the @media(max-width:639px) block in full.\n3. Identify and fix:\n   a. Any missing env(safe-area-inset-bottom) on #seekStrip and .tts-bar in mobile query.\n   b. Any missing env(safe-area-inset-top) or status-bar padding on .top-bar.\n   c. Any hardcoded pixel values that should use env() for notched/gesture-nav devices.\n   d. Any overflow or clipping on .reader-body / #eScroll that cuts off content near the\n      bottom seek strip.\n\n4. Add a CSS block scoped to a .is-pwa class on <body> (or #player) if PWA-specific\n   overrides are needed — do not change base styles that affect browser mode.\n   The IS_PWA JS constant adds class 'is-pwa' to document.body if not already done;\n   if that class is not being set, add: if(IS_PWA) document.body.classList.add('is-pwa');\n   near the IS_PWA constant definition in JS.\n\n## Constraints\n- CSS changes only unless adding the is-pwa body class requires one JS line.\n- Do not change layout for desktop (min-width:640px) breakpoint.\n- Do not change any colour, font, or non-spacing property.\n\n## Verification\n- Player screen fills viewport correctly on a 390px-wide Android device.\n- No content clipped under status bar at top.\n- Seek strip not obscured by gesture nav bar at bottom.\n- Run syntax check (checks JS only — visually verify CSS in browser).\n"

  prompt:"# Fix: Book rename uses window.prompt() in index.html\n\n## Context\nRead renameBook() in full before editing. It currently calls\nwindow.prompt('New title:', library[i].title) which is blocked in some\ninstalled PWA environments and is visually inconsistent with the rest of\nthe UI. Replace with an inline edit field on the book card itself.\n\n## Implementation\n\n### Remove prompt()\nIn renameBook(i, e), remove the window.prompt() call entirely.\n\n### Inline edit\nInstead, find the title element inside the clicked card and replace it\nwith an input temporarily:\n  1. Find the .book-title div inside e.target.closest('.book-card').\n  2. Store its current text, replace it with:\n       <input class=\"book-title-input\" value=\"[current title]\" />\n  3. Focus and select-all on the input immediately.\n  4. On 'blur' and on Enter keydown: read the value, trim it.\n     If non-empty and changed: update library[i].title, save, call\n     renderLib() (which rebuilds the card, removing the input).\n     If empty or unchanged: just call renderLib() to restore.\n  5. On Escape keydown: call renderLib() without saving.\n\n### CSS\nAdd to stylesheet:\n  .book-title-input {\n    font: inherit; font-size: 13px; font-weight: 600;\n    background: var(--surface2); color: var(--text);\n    border: 1px solid var(--accent); border-radius: 4px;\n    padding: 2px 6px; width: 100%; box-sizing: border-box;\n    outline: none;\n  }\n\n### Save logic (unchanged)\nAfter confirming a new title, the same save logic applies:\n  if(!IS_PWA) saveLibrary();\n  else { /* existing PWA_PROG_KEY update */ }\n\n## Constraints\n- Do not use prompt(), confirm(), or alert() anywhere.\n- The input must not break the card grid layout — use width:100% inside\n  the existing .book-info container.\n- renderLib() already rebuilds the entire grid, so the input will be\n  replaced naturally when it is called.\n\n## Verification\n- Click rename on a card: title becomes an editable input.\n- Type new name, press Enter: card shows new name, library saved.\n- Press Escape: card restores original name, nothing saved.\n- Click away (blur): same as Enter — saves if changed.\n- Run syntax check."
