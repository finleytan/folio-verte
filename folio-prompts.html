  title:"Library sort order is fixed — no user control",
  desc:"Books are sorted alphabetically in PWA mode and by insertion order in browser mode with no way to reorder — users with large libraries have no way to surface recently-read or prioritised books.",
  prompt:"# Feature: Library sort order control in index.html\n\n## Context\nRead renderLib() and pwaScanAndRender(). In PWA mode, books are sorted\nalphabetically by title after scan. In browser mode, books are in insertion\norder (library[] array order). There is no UI to change sort order.\n\n## Implementation\n\n### State\nAdd a module-level variable:\n  let _libSortOrder = 'alpha'; // 'alpha' | 'recent' | 'progress'\nPersist to localStorage: key 'folio_lib_sort_v1'. Load in init().\n\n### Sort function\n  function _sortedLibrary() {\n    const idx = library.map((b, i) => i); // indices to sort\n    if(_libSortOrder === 'alpha') {\n      idx.sort((a, b) => library[a].title.localeCompare(library[b].title));\n    } else if(_libSortOrder === 'recent') {\n      idx.sort((a, b) => (library[b].lastOpened || 0) - (library[a].lastOpened || 0));\n    } else if(_libSortOrder === 'progress') {\n      const pct = i => library[i].totalSents > 1\n        ? (library[i].curSent || 0) / (library[i].totalSents - 1) : 0;\n      idx.sort((a, b) => pct(b) - pct(a));\n    }\n    return idx;\n  }\n\nUpdate renderLib() to use _sortedLibrary() to order cards:\n  const order = _sortedLibrary();\n  order.forEach(i => { const b = library[i]; ... });\n\n### Track last-opened\nIn openBook() and pwaOpenBook(), set:\n  library[i].lastOpened = Date.now();\n\n### UI\nAdd a small sort toggle button to the lib-header:\n  <button id=\"libSortBtn\" class=\"ic-btn\" title=\"Sort order\" onclick=\"cycleLibSort()\">⇅</button>\n\n  function cycleLibSort() {\n    const orders = ['alpha', 'recent', 'progress'];\n    _libSortOrder = orders[(orders.indexOf(_libSortOrder) + 1) % orders.length];\n    localStorage.setItem('folio_lib_sort_v1', _libSortOrder);\n    const labels = {alpha:'A–Z', recent:'Recent', progress:'Progress'};\n    showToast('Sort: ' + labels[_libSortOrder]);\n    renderLib();\n  }\n\n## Constraints\n- In PWA mode, pwaScanAndRender() currently calls .sort() — remove that\n  sort() call and let renderLib() handle ordering via _sortedLibrary().\n- Browser mode: library[] order is preserved (renderLib handles sort).\n- lastOpened is not persisted to IDB blobs — it's metadata, so save via\n  saveLibrary() (browser mode) or savePwaProgress() (PWA mode).\n\n## Verification\n- Cycle through A–Z, Recent, Progress: cards reorder.\n- Sort choice persists across reload.\n- Run syntax check."

  {

  title:"Export / backup reading progress",
  desc:"Reading positions are stored only in localStorage and IndexedDB — clearing browser data or moving to a new device permanently loses all progress with no recovery path.",
  prompt:"# Feature: Export / backup reading progress in index.html\n\n## Context\nRead saveLibrary(), getPwaProgress(), saveBookProgress(). Progress is stored\nin localStorage (folio_library_v2 for browser mode, folio_pwa_progress_v1\nfor PWA mode). There is no way to export this data.\n\n## Implementation\n\n### Export\nAdd a \"Export Progress\" button to the library screen header or to the\nAdvanced tab of the options panel:\n  <button onclick=\"exportProgress()\">Export progress</button>\n\n  function exportProgress() {\n    const data = {\n      version: 1,\n      exported: new Date().toISOString(),\n      mode: IS_PWA ? 'pwa' : 'browser',\n      progress: IS_PWA\n        ? getPwaProgress()\n        : library.map(b => ({\n            id: b.id, title: b.title,\n            curSent: b.curSent, curWord: b.curWord,\n            audioTime: b.audioTime, totalSents: b.totalSents,\n            syncOffset: b.syncOffset || 0\n          }))\n    };\n    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'folio-progress-' + Date.now() + '.json';\n    a.click();\n    URL.revokeObjectURL(url);\n    showToast('Progress exported', 'success');\n  }\n\n### Import (basic)\nAdd a companion import that reads the JSON and merges progress:\n  function importProgress(file) {\n    const reader = new FileReader();\n    reader.onload = e => {\n      try {\n        const data = JSON.parse(e.target.result);\n        if(data.version !== 1) { showToast('Unrecognised backup format', 'error'); return; }\n        if(IS_PWA) {\n          const all = getPwaProgress();\n          Object.assign(all, data.progress);\n          localStorage.setItem(PWA_PROG_KEY, JSON.stringify(all));\n        } else {\n          // Merge into library by id\n          data.progress.forEach(p => {\n            const b = library.find(b => b.id === p.id);\n            if(b) Object.assign(b, {curSent:p.curSent, curWord:p.curWord,\n              audioTime:p.audioTime, syncOffset:p.syncOffset});\n          });\n          saveLibrary();\n        }\n        showToast('Progress restored', 'success');\n        renderLib();\n      } catch(e) { showToast('Import failed: ' + e.message, 'error'); }\n    };\n    reader.readAsText(file);\n  }\n\nAdd a hidden file input and a trigger button near the export button.\n\n## Constraints\n- Do NOT export ebook data, audio data, or cover images — progress only.\n- The export file must be human-readable JSON.\n- Import is a merge (not replace) — existing books not in the backup are unaffected.\n- Do not add any UI for server sync — local file only.\n\n## Verification\n- Click export: JSON file downloaded with current positions.\n- Import the file: positions restored.\n- Run syntax check."

  prompt:"# Feature: Sleep timer custom duration and extend in index.html\n\n## Context\nRead cycleSleepTimer(), clearSleepTimer(), _updateSleepBadge() in full.\nSLEEP_OPTIONS array holds fixed presets. The timer badge shows remaining time.\nThere is no way to set a custom duration or extend the running timer.\n\n## Fix — two improvements:\n\n### 1. Extend button when timer is running\nWhen the sleep badge is visible (timer running), allow tapping it to add 15 minutes:\n  cycleSleepTimer() currently cycles through presets. Change its behaviour:\n  - If NO timer is running: cycle to next preset and start it (existing behaviour).\n  - If a timer IS RUNNING: add 15 minutes to the remaining time and show toast\n    \"Sleep timer extended +15 min\".\n\n  function cycleSleepTimer() {\n    if(_sleepTimerId) {\n      // Extend by 15 minutes\n      const remaining = Math.max(0, _sleepEndTime - Date.now());\n      const extended = remaining + 15 * 60 * 1000;\n      clearSleepTimer();\n      _startSleepTimer(extended);\n      showToast('Sleep timer +15 min', '', 2000);\n      return;\n    }\n    // ... existing cycle logic ...\n  }\n\nExtract the timer-start logic into a helper:\n  function _startSleepTimer(ms) {\n    _sleepEndTime = Date.now() + ms;\n    _sleepTimerId = setTimeout(() => { mediaPause(); clearSleepTimer(); }, ms);\n    _sleepTickId = setInterval(_updateSleepBadge, 1000);\n    _updateSleepBadge();\n  }\n\n### 2. Add a \"30 min\" and \"90 min\" preset to SLEEP_OPTIONS\n  const SLEEP_OPTIONS = [0, 15, 30, 45, 60, 90]; // minutes; 0 = off\n\nThis adds a 90-minute option for long listening sessions.\n\n## Constraints\n- _sleepTimerId, _sleepEndTime, _sleepTickId variable names must stay the same.\n- clearSleepTimer() must still work (reset all three).\n- The sleep badge UI must update correctly for extended timers.\n- mediaPause() is called on timer expiry — this must remain.\n\n## Verification\n- Tap sleep badge with no timer: cycles through presets.\n- Start a 15-min timer. Tap badge: +15 min, now shows 30 min.\n- Timer reaches zero: playback pauses.\n- Run syntax check."

  desc:"There is no way to select multiple books at once in the library — deleting several books requires opening each one individually and removing it. Should support a selection mode (long-press or edit button) with a bulk delete action.",
  prompt:"# Feature: Multi-select books for bulk delete in index.html\n\n## Context\nRead renderLib() and deleteBook() in full. Each book card has an individual\ndelete action with inline confirmation. There is no batch selection mode.\n\n## Implementation\n\n### State\n  let _libSelectMode = false;\n  const _libSelected = new Set(); // indices of selected books\n\n### Toggle selection mode\nAdd to the library header:\n  <button id=\"libSelectBtn\" class=\"ic-btn\" title=\"Select books\"\n    onclick=\"toggleLibSelectMode()\">☑</button>\n\n  function toggleLibSelectMode() {\n    _libSelectMode = !_libSelectMode;\n    _libSelected.clear();\n    document.getElementById('libSelectBtn').classList.toggle('active', _libSelectMode);\n    document.getElementById('libBulkDeleteBtn').style.display = _libSelectMode ? '' : 'none';\n    renderLib();\n  }\n\n### Select cards\nIn renderLib(), if _libSelectMode: add a checkbox overlay to each card:\n  if(_libSelectMode) {\n    const cb = document.createElement('div');\n    cb.className = 'lib-checkbox' + (_libSelected.has(i) ? ' checked' : '');\n    cb.onclick = (e) => { e.stopPropagation(); toggleLibSelect(i); };\n    card.appendChild(cb);\n    if(_libSelected.has(i)) card.classList.add('lib-selected');\n  }\n\nAlso, in selection mode, card click selects rather than opens:\n  card.addEventListener('click', (e) => {\n    if(e.target.closest('.book-card-actions')) return;\n    if(_libSelectMode) { toggleLibSelect(i); return; }\n    openBook(i);\n  });\n\n  function toggleLibSelect(i) {\n    if(_libSelected.has(i)) _libSelected.delete(i); else _libSelected.add(i);\n    renderLib();\n  }\n\n### Bulk delete button\nAdd a \"Delete selected\" button near the lib header (hidden by default):\n  <button id=\"libBulkDeleteBtn\" class=\"btn btn-danger\" style=\"display:none\"\n    onclick=\"bulkDeleteSelected()\">Delete selected</button>\n\n  function bulkDeleteSelected() {\n    if(_libSelected.size === 0) return;\n    const indices = [..._libSelected].sort((a,b)=>b-a); // descending\n    indices.forEach(i => {\n      const b = library[i];\n      if(b.audioUrl) URL.revokeObjectURL(b.audioUrl);\n      _deleteBlobsFor(b.id);\n      library.splice(i, 1);\n    });\n    if(!IS_PWA) saveLibrary();\n    else {\n      const all = getPwaProgress();\n      indices.forEach(i => delete all[library[i]?.id]);\n      localStorage.setItem(PWA_PROG_KEY, JSON.stringify(all));\n    }\n    toggleLibSelectMode(); // exits select mode and re-renders\n    showToast(indices.length + ' book(s) deleted');\n  }\n\n### CSS\n  .lib-checkbox { position:absolute; top:8px; left:8px; width:20px; height:20px;\n    border:2px solid var(--border); border-radius:4px; background:var(--surface2);\n    cursor:pointer; z-index:2; }\n  .lib-checkbox.checked { background:var(--accent); border-color:var(--accent); }\n  .lib-checkbox.checked::after { content:'✓'; color:#fff; font-size:13px;\n    display:flex; align-items:center; justify-content:center; height:100%; }\n  .lib-selected { border-color:var(--accent) !important; }\n\n## Constraints\n- Normal (non-select) mode: no UI change on cards.\n- bulkDeleteSelected() must delete in descending index order to avoid\n  index shifting during splice.\n- Do not remove the individual deleteBook() inline confirm.\n\n## Verification\n- Tap select button: checkboxes appear on cards.\n- Select 3 cards, tap Delete: confirmation? (add if desired) → all 3 removed.\n- Exit select mode: cards return to normal.\n- Run syntax check."

  prompt:"# Feature: Manage files from library screen in index.html\n\n## Context\nRead openBookInfoModal() in full. The book info modal lets users view and\nchange files for the currently-open book. It's only accessible from inside\nthe player screen. Library cards have only rename and delete actions.\n\n## Implementation\nAdd an \"Info\" or \"Files\" action button to each library card that opens the\nbook info modal directly from the library screen.\n\n### HTML — per-card action\nIn renderLib(), add a files action button alongside rename/delete:\n  <button class=\"card-action-btn\" title=\"Files\" onclick=\"openBookInfoFromLib(${i},event)\">📋</button>\n\n### JS\n  function openBookInfoFromLib(i, e) {\n    e.stopPropagation();\n    // Temporarily set curBookIdx so openBookInfoModal() works\n    curBookIdx = i;\n    openBookInfoModal();\n    // On modal close, reset curBookIdx if we're still on library screen\n    // (_prevFocus and _closeModalRestore handle focus)\n  }\n\nThe modal's save actions (biReassign) use curBookIdx, so setting it before\nopening is sufficient. After the modal closes:\n  - If the user changed the ebook: loadEbook would be called, but we're on\n    the library screen. Guard: in biReassign(), if the player is not visible,\n    don't call loadEbook() — just save the data and update the library card.\n\nAdd the guard in biReassign() ebook branch:\n  const playerVisible = document.getElementById('player')?.style.display !== 'none';\n  if(playerVisible) {\n    loadEbook(b, () => { curSent=0; curWord=0; updateHL(); updateProg(); });\n  }\n  openBookInfoModal(); // refresh modal\n\nSimilarly guard the ebook reassign render in the transcript branch.\n\n## Constraints\n- Do not move the book info modal out of the player screen HTML.\n- curBookIdx must be restored to -1 if the modal is closed without opening\n  a book. Add to _closeModalRestore() (or use the existing flow since\n  the modal closers call _closeModalRestore already).\n- In browser mode, the modal shows \"click to change\" affordances — these\n  should work from library too.\n- In PWA mode, the modal shows \"from folder\" labels — also works from library.\n\n## Verification\n- Library screen: each card has Files button.\n- Tap Files on a card: book info modal opens.\n- Change cover image from library: cover updates on card.\n- Run syntax check."

  desc:"There is no way to find a word or phrase in the current ebook text — a significant gap for non-fiction and reference books where users need to locate specific passages.",
  prompt:"# Feature: Search within book in index.html\n\n## Context\nRead sentences[] structure: each sentence has a .text string. Read updateHL()\nand scrollToSent(). The player screen top bar has icon buttons.\n\n## Implementation\n\n### State\n  let _searchQuery = '';\n  let _searchResults = []; // sentence indices matching query\n  let _searchResultIdx = 0; // current match index\n\n### UI\nAdd a search toggle button to the top bar:\n  <button id=\"searchBtn\" class=\"ic-btn\" title=\"Search\" onclick=\"toggleSearch()\">🔍</button>\n\nAdd a search bar below the top bar (hidden by default):\n  <div id=\"searchBar\" style=\"display:none\" class=\"search-bar\">\n    <input id=\"searchInput\" type=\"search\" placeholder=\"Search…\"\n      oninput=\"onSearchInput(this.value)\"\n      onkeydown=\"onSearchKey(event)\" />\n    <span id=\"searchCount\" class=\"search-count\"></span>\n    <button onclick=\"searchNav(-1)\">↑</button>\n    <button onclick=\"searchNav(1)\">↓</button>\n    <button onclick=\"closeSearch()\">✕</button>\n  </div>\n\n### JS\n  function toggleSearch() {\n    const bar = document.getElementById('searchBar');\n    if(bar.style.display === 'none') {\n      bar.style.display = '';\n      document.getElementById('searchInput').focus();\n    } else {\n      closeSearch();\n    }\n  }\n\n  function closeSearch() {\n    _searchQuery = '';\n    _searchResults = [];\n    document.getElementById('searchBar').style.display = 'none';\n    document.querySelectorAll('.sent.search-match').forEach(el =>\n      el.classList.remove('search-match', 'search-active'));\n  }\n\n  function onSearchInput(q) {\n    _searchQuery = q.trim().toLowerCase();\n    _searchResults = [];\n    document.querySelectorAll('.sent.search-match').forEach(el =>\n      el.classList.remove('search-match', 'search-active'));\n    if(!_searchQuery) { document.getElementById('searchCount').textContent=''; return; }\n    sentences.forEach((s, i) => {\n      if(s.text.toLowerCase().includes(_searchQuery)) {\n        _searchResults.push(i);\n        s.el.classList.add('search-match');\n      }\n    });\n    _searchResultIdx = 0;\n    document.getElementById('searchCount').textContent =\n      _searchResults.length ? '1/' + _searchResults.length : 'No results';\n    if(_searchResults.length) _jumpToSearchResult(0);\n  }\n\n  function _jumpToSearchResult(idx) {\n    document.querySelectorAll('.sent.search-active').forEach(el =>\n      el.classList.remove('search-active'));\n    const si = _searchResults[idx];\n    if(si == null) return;\n    sentences[si].el.classList.add('search-active');\n    scrollToSent(si, true);\n  }\n\n  function searchNav(dir) {\n    if(!_searchResults.length) return;\n    _searchResultIdx = (_searchResultIdx + dir + _searchResults.length) % _searchResults.length;\n    document.getElementById('searchCount').textContent =\n      (_searchResultIdx + 1) + '/' + _searchResults.length;\n    _jumpToSearchResult(_searchResultIdx);\n  }\n\n  function onSearchKey(e) {\n    if(e.key === 'Enter') searchNav(1);\n    if(e.key === 'Escape') closeSearch();\n  }\n\n### CSS\n  .search-bar {\n    background: var(--surface2); border-bottom: 1px solid var(--border);\n    padding: 8px 12px; display: flex; align-items: center; gap: 8px;\n  }\n  #searchInput {\n    flex: 1; background: var(--surface); border: 1px solid var(--border);\n    color: var(--text); border-radius: 6px; padding: 6px 10px;\n    font: inherit; font-size: 14px; outline: none;\n  }\n  .search-count { font-size: 12px; color: var(--text2); min-width: 48px; text-align: right; }\n  .sent.search-match { background: rgba(210,153,34,.15); }\n  .sent.search-active { background: rgba(210,153,34,.35) !important; outline: 2px solid var(--yellow); }\n\n## Constraints\n- Search is purely within sentences[] (already in memory) — no backend.\n- Close search (closeSearch()) when goLib() is called.\n- Do not interfere with normal sentence highlighting (.sent-active).\n- Search bar hidden when no book is open.\n\n## Verification\n- Search \"the\": all matching sentences highlighted, first one in view.\n- ↑ / ↓ navigate between matches.\n- Press Escape: search bar closes, highlights removed.\n- Run syntax check."

   const b = library[curBookIdx];\n    b.fontSize = null; b.lineHeight = null; b.fontKey = null;\n    saveBookProgress();\n    showToast('Using global typography', '', 2000);\n  }\n\n## Constraints\n- Global settings (setFS, setLH, etc.) continue to update _fontSize/_lineHeight\n  globals as before — per-book overrides only apply when a book is open.\n- In goLib(), always restore global CSS variables from _fontSize/_lineHeight.\n- Per-book settings are saved via saveBookProgress() (routes correctly for both modes).\n- Do not add per-book settings for theme, alignment, or max-width in this prompt\n  — only font size and line height to keep scope manageable.\n\n## Verification\n- Set font size 22px, tap \"Save for this book\". Reopen book: 22px applied.\n- Open a different book: global font size restored.\n- \"Clear for this book\": global size applies to book again.\n- Run syntax check."

  prompt:"# Feature: Auto-hide controls on inactivity in PWA mode in index.html\n\n## Context\nRead folio-context.md: CSS SECTIONS (Top bar, Seek strip), HTML player screen breakdown,\nand CLAUDE.md constraints (IS_PWA branch separation).\nAffected elements: .top-bar, #seekStrip, #ttsBar (when visible).\nIS_PWA is a boolean constant. Only apply this behaviour inside IS_PWA === true.\n\n## Implementation\n\n### CSS\nAdd a CSS class .controls-hidden to #player:\n  #player.controls-hidden .top-bar,\n  #player.controls-hidden #seekStrip,\n  #player.controls-hidden #ttsBar {\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity 0.3s ease;\n  }\nAdd the base transition to .top-bar, #seekStrip, #ttsBar (opacity 0.3s) so the fade-in is smooth.\nDo not change any layout properties — controls must still occupy space (visibility not display).\n\n### JS\nAdd near the player initialisation block (inside or just after openBook or init()):\n\n  let _controlsTimer = null;\n  function _showControls() {\n    document.getElementById('player').classList.remove('controls-hidden');\n    clearTimeout(_controlsTimer);\n    _controlsTimer = setTimeout(_hideControls, 3000);\n  }\n  function _hideControls() {\n    document.getElementById('player').classList.add('controls-hidden');\n  }\n  function _initAutoHide() {\n    if (!IS_PWA) return;\n    ['touchstart','pointerdown','pointermove'].forEach(ev => {\n      document.getElementById('player').addEventListener(ev, _showControls, { passive: true });\n    });\n    _showControls(); // start the initial timer\n  }\n\nCall _initAutoHide() from init() after cacheDOM().\n\n### Rules\n- Auto-hide must pause while any modal is open — call _showControls() from _openModalEl and\n  clearTimeout(_controlsTimer) to freeze the timer while modal is visible, restart on _closeModalRestore.\n- Auto-hide must not trigger while the options panel (#optPanel) is open. Add a guard:\n  if (document.getElementById('optPanel').classList.contains('open')) { _showControls(); return; }\n  inside _hideControls() so it bails out if options are open.\n- Browser mode (IS_PWA===false): no changes, no classes added, no timers.\n- Do not change .top-bar or #seekStrip layout, position, or z-index.\n\n## Verification\n- PWA mode: controls visible on open, fade after 3s, reappear on tap.\n- PWA mode: tap seek bar — controls reappear and timer resets.\n- PWA mode: options panel open — controls do not hide.\n- Browser mode: controls always visible, no fade behaviour.\n- Run syntax check.\n"

function matches(p, f) {
  if(f === 'all')      return true;
  if(f === 'active')   return p.status === 'active';
  if(f === 'deferred') return p.status === 'deferred';
  if(f === 'done')     return p.status === 'done';
  if(f === 'backlog')  return p.status === 'backlog';
  if(f === 'fix')      return p.type === 'fix';
  if(f === 'feat')     return p.type === 'feat';
  if(f === 'perf')     return p.type === 'perf';
  return true;
}

// ── Custom prompts (localStorage) ─────────────────────────
const CUSTOM_KEY = 'folio_custom_prompts_v1';
function loadCustom() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]'); } catch(e){ return []; }
}
function saveCustom(arr) { localStorage.setItem(CUSTOM_KEY, JSON.stringify(arr)); }
function allPrompts() { return [...PROMPTS, ...loadCustom()]; }

// ── Core render ────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendSection(label, items, container) {
  // Sort by numeric num ascending; non-numeric (✓, D) keep file order
  items = [...items].sort((a, b) => {
    const na = parseInt(a.num), nb = parseInt(b.num);
    if(isNaN(na) && isNaN(nb)) return 0;
    if(isNaN(na)) return 1;
    if(isNaN(nb)) return -1;
    return na - nb;
  });

  const h = document.createElement('div');
  h.className = 'section-heading';
  h.innerHTML = `${escHtml(label)}<span class="section-count">${items.length}</span>`;
  container.appendChild(h);

  items.forEach((p) => {
    const isDone     = p.status === 'done';
    const isDeferred = p.status === 'deferred';
    const isBacklog  = p.status === 'backlog';

    const typTag    = p.type==='fix'  ? '<span class="tag tag-fix">Fix</span>'
                    : p.type==='perf' ? '<span class="tag tag-perf">Perf</span>'
                    : '<span class="tag tag-feat">Feature</span>';
    const modelTag  = '<span class="tag tag-sonnet">Sonnet</span>';
    const effortLabels = { low:'Low', med:'Med', high:'High' };
    const effortTag = p.effort ? `<span class="tag tag-effort-${p.effort}">${effortLabels[p.effort]} effort</span>` : '';
    const hasPrompt  = p.prompt && p.prompt.trim().length > 0;
    const extraTag  = isDone     ? '<span class="tag tag-done">Done</span>'
                    : isDeferred ? '<span class="tag tag-defer">Deferred</span>'
                    : isBacklog  ? (hasPrompt ? '' : '<span class="tag tag-backlog">Needs prompt</span>')
                    : '';
    const customTag = p.custom ? '<span class="tag tag-custom">Custom</span>' : '';

    const showPrompt = !isDone && hasPrompt;

    const bodyInner = !showPrompt
      ? `<div class="card-desc" style="padding-bottom:14px">${escHtml(p.desc)}</div>`
      : `<div class="card-desc">${escHtml(p.desc)}</div>
         <div class="prompt-wrap">
           <div class="prompt-text">${escHtml(p.prompt)}</div>
           <div class="copy-bar">
             <button class="copy-btn" onclick="copyText(this)">
               <span class="copy-icon">&#x2398;</span> Copy prompt
             </button>
           </div>
         </div>`;

    const deleteBtn = p.custom
      ? `<button class="modal-close" title="Delete" style="margin-left:4px;font-size:14px" onclick="deleteCustom('${escHtml(p.num)}',event)">&#x2715;</button>`
      : '';

    const card = document.createElement('div');
    card.className = 'prompt-card' + (isDone ? ' done-card' : '') + (isBacklog && !hasPrompt ? ' backlog-card' : '');
    card.innerHTML = `
      <div class="card-header" onclick="this.closest('.prompt-card').classList.toggle('open')">
        <div class="card-num">${escHtml(p.num)}</div>
        <div class="card-meta">
          <div class="card-title">${escHtml(p.title)}</div>
          <div class="card-tags">${typTag}${modelTag}${effortTag}${extraTag}${customTag}</div>
        </div>
        ${deleteBtn}
        <span class="card-chevron">&#9660;</span>
      </div>
      <div class="card-body">${bodyInner}</div>`;
    container.appendChild(card);
    const copyBtn = card.querySelector('.copy-btn');
    if(copyBtn) copyBtn._promptText = p.prompt || '';
  });
}

function renderAll(f) {
  const all = allPrompts();
  const container = document.getElementById('cards');
  container.innerHTML = '';

  const active   = all.filter(p => p.status==='active'   && matches(p,f));
  const backlog  = all.filter(p => p.status==='backlog'  && matches(p,f));
  const deferred = all.filter(p => p.status==='deferred' && matches(p,f));
  const done     = all.filter(p => p.status==='done'     && matches(p,f));
  const total    = active.length + backlog.length + deferred.length + done.length;

  document.getElementById('empty').style.display = total===0 ? 'block' : 'none';
  if(active.length)   appendSection('Active', active, container);
  if(backlog.length)  appendSection('Backlog', backlog, container);
  if(deferred.length) appendSection('Deferred', deferred, container);
  if(done.length)     appendSection('Completed', done, container);
}

function filter(f, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll(f);
}

function copyText(btn) {
  const text = btn._promptText || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<span class="copy-icon">&#10003;</span> Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<span class="copy-icon">&#x2398;</span> Copy prompt';
    }, 2000);
  });
}

// ── Add-prompt modal ───────────────────────────────────────
function openAddModal() {
  document.getElementById('f-title').value  = '';
  document.getElementById('f-desc').value   = '';
  document.getElementById('f-prompt').value = '';
  document.getElementById('f-status').value = 'active';
  document.getElementById('f-type').value   = 'feat';
  document.getElementById('f-effort').value = 'low';
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(), 50);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

function saveNewPrompt() {
  const title = document.getElementById('f-title').value.trim();
  if(!title){ document.getElementById('f-title').focus(); return; }
  const custom = loadCustom();
  const maxNum = allPrompts().reduce((m,p)=>Math.max(m, parseInt(p.num)||0), 0);
  custom.push({
    num:    String(maxNum + 1),
    status: document.getElementById('f-status').value,
    type:   document.getElementById('f-type').value,
    model:  'sonnet',
    effort: document.getElementById('f-effort').value,
    title,
    desc:   document.getElementById('f-desc').value.trim(),
    prompt: document.getElementById('f-prompt').value,
    custom: true
  });
  saveCustom(custom);
  closeAddModal();
  refreshStats();
  const activeBtn = document.querySelector('.filter-btn.active');
  renderAll(activeBtn ? activeBtn.textContent.toLowerCase().replace('completed','done').trim() : 'all');
}

function deleteCustom(num, e) {
  e.stopPropagation();
  saveCustom(loadCustom().filter(p => p.num !== num));
  refreshStats();
  const activeBtn = document.querySelector('.filter-btn.active');
  renderAll(activeBtn ? activeBtn.textContent.toLowerCase().replace('completed','done').trim() : 'all');
}

// ── Stats ──────────────────────────────────────────────────
function refreshStats() {
  const all = allPrompts();
  document.getElementById('statActive').textContent  = all.filter(p=>p.status==='active').length;
  document.getElementById('statDone').textContent    = all.filter(p=>p.status==='done').length;
  document.getElementById('statBacklog').textContent = all.filter(p=>p.status==='backlog').length;
  document.getElementById('statDefer').textContent   = all.filter(p=>p.status==='deferred').length;
}

refreshStats();
renderAll('all');
</script>
